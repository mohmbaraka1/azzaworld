<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الإشعارات — AZZA</title>
<script src="supabase.js"></script>
<script src="notification-service.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{--gold:#c69749;--olive:#1c5b38;--od:#0e3622;--ol:rgba(28,91,56,.08);
  --bg:#f5f0e8;--bg2:#ece5d4;--card:#fff;--ink:#1a1814;--sub:#7a7060;--muted:#9a9080;--line:rgba(0,0,0,.08);--r:14px}
.dk{--bg:#111009;--bg2:#1a180f;--card:#1e1c12;--ink:#f0ead8;--sub:#9a9080;--line:rgba(255,255,255,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:var(--bg);color:var(--ink);direction:rtl;min-height:100vh}

/* Topbar */
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.tb-back{width:34px;height:34px;border-radius:10px;border:none;background:var(--bg2);cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center}
.tb-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.tb-title{font-size:16px;font-weight:900;flex:1}
.tb-badge{background:var(--olive);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;min-width:20px;text-align:center}
.tb-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--line);background:none;font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub)}
.tb-btn:hover{border-color:var(--olive);color:var(--olive)}

/* Filter Tabs */
.filter-bar{background:var(--card);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;display:flex;padding:0 16px}
.filter-bar::-webkit-scrollbar{display:none}
.ft{padding:12px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:5px}
.ft:hover{color:var(--ink)}
.ft.on{color:var(--olive);border-color:var(--olive)}
.ft-count{font-size:10px;background:var(--olive);color:#fff;padding:1px 6px;border-radius:99px}

/* List */
.main{max-width:680px;margin:0 auto;padding:16px}

/* Notif Item */
.notif-item{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;display:flex;gap:12px;cursor:pointer;transition:.2s;margin-bottom:8px;position:relative;overflow:hidden}
.notif-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateX(-2px)}
.notif-item.unread{border-color:var(--olive)}
.notif-item.unread::before{content:'';position:absolute;top:0;bottom:0;right:0;width:3px;background:var(--olive);border-radius:0 var(--r) var(--r) 0}
.notif-item.priority-2{border-color:#ef4444}
.notif-item.priority-2.unread::before{background:#ef4444}
.notif-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:14px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.notif-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--olive);flex-shrink:0}
.notif-desc{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:6px}
.notif-time{font-size:11px;color:var(--muted)}
.notif-actions{display:flex;gap:6px;margin-top:8px}
.na-btn{padding:5px 12px;border-radius:7px;border:1.5px solid var(--line);background:none;font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;color:var(--sub)}
.na-btn:hover{border-color:var(--olive);color:var(--olive)}
.na-btn.primary{background:var(--olive);color:#fff;border-color:var(--olive)}

/* Group Header */
.group-hdr{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.group-hdr::after{content:'';flex:1;height:.5px;background:var(--line)}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-em{font-size:52px;margin-bottom:14px}
.empty-title{font-size:16px;font-weight:700;color:var(--sub);margin-bottom:6px}

/* Prefs Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.prefs-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:20px}
.pref-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--line)}
.pref-row:last-child{border:none}
.pref-ic{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.pref-info{flex:1}
.pref-label{font-size:14px;font-weight:700}
.pref-desc{font-size:12px;color:var(--muted)}
.sw{position:relative;width:44px;height:26px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-sl{position:absolute;inset:0;background:var(--bg2);border-radius:99px;cursor:pointer;transition:.2s}
.sw-sl::before{content:'';position:absolute;width:20px;height:20px;right:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw input:checked+.sw-sl{background:var(--olive)}
.sw input:checked+.sw-sl::before{right:calc(100% - 23px)}

/* Search */
.search-wrap{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--line)}
.search-inp{width:100%;height:38px;border-radius:10px;border:1.5px solid var(--line);background:var(--bg2);padding:0 14px;font-family:Tajawal,sans-serif;font-size:13px;color:var(--ink);outline:none;transition:.2s}
.search-inp:focus{border-color:var(--olive);background:var(--card)}
</style>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="tb-title">🔔 الإشعارات <span class="tb-badge" id="top-badge" style="display:none">0</span></div>
  <button class="tb-btn" onclick="markAllRead()">قراءة الكل</button>
  <button class="tb-btn" onclick="openPrefs()">⚙️ إعدادات</button>
</div>

<!-- Filter Tabs -->
<div class="filter-bar">
  <div class="ft on" onclick="setFilter('all',this)">الكل</div>
  <div class="ft" onclick="setFilter('unread',this)">غير مقروء <span class="ft-count" id="unread-count">0</span></div>
  <div class="ft" onclick="setFilter('messages',this)">💌 رسائل</div>
  <div class="ft" onclick="setFilter('social',this)">👥 تفاعل</div>
  <div class="ft" onclick="setFilter('opportunities',this)">💼 فرص</div>
  <div class="ft" onclick="setFilter('ai',this)">🤖 AI</div>
  <div class="ft" onclick="setFilter('system',this)">⚙️ نظام</div>
</div>

<!-- Search -->
<div class="search-wrap">
  <input class="search-inp" id="srch" placeholder="ابحث في الإشعارات..." oninput="doSearch(this.value)">
</div>

<!-- List -->
<div class="main" id="list"></div>

<!-- Prefs Modal -->
<div class="overlay" id="prefs-overlay" onclick="closePrefs()">
  <div class="prefs-sheet" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:16px;font-weight:900">⚙️ إعدادات الإشعارات</div>
      <button onclick="closePrefs()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div id="prefs-list"></div>
  </div>
</div>

<script>
const SB_URL  = 'https://iecniydswotsilaueogq.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25peWRzd290c2lsYXVlb2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTg1OTcsImV4cCI6MjA5Nzc3NDU5N30.69LfEBHUwToTHue3EPS_KYq9BvDSZJ9jcW_P1yRKReA';
const db  = supabase.createClient(SB_URL,SB_ANON);
const me  = JSON.parse(localStorage.getItem('azza_user')||'null');
if(!me) location.href='login.html';
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let ALL=[], curFilter='all', curSearch='';
const CATS={messages:['message','msg_request','msg_accept'],social:['like','comment','reply','mention','follow','follow_request','follow_accept','reaction'],opportunities:['job','investment','grant','competition','project','training','scholarship','nearby_investor','nearby_job','nearby_event','job_alert'],ai:['ai_rec'],system:['system','security','login_new','verified','verify_reject']};
const LABELS={like:'أعجب بمنشورك',comment:'علّق على منشورك',reply:'رد على تعليقك',mention:'ذكرك في منشور',follow:'بدأ بمتابعتك',follow_request:'طلب متابعتك',follow_accept:'قبل طلب متابعتك',message:'أرسل لك رسالة',msg_request:'طلب مراسلتك',msg_accept:'قبل طلب المراسلة',job:'وظيفة مناسبة',investment:'أبدى اهتماماً بمشروعك',grant:'منحة متاحة',competition:'مسابقة جديدة',certificate:'شهادة جديدة',course_complete:'أكملت كورساً',verified:'تم توثيق حسابك',security:'تنبيه أمني',ai_rec:'توصية ذكية',job_alert:'وظيفة تناسب مهاراتك',system:'تحديث النظام'};
const ICONS={like:'❤️',comment:'💬',reply:'↩️',mention:'📢',follow:'👤',follow_request:'🤝',follow_accept:'✅',message:'💌',msg_request:'📩',msg_accept:'✉️',job:'💼',investment:'💰',grant:'🏅',competition:'🏆',certificate:'🎓',course_complete:'🎓',verified:'✅',security:'🔐',ai_rec:'🤖',job_alert:'🔔',system:'⚙️'};
const COLORS={like:'#ef4444',comment:'#2563eb',reply:'#7c3aed',mention:'#f59e0b',follow:'#1c5b38',follow_request:'#059669',message:'#1c5b38',investment:'#c69749',grant:'#b45309',certificate:'#c69749',verified:'#16a34a',security:'#ef4444',ai_rec:'#7c3aed',job_alert:'#16a34a',system:'#6b7280'};
const URLS={message:n=>`messages.html?to=${n.actor_id}`,like:n=>`post.html?id=${n.entity_id}`,comment:n=>`post.html?id=${n.entity_id}`,reply:n=>`post.html?id=${n.entity_id}`,follow:n=>`user.html?id=${n.actor_id}`,follow_request:n=>`user.html?id=${n.actor_id}`,investment:n=>`user.html?id=${n.actor_id}`,job:n=>`post.html?id=${n.entity_id}`,certificate:n=>`certificates.html`,verified:n=>`profile.html`,security:n=>`settings.html`,ai_rec:n=>`ai-assistant.html`};

function relTime(d){const s=Math.floor((Date.now()-new Date(d))/1000);return s<60?'الآن':s<3600?Math.floor(s/60)+'د':s<86400?Math.floor(s/3600)+'س':s<604800?Math.floor(s/86400)+'ي':new Date(d).toLocaleDateString('ar');}
function getLabel(n){return LABELS[n.type]||'إشعار جديد';}
function getUrl(n){return n.url||(URLS[n.type]?URLS[n.type](n):'app.html');}

/* ── Init ── */
(async()=>{
  document.documentElement.classList.toggle('dk',localStorage.getItem('azza_theme')==='dark');
  await loadNotifs();
  subscribeRealtime();
  AZZA_NOTIF.init(db,me);
  AZZA_NOTIF.onBadgeUpdate(n=>{
    const b=document.getElementById('top-badge');
    if(b){b.textContent=n;b.style.display=n>0?'':'none';}
  });
})();

async function loadNotifs(){
  const {data}=await db.from('notifications').select('*').eq('recipient_id',me.id).order('created_at',{ascending:false}).limit(100);
  ALL=data||[];
  render();
  updateCounts();
}

function subscribeRealtime(){
  db.channel('notif-page').on('postgres_changes',{event:'*',schema:'public',table:'notifications',filter:`recipient_id=eq.${me.id}`},()=>loadNotifs()).subscribe();
}

/* ── Render ── */
function render(){
  let items=ALL;
  if(curFilter==='unread') items=items.filter(n=>!n.is_read);
  else if(CATS[curFilter]) items=items.filter(n=>CATS[curFilter].includes(n.type));
  if(curSearch) items=items.filter(n=>(n.title||getLabel(n)).toLowerCase().includes(curSearch.toLowerCase())||(n.body||'').toLowerCase().includes(curSearch.toLowerCase()));

  if(!items.length){
    document.getElementById('list').innerHTML=`<div class="empty"><div class="empty-em">🔔</div><div class="empty-title">لا توجد إشعارات</div><div style="font-size:13px">ستظهر هنا عند وصول إشعارات جديدة</div></div>`;
    return;
  }

  /* تجميع حسب اليوم */
  const groups={today:[],yesterday:[],week:[],older:[]};
  const now=new Date(), today=now.toDateString(), yesterday=new Date(now-86400000).toDateString();
  items.forEach(n=>{
    const d=new Date(n.created_at), ds=d.toDateString();
    if(ds===today) groups.today.push(n);
    else if(ds===yesterday) groups.yesterday.push(n);
    else if(now-d<604800000) groups.week.push(n);
    else groups.older.push(n);
  });

  const groupLabels={today:'اليوم',yesterday:'أمس',week:'هذا الأسبوع',older:'أقدم'};
  let html='';
  Object.entries(groups).forEach(([key,list])=>{
    if(!list.length) return;
    html+=`<div class="group-hdr">${groupLabels[key]}</div>`;
    html+=list.map(buildItem).join('');
  });
  document.getElementById('list').innerHTML=html;
}

function buildItem(n){
  const t=n.type, ic=ICONS[t]||'🔔', col=COLORS[t]||'#1c5b38', url=getUrl(n), label=getLabel(n), pri=n.priority||0;
  return`<div class="notif-item${!n.is_read?' unread':''} priority-${pri}" onclick="openNotif('${n.id}','${url}')">
    <div class="notif-icon" style="background:${col}18">${ic}</div>
    <div class="notif-body">
      <div class="notif-title">
        ${!n.is_read?'<span class="notif-unread-dot"></span>':''}
        ${esc(n.title||label)}
        ${pri===2?'<span style="background:#ef444415;color:#ef4444;font-size:10px;padding:2px 7px;border-radius:99px">مهم</span>':''}
      </div>
      ${n.body?`<div class="notif-desc">${esc(n.body)}</div>`:''}
      <div class="notif-time">${relTime(n.created_at)}</div>
      ${buildActions(n)}
    </div>
  </div>`;
}

function buildActions(n){
  if(n.type==='follow_request') return`<div class="notif-actions"><button class="na-btn primary" onclick="event.stopPropagation();acceptFollow('${n.actor_id}','${n.id}')">قبول</button><button class="na-btn" onclick="event.stopPropagation();rejectFollow('${n.id}')">رفض</button></div>`;
  if(n.type==='msg_request')    return`<div class="notif-actions"><button class="na-btn primary" onclick="event.stopPropagation();location.href='messages.html?to=${n.actor_id}'">فتح المحادثة</button></div>`;
  if(n.type==='investment')     return`<div class="notif-actions"><button class="na-btn primary" onclick="event.stopPropagation();location.href='messages.html?to=${n.actor_id}'">تواصل معه</button><button class="na-btn" onclick="event.stopPropagation();location.href='user.html?id=${n.actor_id}'">الملف</button></div>`;
  return'';
}

async function openNotif(id,url){
  await db.from('notifications').update({is_read:true,is_opened:true}).eq('id',id);
  ALL=ALL.map(n=>n.id===id?{...n,is_read:true,is_opened:true}:n);
  render(); updateCounts();
  if(url) location.href=url;
}

async function markAllRead(){
  await db.from('notifications').update({is_read:true}).eq('recipient_id',me.id).eq('is_read',false);
  ALL=ALL.map(n=>({...n,is_read:true}));
  render(); updateCounts();
  AZZA_NOTIF.updateBadge();
}

async function acceptFollow(actorId,nId){
  await db.from('follows').upsert({follower_id:actorId,following_id:me.id},{onConflict:'follower_id,following_id'});
  await db.from('notifications').update({is_read:true}).eq('id',nId);
  /* إرسال إشعار قبول */
  AZZA_NOTIF.send(actorId,'follow_accept');
  loadNotifs();
}

async function rejectFollow(nId){
  await db.from('notifications').update({is_read:true}).eq('id',nId);
  loadNotifs();
}

function updateCounts(){
  const unread=ALL.filter(n=>!n.is_read).length;
  document.getElementById('unread-count').textContent=unread;
  const b=document.getElementById('top-badge');
  if(b){b.textContent=unread;b.style.display=unread>0?'':'none';}
}

function setFilter(f,el){curFilter=f;document.querySelectorAll('.ft').forEach(t=>t.classList.toggle('on',t===el));render();}
function doSearch(q){curSearch=q;render();}

/* ── Prefs ── */
const PREFS_CONFIG=[
  {id:'message',  icon:'💌', label:'الرسائل'},
  {id:'comment',  icon:'💬', label:'التعليقات'},
  {id:'like',     icon:'❤️', label:'الإعجابات'},
  {id:'follow',   icon:'👤', label:'المتابعون'},
  {id:'mention',  icon:'📢', label:'الإشارات'},
  {id:'job_alert',icon:'💼', label:'تنبيهات الوظائف'},
  {id:'investment',icon:'💰',label:'اهتمام المستثمرين'},
  {id:'ai_rec',   icon:'🤖', label:'توصيات الذكاء الاصطناعي'},
  {id:'system',   icon:'⚙️', label:'تحديثات النظام'},
  {id:'security', icon:'🔐', label:'التنبيهات الأمنية'},
];

function openPrefs(){
  const saved=JSON.parse(localStorage.getItem('azza_notif_prefs')||'{}');
  document.getElementById('prefs-list').innerHTML=PREFS_CONFIG.map(p=>`
    <div class="pref-row">
      <div class="pref-ic">${p.icon}</div>
      <div class="pref-info"><div class="pref-label">${p.label}</div></div>
      <label class="sw"><input type="checkbox" ${saved[p.id]!==false?'checked':''} onchange="savePref('${p.id}',this.checked)"><span class="sw-sl"></span></label>
    </div>`).join('');
  document.getElementById('prefs-overlay').classList.add('open');
}

function savePref(id,val){
  const prefs=JSON.parse(localStorage.getItem('azza_notif_prefs')||'{}');
  prefs[id]=val;
  localStorage.setItem('azza_notif_prefs',JSON.stringify(prefs));
  db.from('notification_prefs').upsert({user_id:me.id,type_prefs:prefs},{onConflict:'user_id'}).then(()=>{});
}

function closePrefs(){document.getElementById('prefs-overlay').classList.remove('open');}
</script>
</body>
</html>
