<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AZZA Academy — تعلّم، فكّر، انطلق</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{
  --gold:#c69749;--gs:#e8b96a;--olive:#1c5b38;--od:#0e3622;--ol:rgba(28,91,56,.08);
  --bg:#f5f0e8;--bg2:#ece5d4;--card:#fff;--ink:#1a1814;--sub:#7a7060;
  --line:rgba(0,0,0,.08);--r:16px;
}
.dk{--bg:#141210;--bg2:#1e1c18;--card:#201e1a;--ink:#f0e8d0;--sub:#9a9080;--line:rgba(255,255,255,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:var(--bg);color:var(--ink);direction:rtl;min-height:100vh}

/* Topbar */
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.tb-back{width:34px;height:34px;border-radius:10px;border:none;background:var(--bg2);cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center}
.tb-back svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.tb-title{font-size:15px;font-weight:900;color:var(--olive);flex:1}

/* Hero */
.hero{background:linear-gradient(135deg,var(--od) 0%,var(--olive) 60%,#2d7a4f 100%);padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M20 20.5V18H0v5h5v5H0v5h20v-9.5zm-2 4.5h-1v-1h1v1zm0-3h-1v-1h1v1zm2 3h-1v-1h1v1zm0-3h-1v-1h1v1z'/%3E%3C/g%3E%3C/svg%3E")}
.hero-badge{display:inline-block;padding:5px 14px;border-radius:99px;background:rgba(198,151,73,.2);color:var(--gold);font-size:12px;font-weight:700;margin-bottom:14px;border:1px solid rgba(198,151,73,.3)}
.hero h1{font-size:clamp(24px,5vw,38px);font-weight:900;color:#fff;margin-bottom:10px;line-height:1.2}
.hero h1 span{color:var(--gold)}
.hero p{font-size:15px;color:rgba(255,255,255,.75);margin-bottom:28px;max-width:500px;margin-left:auto;margin-right:auto}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat strong{display:block;font-size:24px;font-weight:900;color:#fff}
.hero-stat span{font-size:12px;color:rgba(255,255,255,.6)}

/* Search */
.search-section{background:var(--card);border-bottom:1px solid var(--line);padding:16px 20px}
.search-wrap{max-width:600px;margin:0 auto;position:relative}
.search-inp{width:100%;height:46px;border-radius:12px;border:1.5px solid var(--line);padding:0 48px 0 16px;font-family:Tajawal,sans-serif;font-size:14px;color:var(--ink);background:var(--bg2);outline:none;transition:.2s}
.search-inp:focus{border-color:var(--olive);background:var(--card)}
.search-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--sub)}
.search-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* Main Layout */
.main{max-width:1100px;margin:0 auto;padding:28px 20px;display:grid;grid-template-columns:240px 1fr;gap:28px}
@media(max-width:768px){.main{grid-template-columns:1fr}}

/* Sidebar */
.sidebar{position:sticky;top:70px;height:fit-content}
.sidebar-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.cat-list{list-style:none}
.cat-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--sub);transition:.15s;margin-bottom:2px}
.cat-item:hover,.cat-item.active{background:var(--ol);color:var(--olive);font-weight:700}
.cat-item-ic{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.cat-count{margin-right:auto;font-size:11px;background:var(--bg2);padding:2px 7px;border-radius:99px}
.sidebar-sep{height:.5px;background:var(--line);margin:12px 0}

/* Content */
.content-area{}

/* Featured */
.featured-card{background:linear-gradient(135deg,var(--olive),var(--od));border-radius:var(--r);padding:24px;color:#fff;margin-bottom:24px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.featured-card::after{content:'';position:absolute;bottom:-30px;left:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
.featured-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(14,54,34,.3)}
.feat-badge{display:inline-block;padding:4px 12px;border-radius:99px;background:rgba(198,151,73,.25);color:var(--gold);font-size:12px;font-weight:700;margin-bottom:12px;border:1px solid rgba(198,151,73,.3)}
.feat-title{font-size:22px;font-weight:900;margin-bottom:8px;line-height:1.3}
.feat-desc{font-size:14px;opacity:.8;margin-bottom:16px;line-height:1.6}
.feat-meta{display:flex;align-items:center;gap:14px;font-size:12px;opacity:.7}

/* Section */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px}
.sec-more{font-size:13px;color:var(--olive);cursor:pointer;font-weight:700}

/* Course Grid */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:32px}
.course-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column}
.course-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.course-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0}
.course-body{padding:14px;flex:1;display:flex;flex-direction:column}
.course-cat{font-size:11px;font-weight:700;color:var(--olive);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.course-title{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:6px;flex:1}
.course-desc{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:10px}
.course-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--sub);flex-wrap:wrap}
.course-badge{padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700}
.badge-free{background:rgba(34,197,94,.1);color:#16a34a}
.badge-ext{background:rgba(59,130,246,.1);color:#2563eb}
.badge-new{background:rgba(198,151,73,.1);color:#854F0B}

/* Article View */
.article-view{display:none}
.article-view.open{display:block}
.home-view{}
.art-back{display:flex;align-items:center;gap:8px;color:var(--sub);cursor:pointer;font-size:14px;font-weight:700;margin-bottom:20px;background:none;border:none;font-family:Tajawal,sans-serif}
.art-back:hover{color:var(--olive)}
.art-header{margin-bottom:24px}
.art-cat-tag{display:inline-block;padding:4px 12px;border-radius:99px;background:var(--ol);color:var(--olive);font-size:12px;font-weight:700;margin-bottom:12px}
.art-title{font-size:clamp(22px,4vw,32px);font-weight:900;line-height:1.3;margin-bottom:12px}
.art-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--sub);flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--line)}
.art-body{font-size:15px;line-height:1.9;color:var(--ink)}
.art-body h2{font-size:20px;font-weight:900;color:var(--olive);margin:32px 0 12px}
.art-body h3{font-size:17px;font-weight:700;margin:24px 0 10px}
.art-body p{margin-bottom:16px}
.art-body ul,.art-body ol{margin:12px 0 16px 24px}
.art-body li{margin-bottom:10px;line-height:1.7}
.art-body strong{font-weight:700;color:var(--ink)}
.art-body em{color:var(--olive);font-style:normal;font-weight:700}
.tip-box{background:var(--ol);border-right:4px solid var(--olive);padding:14px 18px;border-radius:0 10px 10px 0;margin:20px 0;font-size:14px;line-height:1.7}
.tip-box strong{color:var(--olive)}
.warn-box{background:rgba(198,151,73,.08);border-right:4px solid var(--gold);padding:14px 18px;border-radius:0 10px 10px 0;margin:20px 0;font-size:14px;line-height:1.7}
.quote-box{background:var(--bg2);border-right:4px solid var(--sub);padding:14px 18px;border-radius:0 10px 10px 0;margin:20px 0;font-size:15px;line-height:1.7;font-style:italic;color:var(--ink)}
.steps-box{counter-reset:steps;margin:20px 0}
.step-item{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.step-num{width:32px;height:32px;border-radius:10px;background:var(--olive);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;margin-top:2px}
.step-content{flex:1}
.step-content strong{display:block;font-size:15px;font-weight:700;margin-bottom:4px}
.step-content p{font-size:14px;color:var(--sub);margin:0}
.art-footer{margin-top:40px;padding-top:24px;border-top:1px solid var(--line)}
.art-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.art-tag{padding:5px 12px;border-radius:99px;background:var(--bg2);font-size:12px;color:var(--sub);cursor:pointer}
.art-tag:hover{background:var(--ol);color:var(--olive)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.related-card{background:var(--bg2);border-radius:10px;padding:14px;cursor:pointer;transition:.15s}
.related-card:hover{background:var(--ol)}
.related-cat{font-size:11px;color:var(--olive);font-weight:700;margin-bottom:4px}
.related-title{font-size:13px;font-weight:700}
.yt-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin:20px 0;background:#000}
.yt-wrap iframe{position:absolute;top:0;right:0;width:100%;height:100%;border:none;border-radius:12px}
.yt-thumb{position:absolute;inset:0;cursor:pointer;background:#000;border-radius:12px;overflow:hidden}
.yt-thumb img{width:100%;height:100%;object-fit:cover;opacity:.85;transition:.2s}
.yt-thumb:hover img{opacity:.7}
.yt-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.2s;pointer-events:none}
.yt-thumb:hover .yt-play{transform:translate(-50%,-50%) scale(1.1)}
.yt-play svg{width:24px;height:24px;fill:#fff;margin-right:-3px}
.yt-label{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;font-family:Tajawal,sans-serif}
.progress-bar{height:3px;background:var(--bg2);position:fixed;top:0;right:0;left:0;z-index:200}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--olive),var(--gold));width:0%;transition:.1s}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="topbar">
  <button class="tb-back" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="tb-title">✦ AZZA Academy</div>
  <div style="font-size:12px;color:var(--sub)" id="read-count">0 مقال مقروء</div>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-badge">🎓 AZZA Academy</div>
  <h1>تعلّم كيف تفكر<br><span>كرائد أعمال حقيقي</span></h1>
  <p>دروس مكثفة في ريادة الأعمال والابتكار وجذب الاستثمار — مكتوبة خصيصاً لمجتمع AZZA</p>
  <div class="hero-stats">
    <div class="hero-stat"><strong id="total-courses">0</strong><span>مقال ودرس</span></div>
    <div class="hero-stat"><strong>6</strong><span>مسار تعليمي</span></div>
    <div class="hero-stat"><strong>100%</strong><span>مجاني</span></div>
  </div>
</div>

<!-- Search -->
<div class="search-section">
  <div class="search-wrap">
    <input class="search-inp" id="srch" placeholder="ابحث: استثمار، أفكار، حماية، Pitch Deck..." oninput="doSearch(this.value)">
    <div class="search-ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">المسارات التعليمية</div>
    <ul class="cat-list" id="cat-list"></ul>
    <div class="sidebar-sep"></div>
    <div class="sidebar-title">آخر مقروء</div>
    <div id="last-read" style="font-size:13px;color:var(--sub)">لم تقرأ شيئاً بعد</div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <!-- Home View -->
    <div class="home-view" id="home-view">
      <div id="featured-wrap"></div>
      <div id="all-sections"></div>
    </div>
    <!-- Article View -->
    <div class="article-view" id="art-view">
      <button class="art-back" onclick="closeArt()">← العودة للأكاديمية</button>
      <div id="art-content"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   AZZA Academy — قاعدة المعرفة الكاملة
   ══════════════════════════════════════════════ */

const CATS = [
  {id:'think',     icon:'🧠', name:'كيف تفكر؟',          color:'#7c3aed'},
  {id:'ideas',     icon:'💡', name:'توليد الأفكار',        color:'#0891b2'},
  {id:'protect',   icon:'🔒', name:'حماية الفكرة',        color:'#dc2626'},
  {id:'investors', icon:'💰', name:'جذب المستثمرين',      color:'#1c5b38'},
  {id:'pitch',     icon:'🎯', name:'تقديم المشروع',        color:'#b45309'},
  {id:'build',     icon:'🚀', name:'بناء الشركة',          color:'#0369a1'},
  {id:'network',   icon:'🤝', name:'بناء العلاقات',        color:'#be185d'},
  {id:'mindset',   icon:'⚡', name:'عقلية رائد الأعمال',  color:'#065f46'},
  {id:'external',  icon:'🌐', name:'موارد خارجية',        color:'#6b7280'},
];

/* ── YouTube Embed Helper ── */
function yt(id, title=''){
  return `<div class="yt-wrap">
    <div class="yt-thumb" onclick="loadYT(this,'${id}')">
      <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" alt="${title}" onerror="this.src='https://img.youtube.com/vi/${id}/hqdefault.jpg'">
      <div class="yt-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"/></svg></div>
      ${title?`<div class="yt-label">▶ ${title}</div>`:''}
    </div>
  </div>`;
}
function loadYT(thumb, id){
  const wrap=thumb.parentElement;
  wrap.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
}

const COURSES = [
  /* ══ كيف تفكر؟ ══ */
  {
    id:'think-1', cat:'think', title:'كيف تفكر كرائد أعمال؟', emoji:'🧠',
    desc:'الفرق بين عقلية الموظف وعقلية رائد الأعمال — وكيف تنتقل بينهما.',
    time:'8 دقائق', level:'مبتدئ', isNew:true,
    body:`
<h2>الفرق الجوهري في طريقة التفكير</h2>
<p>رائد الأعمال لا يختلف عن الموظف في الذكاء أو القدرة — يختلف في <strong>طريقة النظر للمشاكل</strong>.</p>

<div class="quote-box">
"المشكلة ليست أنك لا ترى الفرصة. المشكلة أنك تراها مشكلة."
</div>

<h2>العقلية الوظيفية vs عقلية ريادة الأعمال</h2>
<ul>
<li><strong>الموظف يرى:</strong> مشكلة → يبحث عن حل → ينفّذ الحل<br><strong>رائد الأعمال يرى:</strong> مشكلة → يرى فرصة → يبني منتجاً</li>
<li><strong>الموظف يتجنب الفشل</strong><br><strong>رائد الأعمال يستخدم الفشل معلومةً</strong></li>
<li><strong>الموظف ينتظر الإذن</strong><br><strong>رائد الأعمال يطلب المسامحة لاحقاً لا الإذن مسبقاً</strong></li>
</ul>

<h2>3 عادات ذهنية تبدأ بها اليوم</h2>
<div class="steps-box">
<div class="step-item">
<div class="step-num">1</div>
<div class="step-content">
<strong>اسأل "لماذا لا؟" بدل "لا أستطيع"</strong>
<p>كل مرة تقول "لا يمكن"، اجعلها "لماذا لا يمكن؟" — غالباً ستجد أن القيد في رأسك لا في الواقع.</p>
</div>
</div>
<div class="step-item">
<div class="step-num">2</div>
<div class="step-content">
<strong>تعلّم ترى المشاكل بعيون العميل</strong>
<p>اقضِ يوماً كاملاً وأنت تلاحظ ما يُزعج الناس من حولك — كل إزعاج هو فكرة مشروع محتملة.</p>
</div>
</div>
<div class="step-item">
<div class="step-num">3</div>
<div class="step-content">
<strong>فرّق بين الحقيقة والافتراض</strong>
<p>"لا أحد سيشتري هذا" — هل هذه حقيقة أم افتراض؟ اختبر قبل أن تحكم.</p>
</div>
</div>
</div>

<div class="tip-box">
<strong>💡 تمرين عملي:</strong> خذ ورقة وقسّمها لعمودين. اكتب في العمود الأول 5 مشاكل واجهتها هذا الأسبوع. في العمود الثاني اكتب كيف يمكن لمنتج أو خدمة أن تحلها. هذا هو بالضبط كيف بدأت أكبر الشركات.
</div>

<h2>الخلاصة</h2>
<p>ريادة الأعمال ليست موهبة تولد معك — هي <strong>مهارة تبنيها بالتدريب</strong>. ابدأ بتغيير طريقة سؤالك عن الأشياء.</p>`,
    tags:['تفكير','عقلية','مبتدئ','ريادة'],
    related:['think-2','ideas-1','mindset-1'],
    video:'UF8uR6Z6KLc', videoTitle:'Steve Jobs — Stay Hungry Stay Foolish'
  },
  {
    id:'think-2', cat:'think', title:'قرار بناءً على بيانات لا مشاعر', emoji:'📊',
    desc:'كيف تأخذ قرارات ذكية بدل الاعتماد على الحدس والعاطفة.',
    time:'6 دقائق', level:'مبتدئ',
    body:`
<h2>لماذا يخطئ رواد الأعمال في القرارات؟</h2>
<p>أغلب الأخطاء المكلفة لا تأتي من نقص المعلومات — تأتي من <strong>تفسير المعلومات بعاطفة</strong>.</p>

<div class="warn-box">
⚠️ "أنا متأكد أن المنتج سيُباع" ليست بيانات. إنها حدس. والحدس يكذب كثيراً.
</div>

<h2>إطار اتخاذ القرار الذكي</h2>
<div class="steps-box">
<div class="step-item"><div class="step-num">1</div><div class="step-content"><strong>حدّد السؤال بدقة</strong><p>بدل "هل مشروعي سينجح؟" اسأل "هل 10% من ناسي المستهدفين سيدفعون X ريال مقابل هذا؟"</p></div></div>
<div class="step-item"><div class="step-num">2</div><div class="step-content"><strong>حدّد أصغر تجربة تجيب على السؤال</strong><p>لا تبني المنتج كاملاً. ابن النسخة الأصغر الممكنة وأجر التجربة.</p></div></div>
<div class="step-item"><div class="step-num">3</div><div class="step-content"><strong>حدّد قبل التجربة ما الذي سيغير رأيك</strong><p>"إذا باعت 5 أشخاص من أصل 20 تكلمتهم — سأكمل". هذا يمنعك من تأويل الفشل كنجاح.</p></div></div>
</div>

<div class="tip-box">

/* ══ State ══ */
let currentCat = 'all';
let currentArt = null;
const read = new Set(JSON.parse(localStorage.getItem('azza_academy_read')||'[]'));

/* ══ بناء الصفحة ══ */
(()=>{
  document.documentElement.classList.toggle('dk',localStorage.getItem('azza_theme')==='dark');
  document.getElementById('total-courses').textContent=COURSES.length;
  buildSidebar();
  buildHome();
  updateReadCount();
  window.addEventListener('scroll', updateProgress);
})();

function buildSidebar(){
  const list=document.getElementById('cat-list');
  const allCount=COURSES.length;
  list.innerHTML=`<li class="cat-item active" onclick="filterCat('all',this)"><span class="cat-item-ic">📖</span>الكل<span class="cat-count">${allCount}</span></li>`;
  CATS.forEach(c=>{
    const count=COURSES.filter(x=>x.cat===c.id).length;
    list.innerHTML+=`<li class="cat-item" onclick="filterCat('${c.id}',this)"><span class="cat-item-ic">${c.icon}</span>${c.name}<span class="cat-count">${count}</span></li>`;
  });
}

function buildHome(){
  /* Featured */
  const featured=COURSES.filter(c=>c.isNew)[0];
  if(featured){
    document.getElementById('featured-wrap').innerHTML=`
      <div class="featured-card" onclick="openArt('${featured.id}')">
        <div class="feat-badge">✨ جديد</div>
        <div class="feat-title">${featured.emoji} ${featured.title}</div>
        <div class="feat-desc">${featured.desc}</div>
        <div class="feat-meta">
          <span>⏱ ${featured.time}</span>
          <span>📊 ${featured.level}</span>
          <span>🆓 مجاني</span>
        </div>
      </div>`;
  }

  /* All sections */
  let html='';
  CATS.forEach(c=>{
    const courses=COURSES.filter(x=>x.cat===c.id);
    if(!courses.length) return;
    html+=`
      <div class="sec-header">
        <div class="sec-title">${c.icon} ${c.name}</div>
        <span class="sec-more" onclick="filterCat('${c.id}',null)">عرض الكل ←</span>
      </div>
      <div class="courses-grid">
        ${courses.slice(0,3).map(buildCard).join('')}
      </div>`;
  });
  document.getElementById('all-sections').innerHTML=html;
}

function buildCard(course){
  const isRead=read.has(course.id);
  const cat=CATS.find(c=>c.id===course.cat);
  return`<div class="course-card" onclick="openArt('${course.id}')">
    <div class="course-thumb" style="background:${cat?.color||'#1c5b38'}18">${course.emoji}</div>
    <div class="course-body">
      <div class="course-cat">${cat?.icon} ${cat?.name}${isRead?' <span style="color:#22c55e">✓ مقروء</span>':''}</div>
      <div class="course-title">${course.title}</div>
      <div class="course-desc">${course.desc}</div>
      <div class="course-meta">
        <span class="course-badge badge-free">🆓 مجاني</span>
        ${course.isNew?'<span class="course-badge badge-new">✨ جديد</span>':''}
        <span>⏱ ${course.time}</span>
        <span>📊 ${course.level}</span>
      </div>
    </div>
  </div>`;
}

function filterCat(cat, btn){
  currentCat=cat;
  if(btn){
    document.querySelectorAll('.cat-item').forEach(i=>i.classList.toggle('active',i===btn));
  }

  const courses=cat==='all'?COURSES:COURSES.filter(c=>c.cat===cat);
  const catObj=CATS.find(c=>c.id===cat);

  document.getElementById('featured-wrap').innerHTML='';
  document.getElementById('all-sections').innerHTML=`
    <div class="sec-header">
      <div class="sec-title">${catObj?catObj.icon+' '+catObj.name:'📖 جميع المقالات'}</div>
    </div>
    <div class="courses-grid">${courses.map(buildCard).join('')}</div>`;
}

function openArt(id){
  currentArt=id;
  const art=COURSES.find(c=>c.id===id);
  if(!art) return;

  /* علّم كمقروء */
  read.add(id);
  localStorage.setItem('azza_academy_read',JSON.stringify([...read]));
  updateReadCount();
  updateLastRead(art.title);

  const cat=CATS.find(c=>c.cat===art.cat||c.id===art.cat);
  const related=COURSES.filter(c=>art.related?.includes(c.id)).slice(0,3);

  document.getElementById('art-content').innerHTML=`
    <div class="art-header">
      <span class="art-cat-tag">${cat?.icon||'📖'} ${cat?.name||'أكاديمية AZZA'}</span>
      <h1 class="art-title">${art.emoji} ${art.title}</h1>
      <div class="art-meta">
        <span>⏱ ${art.time}</span>
        <span>📊 ${art.level}</span>
        <span>🆓 مجاني</span>
        ${read.has(id)?'<span style="color:#22c55e;font-weight:700">✓ قرأته</span>':''}
      </div>
    </div>
    ${art.video?`
    <div style="margin-bottom:4px;font-size:13px;font-weight:700;color:var(--sub);display:flex;align-items:center;gap:6px">
      <span style="width:20px;height:20px;background:#ff0000;border-radius:5px;display:inline-flex;align-items:center;justify-content:center">▶</span>
      فيديو تعليمي
    </div>
    ${yt(art.video, art.videoTitle)}`:''}
    <div class="art-body">${art.body}</div>
    <div class="art-footer">
      <div class="art-tags">${(art.tags||[]).map(t=>`<span class="art-tag" onclick="doSearch('${t}')">#${t}</span>`).join('')}</div>
      ${related.length?`
        <div style="font-size:15px;font-weight:900;margin-bottom:14px">📖 مقالات ذات صلة</div>
        <div class="related-grid">
          ${related.map(r=>`<div class="related-card" onclick="openArt('${r.id}')">
            <div class="related-cat">${CATS.find(c=>c.id===r.cat)?.icon} ${CATS.find(c=>c.id===r.cat)?.name||''}</div>
            <div class="related-title">${r.emoji} ${r.title}</div>
          </div>`).join('')}
        </div>`:''}
      <div style="margin-top:28px;text-align:center">
        <button onclick="shareArt('${art.title}')" style="padding:10px 24px;border-radius:99px;border:1.5px solid var(--olive);background:none;color:var(--olive);font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-left:8px">🔗 مشاركة</button>
        <button onclick="closeArt()" style="padding:10px 24px;border-radius:99px;border:none;background:var(--olive);color:#fff;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer">← العودة</button>
      </div>
    </div>`;

  document.getElementById('home-view').style.display='none';
  document.getElementById('art-view').classList.add('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

function closeArt(){
  currentArt=null;
  document.getElementById('art-view').classList.remove('open');
  document.getElementById('home-view').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function doSearch(q){
  q=q.toLowerCase().replace('#','');
  document.getElementById('srch').value=q;
  const results=COURSES.filter(c=>
    c.title.toLowerCase().includes(q)||
    c.desc.toLowerCase().includes(q)||
    (c.tags||[]).some(t=>t.includes(q))
  );
  document.getElementById('featured-wrap').innerHTML='';
  document.getElementById('all-sections').innerHTML=`
    <div class="sec-header">
      <div class="sec-title">🔍 نتائج "${q}" (${results.length})</div>
    </div>
    <div class="courses-grid">${results.length?results.map(buildCard).join(''):'<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--sub)">لا نتائج — جرّب كلمة أخرى</div>'}</div>`;
  document.querySelectorAll('.cat-item').forEach(i=>i.classList.remove('active'));
}

function updateReadCount(){
  document.getElementById('read-count').textContent=`${read.size} مقال مقروء`;
}

function updateLastRead(title){
  document.getElementById('last-read').innerHTML=`<div style="cursor:pointer;color:var(--olive);font-weight:700" onclick="openArt('${currentArt}')">${title.substring(0,30)}${title.length>30?'...':''}</div>`;
}

function updateProgress(){
  const el=document.getElementById('art-view');
  if(!el.classList.contains('open')) return;
  const scrollTop=window.scrollY;
  const docH=document.body.scrollHeight-window.innerHeight;
  const pct=Math.min((scrollTop/docH)*100,100);
  document.getElementById('progress').style.width=pct+'%';
}

function shareArt(title){
  const url=location.href+'#'+currentArt;
  navigator.clipboard?.writeText(url).then(()=>alert('تم نسخ رابط المقال: '+url));
}
</script>
</body>
</html>
