<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>مساعد AZZA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{
  --gold:#c69749;--olive:#1c5b38;--olive-d:#0e3622;--olive-l:#e8f4ed;
  --cream:#f7f1e3;--cream2:#ece0c8;--ink:#1c1a14;--muted:#6b6555;
  --card:#fff;--line:rgba(28,26,20,.08);
  --user-bg:linear-gradient(135deg,#1c5b38,#0e3622);
  --bot-bg:#fff;
}
.dark{
  --cream:#141410;--cream2:#1e1e16;--ink:#f0e8d0;--muted:#9a9080;
  --card:#1e1e16;--line:rgba(255,255,255,.06);--bot-bg:#252520;--olive-l:rgba(28,91,56,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:Tajawal,sans-serif;background:var(--cream);color:var(--ink);direction:rtl;display:flex;flex-direction:column}

/* ── Header ── */
.hdr{height:56px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;position:relative}
.hdr-av{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--olive),var(--olive-d));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr-info{flex:1}
.hdr-name{font-size:15px;font-weight:900;color:var(--ink)}
.hdr-status{font-size:11px;color:var(--olive);display:flex;align-items:center;gap:4px}
.hdr-status::before{content:'';width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block}
.hdr-btn{width:34px;height:34px;border-radius:10px;background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s}
.hdr-btn:hover{background:var(--cream2);color:var(--olive)}
.hdr-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── Chat ── */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:0}

/* ── Messages ── */
.msg{display:flex;gap:10px;max-width:100%;animation:pop .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.msg.bot{align-items:flex-end}
.msg.user{align-items:flex-end;flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.bot .msg-av{background:linear-gradient(135deg,var(--olive),var(--olive-d))}
.msg.user .msg-av{background:linear-gradient(135deg,var(--gold),#e8b96a);color:var(--olive-d);font-weight:700;font-size:13px}
.bubble{max-width:78%;padding:11px 15px;font-size:14px;line-height:1.75}
.msg.bot  .bubble{background:var(--bot-bg);border:1px solid var(--line);border-radius:16px 16px 16px 4px;color:var(--ink)}
.msg.user .bubble{background:var(--user-bg);border-radius:16px 16px 4px 16px;color:#fff}
.bubble strong{font-weight:700}
.bubble ul{margin:8px 0 4px 16px}
.bubble li{margin-bottom:6px}
.bubble .step{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.bubble .sn{width:22px;height:22px;border-radius:50%;background:var(--olive);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.bubble .sn-u{background:rgba(255,255,255,.25)}
.tip-box{background:var(--olive-l);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:13px;color:var(--olive)}
.dark .tip-box{color:#7dffcc}
.msg-time{font-size:10px;opacity:.45;margin-top:4px;text-align:right}
.msg.user .msg-time{text-align:left}

/* ── Options ── */
.opts{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 0 42px;animation:pop .25s ease}
.opt{padding:9px 16px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;transition:.2s;text-align:right}
.opt:hover{border-color:var(--olive);background:var(--olive-l);color:var(--olive)}
.opt.other{border-style:dashed;color:var(--muted)}
.opt.other:hover{border-color:var(--gold);background:rgba(198,151,73,.06);color:var(--gold)}

/* ── Typing ── */
.typing-row{display:flex;gap:10px;align-items:flex-end}
.typing-bbl{background:var(--bot-bg);border:1px solid var(--line);border-radius:16px 16px 16px 4px;padding:13px 16px;display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Input ── */
.inp-bar{padding:10px 14px;background:var(--card);border-top:1px solid var(--line);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp-wrap{flex:1;background:var(--cream2);border:1.5px solid var(--line);border-radius:16px;display:flex;align-items:flex-end;padding:8px 10px;gap:6px;transition:.2s}
.inp-wrap:focus-within{border-color:var(--olive)}
.inp-ta{flex:1;background:none;border:none;font-family:Tajawal,sans-serif;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:22px;max-height:100px;line-height:1.5}
.inp-ta::placeholder{color:var(--muted)}
.send{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--olive),var(--olive-d));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(14,54,34,.2);transition:.2s}
.send:disabled{background:var(--cream2);box-shadow:none;cursor:not-allowed}
.send svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── Welcome ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:32px 20px}
.welcome-em{font-size:52px;margin-bottom:4px}
.welcome-t{font-size:20px;font-weight:900;color:var(--olive)}
.welcome-s{font-size:14px;color:var(--muted);max-width:340px;line-height:1.7}
</style>
</head>

async function loadKB(){
  const [a,f]=await Promise.all([
    db.from('help_articles').select('id,title,summary,body,keywords,alt_questions,category_slug').eq('is_published',true),
    db.from('help_faqs').select('question,answer,keywords').eq('is_published',true),
  ]);
  KB      = (a.data||[]).map(r=>({
    id:r.id, cat:r.category_slug||'', title:r.title,
    tags:[...(r.keywords||[]),...(r.alt_questions||[])],
    answer:cleanMd(r.body||r.summary||''),
  }));
  KB_FAQS = (f.data||[]).map(r=>({title:r.question,tags:r.keywords||[],answer:r.answer,cat:'faq'}));
}

function cleanMd(t){
  return t.replace(/##\s/g,'').replace(/\*\*/g,'').replace(/\n{3,}/g,'\n\n').trim();

/* ══════════════════════════════════════════════
   محرك عرض الرسائل
   ══════════════════════════════════════════════ */
const chat = document.getElementById('chat');

function rmWelcome(){ document.getElementById('welcome')?.remove(); }

function addBot(html, time=true){
  rmWelcome();
  const d=document.createElement('div');
  d.className='msg bot';
  d.innerHTML=`<div class="msg-av">🤖</div>
    <div><div class="bubble">${html}</div>${time?`<div class="msg-time">${now()}</div>`:''}</div>`;
  chat.appendChild(d);
  scroll();
}

function addUser(text){
  rmWelcome();
  const d=document.createElement('div');
  d.className='msg user';
  d.innerHTML=`<div class="msg-av">${myIni}</div>
    <div><div class="bubble">${esc(text)}</div><div class="msg-time">${now()}</div></div>`;
  chat.appendChild(d);
  scroll();
}

function addOpts(opts){
  const d=document.createElement('div');
  d.className='opts';
  d.innerHTML=opts.map(o=>`<button class="opt${o.other?' other':''}" onclick="handleOpt(${JSON.stringify(o).replace(/"/g,'&quot;')})">${o.label}</button>`).join('');
  chat.appendChild(d);
  scroll();
}

function removeOpts(){ chat.querySelectorAll('.opts').forEach(o=>o.remove()); }

function scroll(){ setTimeout(()=>chat.scrollTop=chat.scrollHeight,50); }

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTyping(){
  const d=document.createElement('div');
  d.className='typing-row'; d.id='typing';
  d.innerHTML=`<div class="msg-av" style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#1c5b38,#0e3622);display:flex;align-items:center;justify-content:center;font-size:14px">🤖</div>
    <div class="typing-bbl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(d); scroll();
}
function hideTyping(){ document.getElementById('typing')?.remove(); }

/* ── بناء HTML للإجابة ── */
function buildAnswer(ans){
  let h=`<strong>${ans.title}</strong>`;
  if(ans.body) h+=`<br><br>${ans.body.replace(/\n/g,'<br>')}`;
  if(ans.steps){
    h+=ans.body?'<br>':'<br><br>';
    h+=ans.steps.map((s,i)=>`<div class="step"><div class="sn">${i+1}</div><div>${s}</div></div>`).join('');
  }
  if(ans.list){
    h+=`<ul style="margin-top:8px">${ans.list.map(l=>`<li>${l}</li>`).join('')}</ul>`;
  }
  if(ans.tip)  h+=`<div class="tip-box">💡 ${ans.tip}</div>`;
  if(ans.warn) h+=`<div class="tip-box" style="background:rgba(198,151,73,.1);color:#854F0B">⚠️ ${ans.warn}</div>`;
  return h;
}

/* ══════════════════════════════════════════════
   منطق المحادثة
   ══════════════════════════════════════════════ */
async function handleOpt(opt){
  removeOpts();
  addUser(opt.label.replace(/[🚀👤📝💬💰💼🎓🔧✏️]/g,'').trim());
  await sleep(400);

  if(opt.ans){
    /* إجابة مباشرة */
    const ans = ANSWERS[opt.ans];
    if(ans){
      /* لو فيه meta (مثل نوع الوظيفة) */
      if(opt.meta){
        const modAns={...ans,title:`البحث عن وظائف ${opt.meta}`};
        showTyping(); await sleep(600); hideTyping();
        addBot(buildAnswer(modAns));
      }else{
        showTyping(); await sleep(600); hideTyping();
        addBot(buildAnswer(ans));
      }
      /* اعرض Supabase نتائج ذات صلة */
      const kbRes = searchKB(ans.title);
      if(kbRes.length>1){
        await sleep(300);
        addBot(`<strong>مقالات ذات صلة:</strong><ul style="margin-top:8px">${kbRes.slice(1,4).map(r=>`<li>${r.title}</li>`).join('')}</ul>`);
      }
      if(ans.back){
        await sleep(400);
        addBot('هل تريد مساعدة في شيء آخر؟');
        addOpts([{label:'نعم، موضوع آخر',next:'root'},{label:'لا، شكراً 😊',ans:'done'}]);
      }
    }
  }else if(opt.next==='free'){
    showTyping(); await sleep(400); hideTyping();
    addBot('تفضّل، اكتب سؤالك وسأبحث لك عن الإجابة 👇');
  }else if(opt.next==='root'||!opt.next){
    await goRoot();
  }else if(opt.next){
    const node=TREE[opt.next];
    if(node){
      showTyping(); await sleep(400); hideTyping();
      addBot(node.msg);
      if(node.opts.length) addOpts(node.opts);
    }
  }else if(opt.ans==='done'){
    addBot('أتمنى لك تجربة رائعة على AZZA! 🌟');
  }
}

async function goRoot(){
  showTyping(); await sleep(400); hideTyping();
  const node=TREE.root;
  addBot(node.msg);
  addOpts(node.opts);
}

/* ── بحث في KB ── */
function searchKB(q){
  q=q.toLowerCase().trim();
  if(!q) return[];
  const all=[...KB,...KB_FAQS];
  const w=q.split(/\s+/);
  return all.map(item=>{
    let s=0;
    const h=(item.title+' '+(item.tags||[]).join(' ')+' '+(item.answer||'')).toLowerCase();
    if(h.includes(q)) s+=10;
    w.forEach(ww=>{ if(ww.length>1){if(item.title.toLowerCase().includes(ww))s+=5;if((item.tags||[]).some(t=>t.includes(ww)))s+=3;if((item.answer||'').toLowerCase().includes(ww))s+=1;} });
    return{item,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.item);
}

/* ── إرسال نص حر ── */
async function send(){
  const ta=document.getElementById('inp');
  const text=ta.value.trim();
  if(!text) return;
  ta.value=''; ta.style.height='auto';
  removeOpts();
  addUser(text);
  showTyping();
  await sleep(700);
  hideTyping();

  /* بحث في ANSWERS أولاً */
  const matchKey=Object.keys(ANSWERS).find(k=>ANSWERS[k].title.includes(text)||text.includes(ANSWERS[k].title));
  if(matchKey){
    addBot(buildAnswer(ANSWERS[matchKey]));
    await sleep(400);
    addBot('هل تريد مساعدة في شيء آخر؟');
    addOpts([{label:'نعم',next:'root'},{label:'لا، شكراً 😊',ans:'done'}]);
    return;
  }

  /* بحث في Supabase KB */
  const res=searchKB(text);
  if(res.length){
    const best=res[0];
    let h=`<strong>${best.title}</strong><br><br>${(best.answer||'').replace(/\n/g,'<br>').substring(0,400)}`;
    if((best.answer||'').length>400) h+='...';
    addBot(h);
    if(res.length>1){
      await sleep(300);
      addBot(`<strong>مقالات ذات صلة:</strong><ul style="margin-top:8px">${res.slice(1,4).map(r=>`<li>${r.title}</li>`).join('')}</ul>`);
    }
    await sleep(400);
    addBot('هل أجبت على سؤالك؟');
    addOpts([{label:'نعم، شكراً 😊',ans:'done'},{label:'لا، أريد المزيد',next:'root'}]);
    /* تسجيل البحث */
    db.from('help_failed_searches').insert({query:text}).then(()=>{});
  }else{
    /* لم يُعثر */
    addBot(`لم أجد إجابة لـ "<strong>${esc(text)}</strong>" في قاعدة المعرفة حالياً 🙁<br><br>يمكنك:<br>• تصفح <a href="help.html" style="color:var(--olive);font-weight:700">مركز المساعدة</a><br>• التواصل مع الدعم: support@azzaworld.com`);
    db.from('help_failed_searches').insert({query:text}).then(()=>{});
    await sleep(400);
    addOpts([{label:'العودة للقائمة الرئيسية',next:'root'}]);
  }
}

function resetChat(){
  chat.innerHTML=''; isTyping=false;
  goRoot();
}

function autoR(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ── Themes ── */
(()=>document.body.classList.toggle('dark',localStorage.getItem('azza_theme')==='dark'))();

/* ── Init ── */
(async()=>{
  await loadKB();
  await goRoot();
})();
