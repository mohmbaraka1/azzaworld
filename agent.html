<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مساعد AZZA الذكي</title>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{
  --gold:#c69749;--gold-s:#e8b96a;--olive:#1c5b38;--olive-d:#0e3622;
  --cream:#f7f1e3;--cream2:#ece0c8;--ink:#1c1a14;--muted:#6b6555;
  --line:rgba(28,26,20,.1);--card:#fff;
}
.dark{--cream:#1a1a12;--cream2:#222218;--ink:#f0e8d0;--muted:#9a9080;--line:rgba(255,255,255,.08);--card:#242418}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:var(--cream);color:var(--ink);direction:rtl;height:100vh;display:flex;flex-direction:column}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0}
.back-btn{width:36px;height:36px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s}
.back-btn:hover{background:var(--cream2);color:var(--olive)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.agent-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-d));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.agent-info{flex:1}
.agent-name{font-size:15px;font-weight:700}
.agent-status{font-size:12px;color:var(--olive)}
.header-actions{display:flex;gap:6px}
.hdr-btn{width:34px;height:34px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s}
.hdr-btn:hover{background:var(--cream2);color:var(--olive)}
.hdr-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Suggestions */
.suggestions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--line);background:var(--card)}
.sug-btn{padding:7px 14px;border-radius:99px;border:1.5px solid var(--line);background:none;font-family:Tajawal,sans-serif;font-size:13px;color:var(--ink);cursor:pointer;transition:.2s;white-space:nowrap}
.sug-btn:hover{border-color:var(--gold);background:rgba(198,151,73,.05)}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--cream2);border-radius:99px}
.msg{display:flex;gap:10px;animation:fadeUp .2s ease;max-width:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.user .msg-av{background:linear-gradient(135deg,var(--gold),var(--gold-s));color:var(--olive-d)}
.msg.bot .msg-av{background:linear-gradient(135deg,var(--olive),var(--olive-d));color:var(--gold);font-size:16px}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.7}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--olive),var(--olive-d));color:#fff;border-bottom-right-radius:4px}
.msg.bot  .msg-bubble{background:var(--card);border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.5;margin-top:4px;text-align:left}
.msg.user .msg-time{text-align:right}

/* Article Card */
.art-card{background:var(--cream2);border-radius:10px;padding:12px 14px;margin-top:8px;cursor:pointer;border:1px solid var(--line);transition:.15s;display:block;text-decoration:none;color:var(--ink)}
.art-card:hover{border-color:var(--gold)}
.art-card-title{font-size:13px;font-weight:700;margin-bottom:4px}
.art-card-cat{font-size:11px;color:var(--muted)}
.more-link{display:inline-flex;align-items:center;gap:4px;color:var(--olive);font-size:13px;font-weight:700;margin-top:8px;cursor:pointer}

/* Typing */
.typing{display:flex;gap:4px;align-items:center;padding:12px 16px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Input */
.input-bar{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:flex-end;background:var(--card);flex-shrink:0}
.input-wrap{flex:1;border:1.5px solid var(--line);border-radius:22px;background:var(--cream2);display:flex;align-items:flex-end;padding:6px 8px 6px 12px;gap:6px;transition:.2s}
.input-wrap:focus-within{border-color:var(--olive)}
.msg-ta{flex:1;border:none;background:transparent;font-family:Tajawal,sans-serif;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:24px;max-height:100px;line-height:1.5;padding:2px 0}
.msg-ta::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-d));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;box-shadow:0 2px 8px rgba(14,54,34,.25)}
.send-btn:disabled{background:var(--cream2);box-shadow:none;cursor:not-allowed}
.send-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;gap:12px}
.welcome-icon{font-size:56px}
.welcome-title{font-size:22px;font-weight:900;color:var(--olive)}
.welcome-sub{font-size:14px;color:var(--muted);max-width:360px;line-height:1.7}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;z-index:9999;opacity:0;transition:.3s;pointer-events:none;font-family:Tajawal,sans-serif}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="back-btn" onclick="location.href='app.html'">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="agent-av">🤖</div>
  <div class="agent-info">
    <div class="agent-name">مساعد AZZA</div>
    <div class="agent-status">● متاح دائماً</div>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="clearChat()" title="محادثة جديدة">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.61"/></svg>
    </button>
    <button class="hdr-btn" onclick="location.href='help.html'" title="مركز المساعدة">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
  </div>
</div>

<!-- Suggestions -->
<div class="suggestions" id="suggestions">
  <button class="sug-btn" onclick="ask('كيف أنشر فكرة؟')">💡 كيف أنشر فكرة؟</button>
  <button class="sug-btn" onclick="ask('كيف أراسل مستخدم؟')">💬 كيف أراسل مستخدم؟</button>
  <button class="sug-btn" onclick="ask('ما هو NDA؟')">🔒 ما هو NDA؟</button>
  <button class="sug-btn" onclick="ask('لماذا لا تصلني إشعارات؟')">🔔 مشكلة الإشعارات</button>
  <button class="sug-btn" onclick="ask('كيف أوثق حسابي؟')">✅ التوثيق</button>
</div>

<!-- Chat -->
<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <div class="welcome-title">مرحباً بك في مساعد AZZA</div>
    <div class="welcome-sub">أنا مساعدك الذكي المتخصص في منصة AZZA. اسألني أي شيء عن المنصة وسأجيبك فوراً من قاعدة المعرفة.</div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea class="msg-ta" id="msg-ta" placeholder="اكتب سؤالك هنا..." rows="1"
      oninput="autoR(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   AZZA Assistant — Knowledge Base Engine
   لا Gemini، لا API خارجي — كل شيء محلي
   ══════════════════════════════════════════════ */

/* ── قاعدة المعرفة ── */
const KB = [
  {id:'create-account', cat:'البداية', title:'كيف أنشئ حساباً على AZZA؟',

   answer:'لإنشاء حساب على AZZA:\n1. افتح صفحة التسجيل\n2. اختر نوع حسابك (صاحب فكرة / خبير / مستثمر / شركة)\n3. أدخل اسمك وبريدك وكلمة المرور\n4. اختر موقعك\n5. اضغط "إنشاء الحساب"\n\nيمكنك أيضاً التسجيل بـGoogle بضغطة واحدة!'},

  {id:'first-post', cat:'البداية', title:'كيف أنشر فكرة أو مشروع؟',
   tags:['نشر','فكرة','مشروع','منشور','جديد','ابداء'],
   answer:'لنشر فكرتك على AZZA:\n1. افتح الفيد الرئيسي\n2. اضغط زر "✦ نشر فكرة"\n3. اختر النوع: فكرة / مشروع / وظيفة\n4. اكتب العنوان والوصف واختر الفئة\n5. اضغط "نشر"\n\nيمكنك إضافة صورة أو فيديو لزيادة جاذبية منشورك!'},

  {id:'nda', cat:'المنشورات', title:'ما هو NDA وكيف أستخدمه؟',
   tags:['nda','سرية','حماية','اتفاقية','افصاح'],
   answer:'NDA (اتفاقية عدم الإفصاح) يحمي فكرتك.\n\nعند تفعيله، يجب على أي مستخدم يريد إبداء اهتمامه التوقيع على الاتفاقية أولاً.\n\nلتفعيله: عند نشر فكرة، فعّل خيار "🔒 حماية NDA".\n\nمناسب للأفكار الحساسة التي لم تُطلق بعد.'},

  {id:'notif-missing', cat:'الإشعارات', title:'لماذا لا تصلني الإشعارات؟',
   tags:['اشعار','اشعارات','لا يصل','مشكلة','بلاغ'],

   answer:'لتوثيق حسابك على AZZA:\n1. افتح صفحة التوثيق\n2. أكمل بيانات حسابك\n3. ارفع وثائق الهوية المطلوبة\n4. انتظر مراجعة الفريق\n\nبعد التوثيق ستظهر شارة ✅ على ملفك الشخصي وتزيد مصداقيتك.'},

   tags:['استثمار','مستثمر','فرصة','مشروع','تمويل'],
   answer:'لإيجاد فرص الاستثمار على AZZA:\n• الفيد الرئيسي: فلتر "مشاريع"\n• لوحة المستثمر: صفحة مخصصة للفرص\n• البحث: ابحث بكلمات مثل "تقنية" أو "صحة"\n• الخريطة: اكتشف الفرص جغرافياً\n\nلإبداء اهتمامك: افتح المشروع واضغط "⭐ اهتمام".'},

   tags:['تعديل','ملف','صورة','اسم','بيو','profile'],
   answer:'لتعديل ملفك الشخصي:\n1. روح الإعدادات (Settings)\n2. عدّل الاسم أو البيو أو الصورة\n3. اضغط "حفظ التغييرات"\n\nالتغييرات تُحفظ فوراً وتظهر لجميع المستخدمين.'},

  {id:'login-issues', cat:'حل المشاكل', title:'لا أستطيع تسجيل الدخول',
   tags:['دخول','تسجيل','خطأ','كلمة مرور','مشكلة','بريد'],
   answer:'مشاكل تسجيل الدخول وحلولها:\n1. كلمة مرور خاطئة → اضغط "نسيت كلمة المرور"\n2. بريد غير مسجّل → تأكد من البريد الصحيح\n3. مشكلة كاش → Ctrl+Shift+R\n4. سجّلت بـGoogle → استخدم نفس الطريقة\n\nإذا لم ينجح أي حل، تواصل مع الدعم.'},

  {id:'image-upload', cat:'حل المشاكل', title:'الصور لا تُرفع أو لا تظهر',

   tags:['متابعة','follow','مستخدم','تابع'],
   answer:'لمتابعة مستخدم:\n1. افتح صفحته الشخصية\n2. اضغط زر "+" أو "متابعة"\n\nعند متابعتك، يصل له إشعار. يمكنك إلغاء المتابعة في أي وقت من نفس الزر.'},

  {id:'msg-features', cat:'الرسائل', title:'مميزات نظام الرسائل',
   tags:['رسالة','مميزات','صورة','حذف','تعديل','قراءة'],
   answer:'مميزات نظام الرسائل في AZZA:\n✓ رسائل فورية بدون تحديث\n✓ حالة القراءة ✓✓\n✓ مؤشر الكتابة (يكتب...)\n✓ إرسال صور وملفات\n✓ رد على رسالة محددة\n✓ تعديل وحذف الرسائل\n✓ توجيه الرسائل لمحادثات أخرى'},

  {id:'privacy', cat:'الخصوصية', title:'إعدادات الخصوصية',
   tags:['خصوصية','privacy','مراسلة','من يرى','اعدادات'],
   answer:'إعدادات الخصوصية في AZZA:\n\nمن يستطيع مراسلتك:\n• الجميع — أي مستخدم\n• المتابعون فقط\n• لا أحد\n\nلتغيير هذا: الإعدادات → الخصوصية → من يستطيع مراسلتك'},

  {id:'search', cat:'البحث', title:'كيف أبحث عن أفكار أو مستخدمين؟',
   tags:['بحث','search','ايجاد','تصفح'],
   answer:'البحث في AZZA:\n1. استخدم شريط البحث في أعلى الفيد\n2. ابحث باسم المستخدم أو الفكرة أو الكلمة المفتاحية\n3. فلتر النتائج حسب النوع (أفكار / مشاريع / وظائف / مستخدمون)\n4. استخدم الخريطة للبحث الجغرافي'},

  {id:'slow', cat:'حل المشاكل', title:'المنصة بطيئة أو لا تستجيب',
   tags:['بطيء','بطيئة','لا تعمل','مشكلة','تجمد'],
   answer:'حلول بطء المنصة:\n1. Ctrl+Shift+R (Hard Refresh)\n2. أغلق التبويبات الأخرى\n3. جرّب Chrome أو Edge\n4. تحقق من الإنترنت\n\nإذا استمرت المشكلة، تواصل مع الدعم.'},
];

/* ── محرك البحث ── */
function search(query){
  query = query.toLowerCase().trim();
  if(!query) return [];

  const words = query.split(/\s+/);

  const scored = KB.map(item => {
    let score = 0;
    const haystack = (item.title + ' ' + item.tags.join(' ') + ' ' + item.answer + ' ' + item.cat).toLowerCase();

    /* تطابق كامل */
    if(haystack.includes(query)) score += 10;

    /* تطابق كلمات */
    words.forEach(w => {
      if(w.length < 2) return;
      if(item.title.toLowerCase().includes(w)) score += 5;
      if(item.tags.some(t => t.includes(w))) score += 4;
      if(item.answer.toLowerCase().includes(w)) score += 2;
      if(item.cat.toLowerCase().includes(w)) score += 1;
    });

    return {item, score};
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score);

  return scored.map(x => x.item);
}

/* ── الوقت ── */
const now = () => new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});

/* ── إضافة رسالة ── */
function addMsg(text, role='bot', articles=[]){
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;

  const av = role==='user'
    ? `<div class="msg-av">${(me?.name||'أ')[0]}</div>`
    : `<div class="msg-av">🤖</div>`;

  /* تحويل \n لـ<br> */
  const html = text.replace(/\n/g,'<br>');

  /* بطاقات المقالات */
  const cards = articles.slice(0,3).map(a=>`
    <a class="art-card" onclick="ask('${a.title.replace(/'/g,"\\'")}')">
      <div class="art-card-title">📄 ${a.title}</div>
      <div class="art-card-cat">${a.cat}</div>
    </a>`).join('');

  const moreLink = articles.length > 3
    ? `<div class="more-link" onclick="location.href='help.html'">عرض كل المقالات ←</div>`
    : '';

  div.innerHTML = `${role==='bot'?av:''}
    <div style="flex:1;min-width:0">
      <div class="msg-bubble">${html}${cards}${moreLink}</div>
      <div class="msg-time">${now()}</div>
    </div>
    ${role==='user'?av:''}`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* ── مؤشر الكتابة ── */
let typingEl = null;
function showTyping(){
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div');
  typingEl.className = 'msg bot';
  typingEl.innerHTML = `<div class="msg-av">🤖</div><div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping(){ typingEl?.remove(); typingEl=null; }

/* ── الإرسال ── */
const me = JSON.parse(localStorage.getItem('azza_user')||'null');
if(!me) location.href='login.html';

async function sendMsg(){
  const ta  = document.getElementById('msg-ta');
  const text = ta.value.trim();
  if(!text) return;
  ta.value=''; ta.style.height='auto';

  /* إخفاء الاقتراحات بعد أول رسالة */
  document.getElementById('suggestions').style.display='none';

  addMsg(text,'user');
  showTyping();

  /* محاكاة تفكير 600ms */
  await new Promise(r=>setTimeout(r,600));
  hideTyping();

  const results = search(text);

  if(!results.length){
    addMsg('لم أجد إجابة لسؤالك في قاعدة المعرفة 🙁\n\nجرّب:\n• إعادة صياغة السؤال\n• تصفح <span style="color:var(--olive);cursor:pointer;font-weight:700" onclick="location.href=\'help.html\'">مركز المساعدة</span>\n• التواصل مع فريق الدعم');
  } else {
    const best = results[0];
    const related = results.slice(1);
    addMsg(best.answer, 'bot', related);
  }
}

function ask(q){
  document.getElementById('msg-ta').value=q;
  sendMsg();
}

function clearChat(){
  const chat = document.getElementById('chat');
  chat.innerHTML=`<div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <div class="welcome-title">مرحباً بك في مساعد AZZA</div>
    <div class="welcome-sub">أنا مساعدك الذكي المتخصص في منصة AZZA. اسألني أي شيء عن المنصة وسأجيبك فوراً من قاعدة المعرفة.</div>
  </div>`;
  document.getElementById('suggestions').style.display='flex';
}

function autoR(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}

/* الثيم */
const TK='azza_theme';
(()=>{document.body.classList.toggle('dark',localStorage.getItem(TK)==='dark');})();
</script>
