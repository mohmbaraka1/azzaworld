<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;900&display=swap');
:root{
  --g:#c69749;--o:#1c5b38;--od:#0e3622;--ol:rgba(28,91,56,.08);
  --bg:#f5f0e8;--bg2:#ede5d4;--card:#fff;--ink:#1a1814;--sub:#7a7060;
  --line:rgba(0,0,0,.07);--r:18px;
}
.dk{--bg:#141210;--bg2:#1c1a16;--card:#222018;--ink:#f0e8d0;--sub:#9a9080;--line:rgba(255,255,255,.07)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:Tajawal,sans-serif;background:var(--bg);color:var(--ink);direction:rtl;display:flex;flex-direction:column}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:12px;border:none;background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub)}
.hdr-back svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.hdr-av{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--o),var(--od));display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-info{flex:1}
.hdr-name{font-size:15px;font-weight:900}
.hdr-dot{font-size:11px;color:#22c55e;display:flex;align-items:center;gap:4px}
.hdr-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:#22c55e;display:block}
.hdr-act{width:36px;height:36px;border-radius:12px;border:none;background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:16px}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px}
.chat::-webkit-scrollbar{width:0}

/* Bot msg */
.bot-row{display:flex;gap:8px;align-items:flex-end}
.bot-av{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--o),var(--od));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bot-bbl{background:var(--card);border:1px solid var(--line);border-radius:var(--r) var(--r) var(--r) 4px;padding:12px 15px;max-width:82%;font-size:14px;line-height:1.75;color:var(--ink)}
.bot-bbl b{font-weight:700}
.bot-bbl ul{margin:8px 0 2px 18px}
.bot-bbl li{margin-bottom:5px}

/* User msg */
.user-row{display:flex;justify-content:flex-start;flex-direction:row-reverse;gap:8px;align-items:flex-end}
.user-av{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--g),#e8b96a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--od);flex-shrink:0}
.user-bbl{background:linear-gradient(135deg,var(--o),var(--od));border-radius:var(--r) var(--r) 4px var(--r);padding:12px 15px;max-width:82%;font-size:14px;line-height:1.75;color:#fff}

/* Step pills */
.steps{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.step{display:flex;gap:8px;align-items:flex-start}
.step-n{min-width:22px;height:22px;border-radius:8px;background:var(--o);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.step-t{font-size:13.5px;line-height:1.6}
.note{background:var(--ol);border-radius:10px;padding:9px 12px;margin-top:8px;font-size:13px;color:var(--o)}
.dk .note{color:#7dffcc;background:rgba(28,91,56,.2)}
.warn-note{background:rgba(198,151,73,.1);border-radius:10px;padding:9px 12px;margin-top:8px;font-size:13px;color:#7a4f00}
.dk .warn-note{color:#ffd78a;background:rgba(198,151,73,.15)}

/* Category Grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.cat-card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:.2s;text-align:center}
.cat-card:hover{border-color:var(--g);background:rgba(198,151,73,.05);transform:translateY(-2px)}
.cat-card:active{transform:scale(.96)}
.cat-em{font-size:26px;line-height:1}
.cat-lbl{font-size:12px;font-weight:700;color:var(--ink)}

/* Choice chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{padding:9px 15px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);font-family:Tajawal,sans-serif;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--o);background:var(--ol);color:var(--o)}
.chip:active{transform:scale(.95)}
.chip.other{border-style:dashed;color:var(--sub)}
.chip.other:hover{border-color:var(--g);color:var(--g)}
.chip-em{font-size:15px;line-height:1}

/* Suggest */
.suggest-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.sug{padding:7px 13px;border-radius:10px;background:var(--bg2);border:none;font-family:Tajawal,sans-serif;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:.2s}
.sug:hover{background:var(--ol);color:var(--o)}

/* Typing */
.typing-bbl{background:var(--card);border:1px solid var(--line);border-radius:var(--r) var(--r) var(--r) 4px;padding:13px 16px;display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--sub);animation:b .9s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Input */
.inp-bar{padding:10px 12px;background:var(--card);border-top:1px solid var(--line);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp-wrap{flex:1;background:var(--bg2);border:1.5px solid var(--line);border-radius:16px;padding:8px 12px;display:flex;align-items:flex-end;gap:6px;transition:.2s}
.inp-wrap:focus-within{border-color:var(--o)}
.inp-ta{flex:1;background:none;border:none;font-family:Tajawal,sans-serif;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:22px;max-height:90px;line-height:1.5}
.inp-ta::placeholder{color:var(--sub)}
.send-btn{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--o),var(--od));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(14,54,34,.2);flex-shrink:0}
.send-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* Pop animation */
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.pop{animation:pop .2s cubic-bezier(.34,1.3,.64,1)}
</style>
</head>

<script>

const chat  = document.getElementById('chat');
const now   = () => new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
const myIni = (me?.name||'م')[0];
const esc   = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ══ تحميل KB ══ */
async function loadKB(){
  const [a,f] = await Promise.all([
    db.from('help_articles').select('id,title,summary,body,keywords,alt_questions,category_slug').eq('is_published',true),
    db.from('help_faqs').select('question,answer,keywords').eq('is_published',true),
  ]);
  KB = (a.data||[]).map(r=>({
    title:r.title, cat:r.category_slug,
    tags:[...(r.keywords||[]),...(r.alt_questions||[])],
    ans:((r.body||r.summary||'').replace(/##\s/g,'').replace(/\*\*/g,'').trim()),
  }));
  KB_FAQS = (f.data||[]).map(r=>({
    title:r.question, cat:'faq',
    tags:r.keywords||[], ans:r.answer,
  }));
}

/* ══ إضافة رسائل ══ */
function addBot(html, delay=0){
  return new Promise(async res=>{
    if(delay) await sleep(delay);
    const d=document.createElement('div');
    d.className='bot-row pop';
    d.innerHTML=`<div class="bot-av">🤖</div><div class="bot-bbl">${html}</div>`;
    chat.appendChild(d); scroll(); res();
  });
}

function addUser(text){
  const d=document.createElement('div');
  d.className='user-row pop';
  d.innerHTML=`<div class="user-av">${myIni}</div><div class="user-bbl">${esc(text)}</div>`;
  chat.appendChild(d); scroll();
}

function addEl(el){ chat.appendChild(el); scroll(); }

function typing(){ const d=document.createElement('div'); d.className='bot-row pop'; d.id='typing'; d.innerHTML=`<div class="bot-av">🤖</div><div class="typing-bbl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`; chat.appendChild(d); scroll(); }
function rmTyping(){ document.getElementById('typing')?.remove(); }
function rmInteractive(){ chat.querySelectorAll('.cat-grid,.chips,.suggest-row').forEach(e=>e.remove()); }
function scroll(){ setTimeout(()=>chat.scrollTop=chat.scrollHeight,40); }
function ar(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }

async function showHome(){
  await addBot(`أهلاً ${me.name||''}! 👋<br>بأي موضوع تريد مساعدة اليوم؟`);
  const g=document.createElement('div');
  g.className='cat-grid pop';
  g.innerHTML=CATS.map(c=>`<div class="cat-card" onclick="pickCat('${c.id}','${c.em} ${c.lbl}')"><div class="cat-em">${c.em}</div><div class="cat-lbl">${c.lbl}</div></div>`).join('');
  addEl(g);
}

  assistant:{q:'كيف أساعدك بخصوص المساعد؟', chips:['كيف أستخدم المساعد؟','ما هي قدرات المساعد؟']},

async function pickCat(id, label){
  rmInteractive();
  addUser(label);
  typing(); await sleep(500); rmTyping();
  const cq = CAT_Q[id];
  if(!cq){ await addBot('سأبحث لك فوراً...'); return; }
  await addBot(cq.q);
  const c=document.createElement('div');
  c.className='chips pop';
  c.innerHTML=cq.chips.map(ch=>`<div class="chip" onclick="pickChip(this,'${esc(ch)}')">${ch}</div>`).join('');
  c.innerHTML+=`<div class="chip other" onclick="this.closest('.chips').remove();document.getElementById('inp').focus()">✏️ غير ذلك...</div>`;
  addEl(c);
}

/* ══ اختيار خيار ══ */
async function pickChip(el, text){

/* ══ بناء HTML للإجابة ══ */
function buildHTML(qa){
  let h='';
  if(qa.text) h+=`<span>${qa.text.replace(/\n/g,'<br>')}</span>`;
  if(qa.steps){
    h+='<div class="steps">';
    h+=qa.steps.map((s,i)=>`<div class="step"><div class="step-n">${i+1}</div><div class="step-t">${s}</div></div>`).join('');
    h+='</div>';
  }
  if(qa.list) h+=`<ul>${qa.list.map(l=>`<li>${l}</li>`).join('')}</ul>`;
  if(qa.note) h+=`<div class="note">💡 ${qa.note}</div>`;
  if(qa.warn) h+=`<div class="warn-note">⚠️ ${qa.warn}</div>`;
  return h;
}

async function answerQ(text){
  /* بحث في QA المدمج */
  const key = Object.keys(QA).find(k=>text.includes(k)||k.includes(text))||
               Object.keys(QA).find(k=>k.split(' ').some(w=>w.length>2&&text.includes(w)));
  if(key){
    const qa=QA[key];
    await addBot(buildHTML(qa));
    await showSugs(qa.sugs||[]);
    return;
  }

  /* بحث في Supabase KB */
  const res=searchKB(text);
  if(res.length){
    const best=res[0];
    let h=`<b>${best.title}</b><br><br>${(best.ans||'').substring(0,350).replace(/\n/g,'<br>')}`;
    if((best.ans||'').length>350) h+='...';
    await addBot(h);
    if(res.length>1){
      await sleep(300);
      await addBot(`<b>مقالات ذات صلة:</b><ul>${res.slice(1,4).map(r=>`<li>${r.title}</li>`).join('')}</ul>`);
    }
  }else{
    await addBot(`لم أجد إجابة لسؤالك في قاعدة المعرفة 🙁<br><br>يمكنك:<br>• تصفح <a href="help.html" style="color:var(--o);font-weight:700">مركز المساعدة</a><br>• التواصل مع الدعم: support@azzaworld.com`);
    db.from('help_failed_searches').insert({query:text}).then(()=>{});
  }
  await sleep(400);
  await showSugs(['نشر فكرة أو مشروع','كيف أنشئ حساباً؟','إيجاد فرص استثمار']);
}

async function showSugs(sugs){
  if(!sugs.length) sugs=['العودة للقائمة الرئيسية'];
  await sleep(200);
  const d=document.createElement('div');
  d.className='suggest-row pop';
  d.innerHTML=['🏠 القائمة الرئيسية',...sugs].map(s=>
    `<button class="sug" onclick="handleSug(this,'${esc(s)}')">${s}</button>`
  ).join('');
  addEl(d);
}

async function handleSug(btn, text){
  if(text==='🏠 القائمة الرئيسية'){ rmInteractive(); await goHome(); return; }
  rmInteractive();
  addUser(text);
  typing(); await sleep(600); rmTyping();
  await answerQ(text);
}

function searchKB(q){
  const all=[...KB,...KB_FAQS];
  const w=q.toLowerCase().split(/\s+/);
  return all.map(item=>{
    let s=0;
    const h=(item.title+' '+(item.tags||[]).join(' ')+' '+(item.ans||'')).toLowerCase();
    if(h.includes(q.toLowerCase())) s+=10;
    w.forEach(ww=>{ if(ww.length>1){ if(item.title.toLowerCase().includes(ww))s+=5; if((item.tags||[]).some(t=>t.includes(ww)))s+=3; if((item.ans||'').toLowerCase().includes(ww))s+=1; } });
    return{item,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.item);
}

async function sendFree(){
  const ta=document.getElementById('inp');
  const text=ta.value.trim();
  if(!text) return;
  ta.value=''; ta.style.height='auto';
  rmInteractive();
  addUser(text);
  typing(); await sleep(700); rmTyping();
  await answerQ(text);
}

async function goHome(){ await showHome(); }

async function resetChat(){
  chat.innerHTML='';
  await showHome();
}

(()=>document.documentElement.classList.toggle('dk',localStorage.getItem('azza_theme')==='dark'))();

(async()=>{
  await loadKB();
  await showHome();
})();
