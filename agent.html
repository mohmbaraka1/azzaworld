<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مساعد AZZA الذكي</title>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{
  --gold:#c69749;--gold-s:#e8b96a;--olive:#1c5b38;--olive-d:#0e3622;
  --cream:#f7f1e3;--cream2:#ece0c8;--ink:#1c1a14;--muted:#6b6555;
  --line:rgba(28,26,20,.1);--card:#fff;
}
.dark{--cream:#1a1a12;--cream2:#222218;--ink:#f0e8d0;--muted:#9a9080;--line:rgba(255,255,255,.08);--card:#242418}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:var(--cream);color:var(--ink);direction:rtl;height:100vh;display:flex;flex-direction:column}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0}
.back-btn{width:36px;height:36px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s}
.back-btn:hover{background:var(--cream2);color:var(--olive)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.agent-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-d));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.agent-info{flex:1}
.agent-name{font-size:15px;font-weight:700}
.agent-status{font-size:12px;color:var(--olive)}
.header-actions{display:flex;gap:6px}
.hdr-btn{width:34px;height:34px;border-radius:50%;background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s}
.hdr-btn:hover{background:var(--cream2);color:var(--olive)}
.hdr-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Suggestions */
.suggestions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--line);background:var(--card)}
.sug-btn{padding:7px 14px;border-radius:99px;border:1.5px solid var(--line);background:none;font-family:Tajawal,sans-serif;font-size:13px;color:var(--ink);cursor:pointer;transition:.2s;white-space:nowrap}
.sug-btn:hover{border-color:var(--gold);background:rgba(198,151,73,.05)}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--cream2);border-radius:99px}
.msg{display:flex;gap:10px;animation:fadeUp .2s ease;max-width:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.user .msg-av{background:linear-gradient(135deg,var(--gold),var(--gold-s));color:var(--olive-d)}
.msg.bot .msg-av{background:linear-gradient(135deg,var(--olive),var(--olive-d));color:var(--gold);font-size:16px}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.7}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--olive),var(--olive-d));color:#fff;border-bottom-right-radius:4px}
.msg.bot  .msg-bubble{background:var(--card);border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.5;margin-top:4px;text-align:left}
.msg.user .msg-time{text-align:right}

/* Article Card */
.art-card{background:var(--cream2);border-radius:10px;padding:12px 14px;margin-top:8px;cursor:pointer;border:1px solid var(--line);transition:.15s;display:block;text-decoration:none;color:var(--ink)}
.art-card:hover{border-color:var(--gold)}
.art-card-title{font-size:13px;font-weight:700;margin-bottom:4px}
.art-card-cat{font-size:11px;color:var(--muted)}
.more-link{display:inline-flex;align-items:center;gap:4px;color:var(--olive);font-size:13px;font-weight:700;margin-top:8px;cursor:pointer}

/* Typing */
.typing{display:flex;gap:4px;align-items:center;padding:12px 16px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Input */
.input-bar{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:flex-end;background:var(--card);flex-shrink:0}
.input-wrap{flex:1;border:1.5px solid var(--line);border-radius:22px;background:var(--cream2);display:flex;align-items:flex-end;padding:6px 8px 6px 12px;gap:6px;transition:.2s}
.input-wrap:focus-within{border-color:var(--olive)}
.msg-ta{flex:1;border:none;background:transparent;font-family:Tajawal,sans-serif;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:24px;max-height:100px;line-height:1.5;padding:2px 0}
.msg-ta::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-d));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;box-shadow:0 2px 8px rgba(14,54,34,.25)}
.send-btn:disabled{background:var(--cream2);box-shadow:none;cursor:not-allowed}
.send-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;gap:12px}
.welcome-icon{font-size:56px}
.welcome-title{font-size:22px;font-weight:900;color:var(--olive)}
.welcome-sub{font-size:14px;color:var(--muted);max-width:360px;line-height:1.7}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;z-index:9999;opacity:0;transition:.3s;pointer-events:none;font-family:Tajawal,sans-serif}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="back-btn" onclick="location.href='app.html'">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="agent-av">🤖</div>
  <div class="agent-info">
    <div class="agent-name">مساعد AZZA</div>
    <div class="agent-status">● متاح دائماً</div>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="clearChat()" title="محادثة جديدة">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.61"/></svg>
    </button>
    <button class="hdr-btn" onclick="location.href='help.html'" title="مركز المساعدة">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
  </div>
</div>

<!-- Suggestions -->
<div class="suggestions" id="suggestions">
  <button class="sug-btn" onclick="ask('كيف أنشر فكرة؟')">💡 كيف أنشر فكرة؟</button>
  <button class="sug-btn" onclick="ask('كيف أراسل مستخدم؟')">💬 كيف أراسل مستخدم؟</button>
  <button class="sug-btn" onclick="ask('ما هو NDA؟')">🔒 ما هو NDA؟</button>
  <button class="sug-btn" onclick="ask('لماذا لا تصلني إشعارات؟')">🔔 مشكلة الإشعارات</button>
  <button class="sug-btn" onclick="ask('كيف أوثق حسابي؟')">✅ التوثيق</button>
  <button class="sug-btn" onclick="ask('وضع ليلي')">🌙 الوضع الليلي</button>
  <button class="sug-btn" onclick="startCV()" style="background:linear-gradient(135deg,#c69749,#e8b96a);color:#0e3622;border-color:transparent;font-weight:900">📄 ابن CV لي</button>
</div>

<!-- Chat -->
<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <div class="welcome-title">مرحباً بك في مساعد AZZA</div>
    <div class="welcome-sub">أنا مساعدك الذكي المتخصص في منصة AZZA. اسألني أي شيء عن المنصة وسأجيبك فوراً من قاعدة المعرفة.</div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea class="msg-ta" id="msg-ta" placeholder="اكتب سؤالك هنا..." rows="1"
      oninput="autoR(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   AZZA Assistant — Knowledge Base Engine
   لا Gemini، لا API خارجي — كل شيء محلي
   ══════════════════════════════════════════════ */

/* ── قاعدة المعرفة من Supabase ── */
let KB = [];
let KB_FAQS = [];

/* خريطة الصفحات — كلمة مفتاحية → رابط */
const PAGE_MAP = [
  {keys:['وضع ليلي','dark mode','ليلي','مظلم','مظهر'],       url:'settings.html',  label:'الإعدادات → المظهر',        icon:'⚙️'},
  {keys:['كلمة مرور','password','باسورد','سر'],               url:'settings.html',  label:'الإعدادات → الأمان',         icon:'🔒'},
  {keys:['خصوصية','privacy','من يراسل','من يرى'],             url:'settings.html',  label:'الإعدادات → الخصوصية',      icon:'🔒'},
  {keys:['الإعدادات','settings','اعدادات'],                   url:'settings.html',  label:'صفحة الإعدادات',             icon:'⚙️'},
  {keys:['إشعار','اشعار','notification'],                     url:'notifications.html', label:'صفحة الإشعارات',          icon:'🔔'},
  {keys:['رسالة','محادثة','مراسلة','messages'],               url:'messages.html',  label:'صفحة الرسائل',               icon:'💬'},
  {keys:['ملف شخصي','profile','بروفايل'],                    url:'profile.html',   label:'ملفك الشخصي',                icon:'👤'},
  {keys:['خريطة','map','موقع جغرافي'],                        url:'explore.html',   label:'صفحة الاستكشاف والخريطة',   icon:'🗺️'},
  {keys:['توثيق','verification','شارة'],                      url:'verification.html', label:'صفحة التوثيق',            icon:'✅'},
  {keys:['نشر فكرة','نشر مشروع','منشور جديد'],              url:'app.html',        label:'الفيد الرئيسي',              icon:'📝'},
  {keys:['مستثمر','استثمار','investor'],                      url:'investor.html',  label:'لوحة المستثمر',              icon:'💰'},
  {keys:['وظيفة','job','توظيف','عمل'],                        url:'app.html',       label:'الفيد — قسم الوظائف',        icon:'💼'},
  {keys:['إحصاء','إحصائية','stats','تحليل'],                 url:'stats.html',     label:'صفحة الإحصاءات',             icon:'📊'},
  {keys:['مساعد','agent','ai','ذكاء اصطناعي'],               url:'agent.html',     label:'المساعد الذكي',              icon:'🤖'},
  {keys:['مركز مساعدة','help','مساعدة'],                     url:'help.html',      label:'مركز المساعدة',              icon:'📚'},
];

function findPageLink(text){
  const q = text.toLowerCase();
  for(const p of PAGE_MAP){
    if(p.keys.some(k=>q.includes(k))) return p;
  }
  return null;
}

async function loadKB(){
  const [a,f] = await Promise.all([
    db.from('help_articles').select('id,title,summary,body,keywords,alt_questions,category_slug').eq('is_published',true),
    db.from('help_faqs').select('question,answer,keywords').eq('is_published',true),
  ]);
  KB      = (a.data||[]).map(r=>({
    id:r.id, cat:r.category_slug||'', title:r.title,
    tags:(r.keywords||[]).concat(r.alt_questions||[]),
    answer: (r.summary||'') + '\n\n' + (r.body||'')
             .replace(/##\s/g,'').replace(/\*\*/g,'').replace(/💡/g,'').replace(/⚠️/g,''),
  }));
  KB_FAQS = (f.data||[]).map(r=>({
    title:r.question,
    tags:(r.keywords||[]),
    answer:r.answer,
    cat:'faq',
  }));
}


/* ── محرك البحث ── */
function search(query){
  query = query.toLowerCase().trim();
  if(!query) return [];
  const all = [...KB, ...KB_FAQS];
  const words = query.split(/\s+/);
  const scored = all.map(item=>{
    let score=0;
    const hay=(item.title+' '+(item.tags||[]).join(' ')+' '+(item.answer||'')+' '+item.cat).toLowerCase();
    if(hay.includes(query)) score+=10;
    words.forEach(w=>{
      if(w.length<2) return;
      if(item.title.toLowerCase().includes(w)) score+=5;
      if((item.tags||[]).some(t=>t.includes(w))) score+=4;
      if((item.answer||'').toLowerCase().includes(w)) score+=2;
    });
    return {item,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  return scored.map(x=>x.item);
}

/* ══════════════════════════════════════════════
   CV Generator — مولّد السيرة الذاتية
   ══════════════════════════════════════════════ */
const CV_QUESTIONS = [
  {key:'name',       q:'ما اسمك الكامل؟',                          ph:'محمد أحمد'},
  {key:'title',      q:'ما مسماك الوظيفي أو مجال تخصصك؟',          ph:'مطور ويب / مصمم جرافيك / محاسب...'},
  {key:'email',      q:'ما بريدك الإلكتروني؟',                      ph:'your@email.com'},
  {key:'phone',      q:'ما رقم هاتفك؟',                             ph:'+970 59 000 0000'},
  {key:'location',   q:'ما موقعك (المدينة والدولة)؟',              ph:'رام الله، فلسطين'},
  {key:'summary',    q:'اكتب نبذة مختصرة عن نفسك (2-3 جمل):',     ph:'مطور شغوف بالتقنية...'},
  {key:'skills',     q:'ما أبرز مهاراتك؟ (مفصولة بفاصلة)',          ph:'JavaScript, Python, تصميم, تسويق...'},
  {key:'experience', q:'اذكر خبراتك العملية (الشركة، المنصب، السنوات):', ph:'شركة X — مطور — 2020-2023'},
  {key:'education',  q:'ما مؤهلاتك الأكاديمية؟',                   ph:'بكالوريوس هندسة — جامعة Y — 2020'},
  {key:'languages',  q:'ما اللغات التي تتقنها ومستواك فيها؟',      ph:'العربية (أصلية)، الإنجليزية (جيدة)'},
  {key:'links',      q:'هل لديك روابط (GitHub, LinkedIn, Portfolio)؟', ph:'github.com/username'},
];

let cvData = {};
let cvStep  = -1;

function startCV(){
  cvStep = 0;
  cvData = {};
  document.getElementById('suggestions').style.display='none';
  addMsg('سأساعدك في بناء سيرة ذاتية احترافية! 🎉\nسأسألك بضعة أسئلة وأبني لك CV جاهز للتحميل.\n\nلنبدأ...');
  setTimeout(()=>askCVQuestion(), 600);
}

function askCVQuestion(){
  if(cvStep >= CV_QUESTIONS.length){
    buildCV(); return;
  }
  const q = CV_QUESTIONS[cvStep];
  addMsg(q.q + (q.ph ? `\n\n💡 مثال: ${q.ph}` : ''));
}

function handleCVInput(text){
  if(cvStep < 0 || cvStep >= CV_QUESTIONS.length) return false;
  const q = CV_QUESTIONS[cvStep];
  cvData[q.key] = text.trim();
  cvStep++;
  if(cvStep < CV_QUESTIONS.length){
    const remaining = CV_QUESTIONS.length - cvStep;
    addMsg(`✅ تم! (${remaining} ${remaining===1?'سؤال':'أسئلة'} متبقية)`);
    setTimeout(()=>askCVQuestion(), 400);
  }else{
    addMsg('ممتاز! جاري بناء CV احترافي... ⏳');
    setTimeout(()=>buildCV(), 1000);
  }
  return true;
}

function buildCV(){
  const cv = cvData;
  const skills = (cv.skills||'').split(/[،,]/).map(s=>`<span style="display:inline-block;padding:4px 12px;background:#e8f5e9;color:#1c5b38;border-radius:99px;font-size:12px;margin:3px;font-weight:700">${s.trim()}</span>`).join('');
  const langs  = (cv.languages||'').split(/[،,]/).map(l=>`<li style="margin-bottom:4px">${l.trim()}</li>`).join('');

  const html = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CV — ${cv.name||'السيرة الذاتية'}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Tajawal,sans-serif;background:#f5f5f5;color:#1c1a14;direction:rtl;padding:30px}
  .cv{max-width:800px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)}
  .cv-header{background:linear-gradient(135deg,#0e3622,#1c5b38);color:#fff;padding:36px 40px;display:flex;align-items:center;gap:24px}
  .cv-av{width:80px;height:80px;border-radius:50%;background:#c69749;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#0e3622;flex-shrink:0}
  .cv-name{font-size:26px;font-weight:900;margin-bottom:4px}
  .cv-title{font-size:15px;opacity:.8;margin-bottom:12px}
  .cv-contact{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;opacity:.9}
  .cv-contact span{display:flex;align-items:center;gap:6px}
  .cv-body{padding:32px 40px}
  .section{margin-bottom:28px}
  .section-title{font-size:16px;font-weight:900;color:#1c5b38;border-bottom:2.5px solid #c69749;padding-bottom:6px;margin-bottom:14px}
  .summary{font-size:14px;line-height:1.8;color:#444}
  .exp-item,.edu-item{margin-bottom:12px}
  .exp-title{font-size:14px;font-weight:700}
  .exp-meta{font-size:12px;color:#888;margin-top:2px}
  ul{padding-right:18px;font-size:14px;line-height:1.9}
  @media print{body{padding:0;background:#fff}.cv{box-shadow:none;border-radius:0}}
</style>
</head>
<body>
<div class="cv">
  <div class="cv-header">
    <div class="cv-av">${(cv.name||'م')[0]}</div>
    <div>
      <div class="cv-name">${cv.name||'—'}</div>
      <div class="cv-title">${cv.title||'—'}</div>
      <div class="cv-contact">
        ${cv.email?`<span>📧 ${cv.email}</span>`:''}
        ${cv.phone?`<span>📱 ${cv.phone}</span>`:''}
        ${cv.location?`<span>📍 ${cv.location}</span>`:''}
        ${cv.links?`<span>🔗 ${cv.links}</span>`:''}
      </div>
    </div>
  </div>
  <div class="cv-body">
    ${cv.summary?`<div class="section"><div class="section-title">نبذة تعريفية</div><div class="summary">${cv.summary}</div></div>`:''}
    ${cv.skills?`<div class="section"><div class="section-title">المهارات</div><div style="margin-top:4px">${skills}</div></div>`:''}
    ${cv.experience?`<div class="section"><div class="section-title">الخبرات العملية</div><div class="exp-item"><div class="exp-title">${cv.experience}</div></div></div>`:''}
    ${cv.education?`<div class="section"><div class="section-title">التعليم</div><div class="edu-item"><div class="exp-title">${cv.education}</div></div></div>`:''}
    ${cv.languages?`<div class="section"><div class="section-title">اللغات</div><ul>${langs}</ul></div>`:''}
  </div>
</div>
<div style="text-align:center;margin-top:20px">
  <button onclick="window.print()" style="padding:12px 32px;background:#1c5b38;color:#fff;border:none;border-radius:99px;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer">🖨️ طباعة / حفظ PDF</button>
</div>
</body></html>`;

  /* فتح CV في نافذة جديدة */
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();

  cvStep = -1;
  addMsg('✅ تم بناء سيرتك الذاتية!\n\nفُتحت في نافذة جديدة — اضغط "طباعة / حفظ PDF" لحفظها.\n\n💡 يمكنك أيضاً نشرها على ملفك الشخصي في AZZA!');
}
const now = () => new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});

/* ── إضافة رسالة ── */
function addMsg(text, role='bot', articles=[], pageLink=null){
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();

  const chat = document.getElementById('chat');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;

  const av = role==='user'
    ? `<div class="msg-av">${(me?.name||'أ')[0]}</div>`
    : `<div class="msg-av">🤖</div>`;

  /* تحويل \n لـ<br> */
  const html = text.replace(/\n/g,'<br>');

  /* بطاقات المقالات */
  const cards = articles.slice(0,3).map(a=>`
    <a class="art-card" onclick="ask('${a.title.replace(/'/g,"\\'")}')">
      <div class="art-card-title">📄 ${a.title}</div>
      <div class="art-card-cat">${a.cat}</div>
    </a>`).join('');

  const moreLink = articles.length > 3
    ? `<div class="more-link" onclick="location.href='help.html'">عرض كل المقالات ←</div>`
    : '';

  const pageBtn = pageLink
    ? `<div style="margin-top:10px">
        <button onclick="location.href='${pageLink.url}'" style="display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:linear-gradient(135deg,var(--olive),#0e3622);color:#fff;border:none;border-radius:99px;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer">
          ${pageLink.icon} اذهب إلى ${pageLink.label} ←
        </button>
      </div>`
    : '';

  div.innerHTML = `${role==='bot'?av:''}
    <div style="flex:1;min-width:0">
      <div class="msg-bubble">${html}${cards}${moreLink}${pageBtn}</div>
      <div class="msg-time">${now()}</div>
    </div>
    ${role==='user'?av:''}`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* ── مؤشر الكتابة ── */
let typingEl = null;
function showTyping(){
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div');
  typingEl.className = 'msg bot';
  typingEl.innerHTML = `<div class="msg-av">🤖</div><div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping(){ typingEl?.remove(); typingEl=null; }

/* ── الإرسال ── */
const me = JSON.parse(localStorage.getItem('azza_user')||'null');
if(!me) location.href='login.html';

async function sendMsg(){
  const ta  = document.getElementById('msg-ta');
  const text = ta.value.trim();
  if(!text) return;
  ta.value=''; ta.style.height='auto';

  /* إخفاء الاقتراحات بعد أول رسالة */
  document.getElementById('suggestions').style.display='none';

  addMsg(text,'user');
  showTyping();

  /* محاكاة تفكير 600ms */
  await new Promise(r=>setTimeout(r,600));
  hideTyping();

  /* CV Mode */
  if(cvStep >= 0 && handleCVInput(text)) return;

  /* CV Generator */
  if(text.match(/cv|سيرة ذاتية|سيرتي الذاتية|سيرة|resume/i)){
    startCV(); return;
  }

  const results = search(text);
  const pageLink = findPageLink(text);

  if(!results.length && !pageLink){
    addMsg('لم أجد إجابة لسؤالك في قاعدة المعرفة 🙁\n\nجرّب:\n• إعادة صياغة السؤال\n• تصفح <span style="color:var(--olive);cursor:pointer;font-weight:700" onclick="location.href=\'help.html\'">مركز المساعدة</span>\n• التواصل مع فريق الدعم');
  } else if(!results.length && pageLink) {
    addMsg(`لم أجد مقالاً محدداً، لكن يمكنك الذهاب مباشرة إلى:`, 'bot', [], pageLink);
  } else {
    const best = results[0];
    const related = results.slice(1);
    addMsg(best.answer, 'bot', related, pageLink);
  }
}

function ask(q){
  document.getElementById('msg-ta').value=q;
  sendMsg();
}

function clearChat(){
  const chat = document.getElementById('chat');
  chat.innerHTML=`<div class="welcome" id="welcome">
    <div class="welcome-icon">🤖</div>
    <div class="welcome-title">مرحباً بك في مساعد AZZA</div>
    <div class="welcome-sub">أنا مساعدك الذكي المتخصص في منصة AZZA. اسألني أي شيء عن المنصة وسأجيبك فوراً من قاعدة المعرفة.</div>
  </div>`;
  document.getElementById('suggestions').style.display='flex';
}

function autoR(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}

/* الثيم */
const TK='azza_theme';
(()=>{document.body.classList.toggle('dark',localStorage.getItem(TK)==='dark');})();
</script>
