<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>خريطة AZZA الذكية</title>
<script src="supabase.js"></script>
<!-- MapLibre GL JS -->
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{
  --g:#c69749;--gs:#e8c06a;--o:#1c5b38;--od:#0e3622;--ol:rgba(28,91,56,.1);
  --card:#fff;--bg:#f5f1ea;--bg2:#ebe5d8;
  --ink:#18160f;--sub:#6b6354;--muted:#9a9080;--line:rgba(0,0,0,.07);
  --glass:rgba(255,255,255,.92);--shadow:0 8px 32px rgba(0,0,0,.14);--r:14px;
}
.dk{--card:#1a1810;--bg:#0d0c07;--bg2:#1a1810;--ink:#f0ead8;--sub:#9a9080;--muted:#6b6354;--line:rgba(255,255,255,.07);--glass:rgba(18,16,8,.93)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:Tajawal,sans-serif;color:var(--ink);direction:rtl}

/* ── Map Full Screen ── */
#map{position:fixed;inset:0;z-index:0}

/* ── Floating Search ── */
.fsearch{
  position:fixed;top:14px;right:14px;left:14px;z-index:500;
  display:flex;align-items:center;gap:8px;
}
.s-pill{
  flex:1;height:48px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,255,255,.7);border-radius:99px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;padding:0 14px;
  position:relative;transition:.2s;
}
.dk .s-pill{border-color:rgba(255,255,255,.1)}
.s-pill:focus-within{border-color:var(--o);box-shadow:0 0 0 3px rgba(28,91,56,.1),var(--shadow)}
.s-pill svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.s-inp{flex:1;border:none;background:none;font-family:Tajawal,sans-serif;font-size:14px;color:var(--ink);outline:none}
.s-inp::placeholder{color:var(--muted)}
.s-clear{width:20px;height:20px;border-radius:50%;background:var(--muted);color:#fff;border:none;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.s-clear.show{display:flex}
/* Autocomplete */
.ac{position:absolute;top:54px;right:0;left:0;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;max-height:300px;overflow-y:auto;display:none;z-index:10}
.ac.open{display:block;animation:pop .15s ease}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ac-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:.5px solid var(--line);transition:.15s}
.ac-row:last-child{border:none}.ac-row:hover{background:var(--ol)}
.ac-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ac-n{font-size:13px;font-weight:700}.ac-s{font-size:11px;color:var(--muted)}

/* Geo Button + Dropdown */
.geo-wrap{position:fixed;top:72px;right:14px;z-index:400}
.geo-btn-main{
  display:flex;align-items:center;gap:7px;padding:9px 14px;
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,.6);border-radius:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.1);cursor:pointer;
  font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;color:var(--ink);
  white-space:nowrap;transition:.2s;
}
.dk .geo-btn-main{border-color:rgba(255,255,255,.1)}
.geo-btn-main:hover{border-color:var(--o);color:var(--o)}
.geo-btn-main.dd-open{background:var(--o);color:#fff;border-color:var(--o)}
.geo-arrow{font-size:9px;transition:transform .2s}
.geo-btn-main.dd-open .geo-arrow{transform:rotate(180deg)}
/* Dropdown */
.city-dd{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);min-width:220px;overflow:hidden;
  display:none;z-index:10;
}
.city-dd.open{display:block;animation:pop .15s ease}
.city-dd-hdr{padding:8px 14px;font-size:10px;font-weight:700;color:var(--muted);
  background:var(--bg2);border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.06em}
.city-dd-item{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;font-size:13px;font-weight:700;
  transition:.15s;border-bottom:.5px solid var(--line)}
.city-dd-item:last-child{border:none}
.city-dd-item:hover{background:var(--ol);color:var(--o)}
.city-dd-count{font-size:10px;color:var(--muted)}

/* Fab Buttons */
.fabs{position:fixed;top:72px;left:14px;z-index:400;display:flex;flex-direction:column;gap:8px}
.fab{width:42px;height:42px;border-radius:13px;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,.6);box-shadow:0 3px 10px rgba(0,0,0,.1);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:.2s;font-family:Tajawal}
.dk .fab{border-color:rgba(255,255,255,.1)}
.fab:hover,.fab.on{background:var(--o);border-color:var(--o);color:#fff;box-shadow:0 4px 14px rgba(28,91,56,.3)}

/* Sidebar */
.sb-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:699;display:none;backdrop-filter:blur(3px)}
.sb-ov.show{display:block}
.sidebar{position:fixed;top:0;bottom:0;right:-350px;width:320px;background:var(--card);z-index:700;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.18)}
.sidebar.open{right:0}
.sb-hdr{background:linear-gradient(135deg,var(--od),var(--o));padding:52px 18px 16px;flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-av{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.2);color:#fff;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-uname{font-size:15px;font-weight:700;color:#fff}
.sb-usub{font-size:11px;color:rgba(255,255,255,.65)}
.sb-close{margin-right:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:13px}
.sb-chips{display:flex;flex-wrap:wrap;gap:5px}
.sb-chip{padding:6px 11px;border-radius:99px;border:1.5px solid rgba(255,255,255,.25);font-family:Tajawal,sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.8);cursor:pointer;transition:.15s;background:rgba(255,255,255,.07)}
.sb-chip:hover,.sb-chip.on{background:#fff;color:var(--od);border-color:#fff}
.sb-body{flex:1;overflow-y:auto;padding:12px 0}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:99px}
.sb-it{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;transition:.15s}
.sb-it:hover{background:var(--ol)}
.sb-em{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-il{font-size:13px;font-weight:700}.sb-is{font-size:11px;color:var(--muted)}
.sb-count{margin-right:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--bg2);color:var(--sub)}
.sb-div{height:.5px;background:var(--line);margin:8px 18px}
.sb-sec{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 18px 4px}

/* Bottom Card (Popup) */
.bcard{
  position:fixed;bottom:-360px;right:0;left:0;z-index:800;
  background:var(--card);border-radius:24px 24px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.16);
  transition:bottom .3s cubic-bezier(.4,0,.2,1);
  max-height:90vh;overflow-y:auto;
}
.bcard.open{bottom:0}
.bc-pull{width:36px;height:4px;border-radius:99px;background:var(--line);margin:12px auto 0}
.bc-x{position:absolute;top:12px;left:14px;width:28px;height:28px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:12px;color:var(--sub)}
.bc-body{padding:8px 18px 24px}
.bc-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px}
.bc-av{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;background:var(--bg2)}
.bc-name{font-size:17px;font-weight:900;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bc-vbadge{background:#16a34a;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px}
.bc-type{font-size:12px;color:var(--muted);margin-bottom:4px}
.bc-trust{font-size:12px;font-weight:700;color:var(--g);display:flex;align-items:center;gap:4px}
.bc-desc{font-size:14px;color:var(--sub);line-height:1.65;margin-bottom:10px;padding-top:8px;border-top:.5px solid var(--line)}
.bc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.bc-tag{padding:4px 10px;border-radius:8px;background:var(--bg2);font-size:12px;font-weight:700;color:var(--sub)}
.bc-acts{display:flex;gap:8px}
.bca{flex:1;padding:11px;border-radius:12px;border:none;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.bca-p{background:var(--o);color:#fff}.bca-p:hover{background:var(--od)}
.bca-s{border:1.5px solid var(--line);background:none;color:var(--ink)}.bca-s:hover{border-color:var(--o);color:var(--o)}

/* City Panel */
.cpanel{
  position:fixed;bottom:-520px;right:0;left:0;z-index:800;
  background:var(--card);border-radius:24px 24px 0 0;
  box-shadow:0 -12px 48px rgba(0,0,0,.18);
  transition:bottom .38s cubic-bezier(.34,1.06,.64,1);
  max-height:88vh;overflow-y:auto;
  /* يمنع الـoverscroll من إغلاق الصفحة */
  overscroll-behavior:contain;
}
.cpanel.open{bottom:0}
.cpanel.closing{bottom:-520px;transition:bottom .28s cubic-bezier(.4,0,1,1)}
.cp-hdr{background:linear-gradient(135deg,var(--od),var(--o));padding:20px 18px 16px;position:relative}
.cp-pull{width:36px;height:4px;border-radius:99px;background:rgba(255,255,255,.3);margin:0 auto 14px}
.cp-x{position:absolute;top:12px;left:14px;width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.2);cursor:pointer;color:#fff;font-size:12px}
.cp-city{font-size:22px;font-weight:900;color:#fff;margin-bottom:2px}
.cp-country{font-size:12px;color:rgba(255,255,255,.7)}
.cp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 18px}
.cp-stat{background:var(--bg2);border-radius:10px;padding:10px 6px;text-align:center}
.cp-num{font-size:18px;font-weight:900;color:var(--o)}
.cp-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.cp-bars{padding:0 18px 18px}
.cp-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cp-bar-lbl{font-size:12px;font-weight:700;width:90px;flex-shrink:0}
.cp-bar-bg{flex:1;height:7px;background:var(--bg2);border-radius:99px;overflow:hidden}
.cp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--o),var(--g));transition:.8s}
.cp-bar-val{font-size:11px;font-weight:700;color:var(--o);width:28px;text-align:left}
.cp-filter-btn{width:calc(100% - 36px);margin:0 18px 18px;padding:11px;border-radius:12px;border:none;background:var(--o);color:#fff;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* Heat Badge */
.heat-badge{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:600;padding:7px 18px;border-radius:99px;background:rgba(239,68,68,.9);color:#fff;font-size:12px;font-weight:700;display:none;white-space:nowrap;backdrop-filter:blur(8px);font-family:Tajawal}
.heat-badge.show{display:block;animation:pop .2s ease}

/* Count Pill */
.count-pill{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:350;padding:6px 16px;border-radius:99px;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--o);display:none;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.08);font-family:Tajawal}
.count-pill.show{display:block}

/* 3D toggle badge */
.badge-3d{position:fixed;bottom:90px;left:14px;z-index:400;padding:6px 12px;border-radius:99px;background:rgba(99,102,241,.9);color:#fff;font-size:11px;font-weight:700;display:none;font-family:Tajawal;backdrop-filter:blur(8px)}
.badge-3d.show{display:block}

/* Zoom */
.zooms{position:fixed;bottom:100px;left:14px;z-index:400;display:flex;flex-direction:column;gap:4px}
.zbtn{width:36px;height:36px;border-radius:10px;background:var(--glass);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.6);box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;transition:.15s;font-family:Tajawal;color:var(--ink)}
.dk .zbtn{border-color:rgba(255,255,255,.1)}.zbtn:hover{background:var(--o);color:#fff;border-color:var(--o)}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:99px;font-size:13px;font-weight:700;color:#fff;z-index:9999;opacity:0;transition:.3s;pointer-events:none;font-family:Tajawal;white-space:nowrap;backdrop-filter:blur(10px)}

/* Mobile */
@media(max-width:600px){
  .fabs{display:none}
  .zooms{bottom:80px}
  .geo-sel{top:auto;bottom:80px;right:14px}
  .city-dd{top:auto;bottom:130px}
}
</style>
</head>
<body>

<div id="map"></div>

<!-- Search -->
<div class="fsearch">

<!-- Fabs -->

<!-- Zoom -->
<div class="zooms">
  <button class="zbtn" onclick="MAP.zoomIn({duration:300})">+</button>
  <button class="zbtn" onclick="MAP.zoomOut({duration:300})">−</button>
</div>

<!-- Badges -->
<div class="heat-badge" id="heat-badge">🔥 Heatmap — كثافة النشاط</div>
<div class="badge-3d" id="badge-3d">🏙️ وضع 3D مفعّل</div>
<div class="count-pill" id="count-pill"></div>

<!-- Sidebar -->
<div class="sb-ov" id="sb-ov" onclick="closeSB()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-hdr">
    <div class="sb-user">
      <div class="sb-av" id="sb-av">م</div>
      <div><div class="sb-uname" id="sb-nm">مرحباً</div><div class="sb-usub">استكشف المنظومة العربية</div></div>
      <button class="sb-close" onclick="closeSB()">✕</button>
    </div>
    <div class="sb-chips" id="sb-chips"></div>
  </div>
  <div class="sb-body" id="sb-body"></div>
</div>

<!-- Bottom Card -->
<div class="bcard" id="bcard">
  <div class="bc-pull"></div>
  <button class="bc-x" onclick="closeBCard()">✕</button>
  <div class="bc-body" id="bc-body"></div>
</div>

<!-- City Panel -->
<div class="cpanel" id="cpanel">
  <button class="cp-x" onclick="closeCPanel()">✕</button>
  <div id="cp-body"></div>
</div>
<script>
/* Swipe Down لإغلاق City Panel */
(function(){
  let sy=0,dragging=false;
  const p=document.getElementById('cpanel');
  p.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;dragging=true;},{passive:true});
  p.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dy=e.touches[0].clientY-sy;
    if(dy>0&&p.scrollTop===0){
      p.style.transform=`translateY(${Math.min(dy,180)}px)`;
      p.style.transition='none';
    }
  },{passive:true});
  p.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-sy;
    p.style.transform='';p.style.transition='';dragging=false;
    if(dy>90) closeCPanel();
  },{passive:true});
})();
</script>

/* ══ Init ══ */
(()=>{
  const dk=localStorage.getItem('azza_theme')==='dark';
  document.documentElement.classList.toggle('dk',dk);
  D('fab-theme').textContent=dk?'☀️':'🌙';

  document.addEventListener('keydown',e=>{

/* ══ Map Init (MapLibre) ══ */
function getStyle(dark){
  return dark
    ? 'https://tiles.openfreemap.org/styles/dark'
    : 'https://tiles.openfreemap.org/styles/liberty';
}

function initMap(){
  const dk=isDK();
  MAP=new maplibregl.Map({
    container:'map',
    style:getStyle(dk),
    center:[35.2,31.9],
    zoom:8,
    pitch:0,
    bearing:0,
    antialias:true,
    attributionControl:false,
  });

  MAP.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');

  MAP.on('load',()=>{
    add3DBuildings();
    ALL.forEach(e=>addMarker(e));
    addCityLabels();
    addMeMarker();
  });

  MAP.on('click',()=>{closeDd();D('ac').classList.remove('open');});
}

/* ══ 3D Buildings ══ */
function add3DBuildings(){
  if(MAP.getLayer('3d-buildings')) return;
  if(!MAP.getSource('openmaptiles')&&!MAP.getSource('composite')) return;
  const src=MAP.getSource('openmaptiles')?'openmaptiles':'composite';
  try{
    MAP.addLayer({
      id:'3d-buildings',
      source:src,
      'source-layer':'building',
      type:'fill-extrusion',
      minzoom:14,
      paint:{
        'fill-extrusion-color':isDK()?'#2a2820':'#d4cfc7',
        'fill-extrusion-height':['get','height'],
        'fill-extrusion-base':['get','min_height'],
        'fill-extrusion-opacity':0,
      }
    });
  }catch(e){}
}

function toggle3D(){
  IS_3D=!IS_3D;
  const b=D('fab-3d'), badge=D('badge-3d');
  if(IS_3D){
    MAP.easeTo({pitch:55,bearing:-15,duration:800});
    try{ MAP.setPaintProperty('3d-buildings','fill-extrusion-opacity',.85); }catch(e){}
    b.classList.add('on'); badge.classList.add('show');
    toast('وضع 3D — المباني ثلاثية الأبعاد 🏙️');
  }else{
    MAP.easeTo({pitch:0,bearing:0,duration:600});
    try{ MAP.setPaintProperty('3d-buildings','fill-extrusion-opacity',0); }catch(e){}
    b.classList.remove('on'); badge.classList.remove('show');
  }
}

/* ══ Markers ══ */
function addMarker(e){
  if(!e.lat||!e.lng) return;
  const t=ET.find(x=>x.id===e.type)||ET[0];
  const el=document.createElement('div');
  el.style.cssText=`width:36px;height:36px;border-radius:50%;background:${t.color};border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:transform .15s;user-select:none`;
  el.textContent=t.em;
  el.onmouseenter=()=>el.style.transform='scale(1.2)';
  el.onmouseleave=()=>el.style.transform='';
  el.onclick=(ev)=>{ev.stopPropagation();showCard(e);};
  const m=new maplibregl.Marker({element:el,anchor:'center'})
    .setLngLat([e.lng,e.lat])
    .addTo(MAP);
  m._entity=e;
  m._typeId=e.type;
  POPUP_ELS.push(m);
}

/* ══ Me Marker ══ */
function addMeMarker(){
  if(!me?.lat||!me?.lng) return;
  const el=document.createElement('div');
  el.style.cssText='width:42px;height:42px;border-radius:50%;background:#c69749;border:4px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#0e3622;z-index:10';
  el.textContent=(me.name||'م')[0];
  el.title='أنت';
  new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([me.lng,me.lat]).addTo(MAP);
}

}

function closeCPanel(){
  const p=D('cpanel');

function filterCity(name,la,lo){
  let n=0;
  POPUP_ELS.forEach(m=>{
    const e=m._entity;
    const show=(e.city||e.city_name||'')=== name;
    m.getElement().style.display=show?'':'none';
    if(show) n++;
  });
  closeCPanel();
  showCount(n+' كيان في '+name);
  MAP.flyTo({center:[lo,la],zoom:13,duration:600,essential:true});
}

/* ══ Type Filter ══ */
function filterType(type){
  ACTIVE_TYPE=type;
  let n=0;
  POPUP_ELS.forEach(m=>{
    const show=!type||m._typeId===type;
    m.getElement().style.display=show?'':'none';
    if(show) n++;
  });
  /* تحديث Sidebar chips */
  document.querySelectorAll('.sb-chip').forEach(c=>{
    const on=c.dataset.type===type||(!type&&c.dataset.type==='all');
    c.classList.toggle('on',on);
  });
  if(type){showCount(n+' '+(ET.find(x=>x.id===type)?.label||''));}
  else hideCount();
}

function showCount(t){const p=D('count-pill');p.textContent=t;p.classList.add('show');}
function hideCount(){D('count-pill').classList.remove('show');}

/* ══ Heatmap ══ */
function toggleHeat(){
  HEAT_SRC=!HEAT_SRC;
  const b=D('fab-heat'),badge=D('heat-badge');
  if(HEAT_SRC){
    if(!MAP.getSource('heat-data')){
      MAP.addSource('heat-data',{type:'geojson',data:{type:'FeatureCollection',features:ALL.filter(e=>e.lat&&e.lng).map(e=>({type:'Feature',geometry:{type:'Point',coordinates:[e.lng,e.lat]},properties:{weight:(e.trust_score||30)/100}}))}});
      MAP.addLayer({id:'heatmap',type:'heatmap',source:'heat-data',maxzoom:15,paint:{
        'heatmap-weight':['get','weight'],
        'heatmap-intensity':['interpolate',['linear'],['zoom'],0,1,14,3],
        'heatmap-color':['interpolate',['linear'],['heatmap-density'],0,'transparent',.2,'#1c5b38',.5,'#c69749',.8,'#ef4444',1,'#7c3aed'],
        'heatmap-radius':['interpolate',['linear'],['zoom'],0,16,14,40],
        'heatmap-opacity':.85
      }});
    }else{
      MAP.setLayoutProperty('heatmap','visibility','visible');
    }
    POPUP_ELS.forEach(m=>m.getElement().style.opacity='.2');
    b.classList.add('on'); badge.classList.add('show');
    toast('Heatmap — كثافة النشاط التجاري 🔥');
  }else{
    if(MAP.getLayer('heatmap')) MAP.setLayoutProperty('heatmap','visibility','none');
    POPUP_ELS.forEach(m=>m.getElement().style.opacity='1');
    b.classList.remove('on'); badge.classList.remove('show');
  }
}

/* ══ Search ══ */
function onQ(q){
  D('s-clr').classList.toggle('show',q.length>0);
  if(!q.trim()){D('ac').classList.remove('open');return;}
  const low=q.toLowerCase();
  const cities=CITIES.filter(c=>c.n.includes(q)).slice(0,2).map(c=>({...c,_t:'city'}));
  const ents=ALL.filter(e=>(e.name||'').toLowerCase().includes(low)||(e.bio||'').toLowerCase().includes(low)||(e.city||'').toLowerCase().includes(low)).slice(0,6);
  const items=[...cities,...ents];
  D('ac')._items=items;
  D('ac').innerHTML=items.length?items.map((it,i)=>{
    const isCity=it._t==='city';
    const t=ET.find(x=>x.id===it.type)||ET[0];
    return`<div class="ac-row" onclick="_pick(${i})">
      <div class="ac-ico" style="background:${isCity?'rgba(99,102,241,.1)':`${t.color}18`}">${isCity?'🏙️':t.em}</div>
      <div><div class="ac-n">${esc(it.name||it.n)}</div><div class="ac-s">${isCity?'مدينة فلسطينية':t.label+' · '+(it.city||'')}</div></div>
    </div>`;
  }).join(''):'<div class="ac-row" style="color:var(--muted)">لا نتائج</div>';
  D('ac').classList.add('open');
}
function _pick(i){
  const it=D('ac')._items?.[i]; if(!it) return;
  D('srch').value=it.name||it.n;
  D('ac').classList.remove('open');
  if(it._t==='city') showCityPanel(it);
  else showCard(it);
}
function clearQ(){D('srch').value='';D('s-clr').classList.remove('show');D('ac').classList.remove('open');filterType('');}
document.addEventListener('click',e=>{if(!e.target.closest('.s-pill'))D('ac').classList.remove('open');});

function locateMe(){

    MAP.flyTo({center:[lo,la],zoom:14,duration:800,essential:true});
    const el=document.createElement('div');
    el.style.cssText='width:16px;height:16px;border-radius:50%;background:#1c5b38;border:3px solid #fff;box-shadow:0 0 0 5px rgba(28,91,56,.2)';
    new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([lo,la]).addTo(MAP);
    toast('تم تحديد موقعك ✅');
  },()=>toast('تعذّر تحديد الموقع','err'));
}

/* ══ Follow ══ */
async function follow(id){
  await db.from('follows').upsert({follower_id:me.id,following_id:id},{onConflict:'follower_id,following_id'});
  toast('تم المتابعة ✅');
}

/* ══ Sidebar ══ */
function buildSidebar(){
  /* Chips */
  D('sb-chips').innerHTML=`<button class="sb-chip on" data-type="all" onclick="filterType('');closeSB()">🌐 الكل</button>`
    +ET.slice(0,8).map(t=>`<button class="sb-chip" data-type="${t.id}" onclick="filterType('${t.id}');closeSB()">${t.em} ${t.label}</button>`).join('');
  /* Body */
  D('sb-body').innerHTML=`
    <div class="sb-sec">الإجمالي على الخريطة</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 12px">
      ${[['الكيانات',ALL.length],['الدول',3],['موثّق',ALL.filter(e=>e.is_verified).length],['مدينة',CITIES.length]].map(([l,n])=>`
        <div style="background:var(--bg2);border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:20px;font-weight:900;color:var(--o)">${n}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${l}</div>
        </div>`).join('')}
    </div>
    <div class="sb-div"></div>
    <div class="sb-sec">تفاصيل الأنواع</div>
    ${ET.map(t=>{const n=ALL.filter(e=>e.type===t.id).length;return`
      <div class="sb-it" onclick="filterType('${t.id}');closeSB()">
        <div class="sb-em" style="background:${t.color}18">${t.em}</div>
        <div><div class="sb-il">${t.label}</div><div class="sb-is">${n} مسجّل</div></div>
        <div class="sb-count">${n}</div>
      </div>`;}).join('')}
    <div class="sb-div"></div>
    <div class="sb-it" onclick="toggleHeat();closeSB()"><div class="sb-em" style="background:rgba(239,68,68,.1)">🔥</div><div><div class="sb-il">Heatmap</div><div class="sb-is">عرض كثافة النشاط</div></div></div>
    <div class="sb-it" onclick="toggle3D();closeSB()"><div class="sb-em" style="background:rgba(99,102,241,.1)">🏙️</div><div><div class="sb-il">وضع 3D</div><div class="sb-is">مباني ثلاثية الأبعاد</div></div></div>
    <div class="sb-it" onclick="locateMe();closeSB()"><div class="sb-em" style="background:rgba(28,91,56,.1)">📍</div><div><div class="sb-il">موقعي</div><div class="sb-is">اكتشف ما حولك</div></div></div>
    <div class="sb-it" onclick="filterType('');closeSB()"><div class="sb-em" style="background:rgba(107,114,128,.1)">🔄</div><div><div class="sb-il">عرض الكل</div><div class="sb-is">إعادة تعيين الفلاتر</div></div></div>
    <div class="sb-it" onclick="location.href='app.html'"><div class="sb-em" style="background:rgba(198,151,73,.1)">✦</div><div><div class="sb-il">الفيد الرئيسي</div><div class="sb-is">العودة للمنصة</div></div></div>`;
}
function toggleSB(){sbOpen?closeSB():openSB();}
function openSB(){D('sidebar').classList.add('open');D('sb-ov').classList.add('show');sbOpen=true;}
function closeSB(){D('sidebar').classList.remove('open');D('sb-ov').classList.remove('show');sbOpen=false;}

/* ══ Theme ══ */
function toggleTheme(){
  const dk=document.documentElement.classList.toggle('dk');
  localStorage.setItem('azza_theme',dk?'dark':'light');
  D('fab-theme').textContent=dk?'☀️':'🌙';
  MAP.setStyle(getStyle(dk));
  MAP.once('styledata',()=>{add3DBuildings();addCityLabels();addMeMarker();if(HEAT_SRC)toggleHeat();});
}

/* ══ Supabase ══ */
async function loadSupa(){
  try{
    const{data}=await db.from('users').select('id,name,type,bio,city_name,country_code,lat,lng,is_verified,trust_score').not('lat','is',null).limit(500);
    (data||[]).forEach(u=>{
      if(!ALL.find(x=>x.id===u.id)){ALL.push(u);if(MAP.loaded())addMarker(u);}
    });
    buildSidebar();
  }catch(e){}
}
</script>
