<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>خريطة AZZA — اكتشف الفرص</title>
<script src="supabase.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{
  --g:#c69749;--gs:#e8c06a;
  --o:#1c5b38;--od:#0e3622;--ol:rgba(28,91,56,.1);
  --card:#fff;--bg:#f5f1ea;--bg2:#ebe5d8;
  --ink:#18160f;--sub:#6b6354;--muted:#9a9080;
  --line:rgba(0,0,0,.07);--r:14px;
  --glass:rgba(255,255,255,.92);--glass-d:rgba(16,14,8,.92);
  --shadow:0 8px 32px rgba(0,0,0,.12);--shadow-sm:0 2px 10px rgba(0,0,0,.1);
}
.dk{--card:#1a1810;--bg:#0d0c07;--bg2:#1a1810;--ink:#f0ead8;--sub:#9a9080;--muted:#6b6354;--line:rgba(255,255,255,.07);--glass:rgba(20,18,10,.92);--glass-d:rgba(20,18,10,.92)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:Tajawal,sans-serif;background:var(--bg);color:var(--ink);direction:rtl}

/* ══ Map (full screen) ══ */
#map{position:fixed;inset:0;z-index:0}

/* ══ Float Search Bar ══ */
.float-search{
  position:fixed;top:16px;right:16px;left:16px;z-index:500;
  display:flex;align-items:center;gap:8px;
}
.search-pill{
  flex:1;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,.6);border-radius:99px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;padding:0 14px 0 10px;
  height:46px;transition:.2s;position:relative;
}
.dk .search-pill{border-color:rgba(255,255,255,.12);background:var(--glass-d)}
.search-pill:focus-within{border-color:var(--o);box-shadow:0 0 0 3px rgba(28,91,56,.12),var(--shadow)}
.search-pill svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.search-inp{flex:1;border:none;background:none;font-family:Tajawal,sans-serif;font-size:14px;color:var(--ink);outline:none}
.search-inp::placeholder{color:var(--muted)}
.search-clear{width:20px;height:20px;border-radius:50%;background:var(--muted);color:#fff;border:none;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.search-clear.show{display:flex}
/* Autocomplete */
.ac-drop{
  position:absolute;top:52px;right:0;left:0;
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow);z-index:600;overflow:hidden;
  max-height:280px;overflow-y:auto;display:none;
}
.ac-drop.open{display:block;animation:fadeUp .15s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.ac-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:.15s;border-bottom:.5px solid var(--line)}
.ac-item:last-child{border:none}
.ac-item:hover,.ac-item:active{background:var(--ol)}
.ac-em{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-type{font-size:11px;color:var(--muted)}

/* Float Buttons (right) */
.float-btns{position:fixed;top:72px;left:16px;z-index:400;display:flex;flex-direction:column;gap:8px}
.fb{width:42px;height:42px;border-radius:14px;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,.5);box-shadow:var(--shadow-sm);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;color:var(--ink);font-family:Tajawal}
.dk .fb{border-color:rgba(255,255,255,.1)}
.fb:hover,.fb.on{background:var(--o);color:#fff;border-color:var(--o);box-shadow:0 4px 14px rgba(28,91,56,.3)}
.fb-sep{height:4px}


.cat-chip span{font-size:15px}

/* Sidebar */
.sidebar{
  position:fixed;top:0;bottom:0;right:-360px;width:340px;
  background:var(--card);z-index:700;
  display:flex;flex-direction:column;
  transition:right .3s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 32px rgba(0,0,0,.15);
}
.sidebar.open{right:0}
.sb-header{padding:52px 20px 16px;background:linear-gradient(135deg,var(--od),var(--o));color:#fff;flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sb-av{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.sb-user-name{font-size:15px;font-weight:700}
.sb-user-sub{font-size:12px;opacity:.7}
.sb-geo{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.8;flex-wrap:wrap}
.sb-geo-sep{opacity:.4}

.sb-body{flex:1;overflow-y:auto;padding:8px 0}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:99px}
.sb-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:.15s;position:relative}
.sb-item:hover{background:var(--ol)}
.sb-item.active{background:var(--ol)}
.sb-item.active::before{content:'';position:absolute;right:0;top:8px;bottom:8px;width:3px;background:var(--o);border-radius:99px 0 0 99px}
.sb-item-em{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-item-info{flex:1}
.sb-item-label{font-size:14px;font-weight:700}
.sb-item-sub{font-size:11px;color:var(--muted)}
.sb-item-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--bg2);color:var(--sub)}
.sb-sep{height:.5px;background:var(--line);margin:8px 20px}
.sb-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:12px 20px 4px}

/* Sidebar Overlay */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:699;display:none;backdrop-filter:blur(2px)}
.sb-overlay.show{display:block}

/* Geo Nav */
.geo-nav{
  position:fixed;top:72px;right:16px;z-index:400;
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,.5);
  border-radius:12px;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:0;overflow:hidden;
}
.dk .geo-nav{border-color:rgba(255,255,255,.12)}
.geo-btn{padding:8px 12px;font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--ink);display:flex;align-items:center;gap:5px;transition:.15s;white-space:nowrap}
.geo-btn:hover{background:var(--ol);color:var(--o)}
.geo-btn.active{background:var(--o);color:#fff}
.geo-divider{width:1px;height:20px;background:var(--line);flex-shrink:0}

/* Geo Dropdown */
.geo-dropdown{
  position:fixed;top:112px;right:16px;z-index:600;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);min-width:220px;overflow:hidden;display:none;
}
.geo-dropdown.open{display:block;animation:fadeUp .15s ease}
.geo-dd-hdr{padding:10px 14px;font-size:12px;font-weight:700;color:var(--muted);background:var(--bg2);border-bottom:1px solid var(--line)}
.geo-dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;border-bottom:.5px solid var(--line)}
.geo-dd-item:last-child{border:none}
.geo-dd-item:hover{background:var(--ol);color:var(--o)}
.geo-dd-count{margin-right:auto;font-size:11px;color:var(--muted)}

/* Bottom Card (Popup) */
.bottom-card{
  position:fixed;bottom:-320px;right:0;left:0;z-index:800;
  background:var(--card);border-radius:24px 24px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.15);
  transition:bottom .3s cubic-bezier(.4,0,.2,1);
  max-height:380px;overflow-y:auto;
}
.bottom-card.open{bottom:0}
.bc-handle{width:40px;height:4px;border-radius:99px;background:var(--line);margin:12px auto 8px}
.bc-body{padding:0 20px 20px}
.bc-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px}
.bc-av{width:56px;height:56px;border-radius:16px;flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:26px}
.bc-av img{width:100%;height:100%;border-radius:16px;object-fit:cover}
.bc-info{flex:1}
.bc-name{font-size:17px;font-weight:900;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bc-verified{color:var(--o);font-size:13px}
.bc-type{font-size:12px;color:var(--muted);margin-top:2px}
.bc-trust{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--g);margin-top:4px}
.bc-desc{font-size:14px;color:var(--sub);line-height:1.65;margin-bottom:10px}
.bc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.bc-tag{padding:4px 10px;border-radius:8px;background:var(--bg2);font-size:12px;font-weight:700;color:var(--sub)}
.bc-actions{display:flex;gap:8px}
.bc-btn{flex:1;padding:11px;border-radius:12px;border:none;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.bc-primary{background:var(--o);color:#fff}.bc-primary:hover{background:var(--od)}
.bc-sec{border:1.5px solid var(--line);background:none;color:var(--ink)}.bc-sec:hover{border-color:var(--o);color:var(--o)}
.bc-close{position:absolute;top:14px;left:16px;width:30px;height:30px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--sub)}

/* City Panel */
.city-panel{
  position:fixed;bottom:-440px;right:0;left:0;z-index:800;
  background:var(--card);border-radius:24px 24px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.15);
  transition:bottom .3s cubic-bezier(.4,0,.2,1);
  max-height:460px;overflow-y:auto;
}
.city-panel.open{bottom:0}
.cp-handle{width:40px;height:4px;border-radius:99px;background:var(--line);margin:12px auto 0}
.cp-hero{padding:16px 20px 12px;background:linear-gradient(135deg,var(--od),var(--o));color:#fff;margin-bottom:0}
.cp-name{font-size:22px;font-weight:900;margin-bottom:2px}
.cp-sub{font-size:12px;opacity:.75}
.cp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 20px}
.cp-stat{background:var(--bg2);border-radius:10px;padding:10px 6px;text-align:center}
.cp-num{font-size:18px;font-weight:900;color:var(--o)}
.cp-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.cp-score{padding:0 20px 14px}
.cp-score-row{display:flex;align-items:center;gap:10px}
.cp-score-label{font-size:12px;font-weight:700;width:100px;flex-shrink:0}
.cp-score-bar{flex:1;height:7px;background:var(--bg2);border-radius:99px;overflow:hidden}
.cp-score-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--o),var(--g));transition:.8s}
.cp-score-num{font-size:11px;font-weight:700;color:var(--o);width:30px;text-align:left}
.cp-close{position:absolute;top:14px;left:16px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.2);cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center}

/* Heatmap Badge */
.heat-badge{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:600;padding:7px 18px;border-radius:99px;background:rgba(239,68,68,.92);color:#fff;font-size:12px;font-weight:700;font-family:Tajawal;backdrop-filter:blur(8px);display:none;white-space:nowrap}
.heat-badge.show{display:block;animation:fadeUp .2s ease}

/* Result Count */
.result-count{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:350;padding:6px 16px;border-radius:99px;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--o);display:none;white-space:nowrap;box-shadow:var(--shadow-sm)}
.result-count.show{display:block}

/* Zoom controls */
.zoom-wrap{position:fixed;bottom:160px;left:16px;z-index:400;display:flex;flex-direction:column;gap:4px}
.z-btn{width:36px;height:36px;border-radius:10px;background:var(--glass);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.5);box-shadow:var(--shadow-sm);cursor:pointer;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:.15s;font-family:Tajawal}
.z-btn:hover{background:var(--o);color:#fff;border-color:var(--o)}
.dk .z-btn{border-color:rgba(255,255,255,.1)}

/* Mobile bottom sheet */
.mob-sheet{
  position:fixed;bottom:0;right:0;left:0;z-index:400;
  background:var(--card);border-radius:20px 20px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.1);
  transition:bottom .3s cubic-bezier(.4,0,.2,1);
  display:none;
}
@media(max-width:600px){
  .mob-sheet{display:block}
  .cat-strip{bottom:100px}
  .zoom-wrap,.float-btns{display:none}
}
.ms-handle{width:36px;height:4px;border-radius:99px;background:var(--line);margin:10px auto 0;cursor:pointer}
.ms-cats{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.ms-cats::-webkit-scrollbar{display:none}
.ms-cat{display:inline-flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:12px;cursor:pointer;flex-shrink:0;transition:.15s;min-width:52px}
.ms-cat:hover,.ms-cat.on{background:var(--ol)}
.ms-cat-em{font-size:20px}
.ms-cat-lbl{font-size:9px;font-weight:700;color:var(--sub)}

/* Toast */
#toast{position:fixed;bottom:180px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:99px;font-size:13px;font-weight:700;color:#fff;z-index:9999;opacity:0;transition:.3s;pointer-events:none;font-family:Tajawal;white-space:nowrap;backdrop-filter:blur(8px)}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{border-radius:16px!important;box-shadow:var(--shadow)!important;font-family:Tajawal!important}
.leaflet-popup-tip{display:none!important}
</style>
</head>
<body>

<!-- Map -->
<div id="map"></div>

<!-- Search Bar -->
<div class="float-search">
  <!-- Sidebar Toggle -->
  <button class="fb" onclick="toggleSB()" style="flex-shrink:0;border-radius:14px">☰</button>
  <div class="search-pill">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-inp" id="srch" placeholder="ابحث عن مستثمر، شركة، مدينة..." oninput="onSrch(this.value)" autocomplete="off">
    <button class="search-clear" id="srch-clear" onclick="clearSrch()">✕</button>
    <div class="ac-drop" id="ac-drop"></div>
  </div>
  <button class="fb" onclick="locateMe()" style="flex-shrink:0;border-radius:14px">📍</button>
</div>

<!-- Geo Nav -->
<div class="geo-nav" id="geo-nav">
  <button class="geo-btn" onclick="goArab();closeGeoDd()">🌍 العالم العربي</button>
  <div class="geo-divider"></div>
  <button class="geo-btn active" id="geo-country-btn" onclick="toggleGeoDd()">🇵🇸 فلسطين ▾</button>
</div>

<!-- Geo Dropdown -->
<div class="geo-dropdown" id="geo-dd">
  <div class="geo-dd-hdr">اختر دولة أو مدينة</div>
  <div class="geo-dd-item" onclick="goPalestine()">🇵🇸 فلسطين <span class="geo-dd-count">فعّالة</span></div>
  <div class="geo-dd-hdr" style="font-size:11px">مدن فلسطين</div>
  <div id="geo-cities-list"></div>
  <div class="geo-dd-hdr" style="font-size:11px">دول أخرى قريباً</div>
  ${['🇯🇴 الأردن','🇸🇦 السعودية','🇪🇬 مصر','🇦🇪 الإمارات','🇱🇧 لبنان'].map(c=>`<div class="geo-dd-item" style="opacity:.5;cursor:default">${c} <span class="geo-dd-count">قريباً</span></div>`).join('')}
</div>

<!-- Float Buttons -->
<div class="float-btns">
  <button class="fb" onclick="toggleHeat()" id="btn-heat" title="Heatmap">🔥</button>
  <button class="fb" onclick="toggleTheme()" id="btn-theme">🌙</button>
  <div class="fb-sep"></div>
  <button class="fb" onclick="goArab()" title="الوطن العربي">🌍</button>
  <button class="fb" onclick="goPalestine()" title="فلسطين">🇵🇸</button>
</div>

<!-- Category Strip -->
<div class="cat-strip" id="cat-strip"></div>

<!-- Zoom Controls -->
<div class="zoom-wrap">
  <button class="z-btn" onclick="MAP.zoomIn()">+</button>
  <button class="z-btn" onclick="MAP.zoomOut()">−</button>
</div>

<!-- Heatmap Badge -->
<div class="heat-badge" id="heat-badge">🔥 Heatmap — كثافة النشاط</div>

<!-- Result Count -->
<div class="result-count" id="result-count"></div>

<!-- Sidebar -->
<div class="sb-overlay" id="sb-overlay" onclick="closeSB()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-header">
    <div class="sb-user">
      <div class="sb-av" id="sb-av">م</div>
      <div>
        <div class="sb-user-name" id="sb-name">مرحباً!</div>
        <div class="sb-user-sub">استكشف المنطقة العربية</div>
      </div>
      <button onclick="closeSB()" style="margin-right:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px">✕</button>
    </div>
    <div class="sb-geo">
      <span onclick="goArab()" style="cursor:pointer">🌍 الوطن العربي</span>
      <span class="sb-geo-sep">›</span>
      <span onclick="goPalestine()" style="cursor:pointer">🇵🇸 فلسطين</span>
    </div>
  </div>
  <div class="sb-body" id="sb-body"></div>
</div>

<!-- Entity Bottom Card -->
<div class="bottom-card" id="bottom-card">
  <div class="bc-handle"></div>
  <button class="bc-close" onclick="closeCard()">✕</button>
  <div class="bc-body" id="bc-body"></div>
</div>

<!-- City Panel -->
<div class="city-panel" id="city-panel">
  <div class="cp-handle"></div>
  <button class="cp-close" onclick="closeCityPanel()">✕</button>
  <div id="city-panel-body"></div>
</div>

<!-- Mobile Bottom Sheet -->
<div class="mob-sheet" id="mob-sheet">
  <div class="ms-handle" onclick="toggleMobSheet()"></div>
  <div class="ms-cats" id="ms-cats"></div>
</div>

<div id="toast"></div>

<script>
/* ══ Config ══ */
const SB_URL  = 'https://iecniydswotsilaueogq.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25peWRzd290c2lsYXVlb2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTg1OTcsImV4cCI6MjA5Nzc3NDU5N30.69LfEBHUwToTHue3EPS_KYq9BvDSZJ9jcW_P1yRKReA';
const db  = supabase.createClient(SB_URL,SB_ANON);
const me  = JSON.parse(localStorage.getItem('azza_user')||'null');
if(!me) location.href='login.html';
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const toast=(m,t='ok')=>{const el=document.getElementById('toast');el.textContent=m;el.style.background=t==='ok'?'#1c5b38':t==='err'?'#c0392b':'rgba(198,151,73,.9)';el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',2500)};
const D=id=>document.getElementById(id);
const haversine=(a,b,c,d)=>{const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))};

/* ══ Map ══ */
function initMap(){
  MAP=L.map('map',{zoomControl:false,attributionControl:false,zoomAnimation:true}).setView([31.9,35.2],8);
  const lt=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'});
  const dt=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'});
  const dk=localStorage.getItem('azza_theme')==='dark';
  (dk?dt:lt).addTo(MAP); MAP.lt=lt; MAP.dt=dt;

  CLUSTER=L.markerClusterGroup({
    maxClusterRadius:55,spiderfyOnMaxZoom:true,showCoverageOnHover:false,
    iconCreateFunction(c){
      const n=c.getChildCount(),s=n<10?34:n<50?42:50;
      return L.divIcon({html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:#1c5b38;color:#fff;display:flex;align-items:center;justify-content:center;font-family:Tajawal,sans-serif;font-size:${s>38?14:12}px;font-weight:900;border:3px solid #fff;box-shadow:0 4px 14px rgba(0,0,0,.3)">${n}</div>`,className:'',iconSize:[s,s]});
    }
  });
  MAP.addLayer(CLUSTER);

  /* City zones */
  CITIES.forEach(c=>{
    L.circleMarker([c.la,c.lo],{radius:18,color:c.sc>70?'#1c5b38':c.sc>50?'#c69749':'#ef4444',fillColor:'transparent',fillOpacity:0,weight:2,dashArray:'5,4',opacity:.5})
      .addTo(MAP).on('click',()=>showCity(c));
    L.marker([c.la,c.lo],{icon:L.divIcon({html:`<div style="background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border-radius:6px;padding:2px 8px;font-family:Tajawal,sans-serif;font-size:11px;font-weight:700;color:#1a1814;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.15);cursor:pointer">${c.n}</div>`,className:'',iconAnchor:[-4,-10]})})
      .addTo(MAP).on('click',()=>showCity(c));
  });

  /* Me marker */
  if(me?.lat&&me?.lng){
    const myM=L.divIcon({html:`<div style="width:40px;height:40px;border-radius:50%;background:#c69749;border:4px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#0e3622">${(me.name||'م')[0]}</div>`,className:'',iconSize:[40,40],iconAnchor:[20,20]});
    L.marker([me.lat,me.lng],{icon:myM}).addTo(MAP).bindPopup(`<div style="font-family:Tajawal;direction:rtl;text-align:center;padding:4px"><strong>📍 ${esc(me.name||'أنت')}</strong></div>`);
    MAP.setView([me.lat,me.lng],10,{animate:true});
  }

  MAP.on('click',()=>{closeCard();closeCityPanel();D('ac-drop').classList.remove('open');});
}

/* ══ Add Marker ══ */
function addM(e){
  if(!e.lat||!e.lng||!e.id) return;
  const t=ET.find(x=>x.id===e.type)||ET[0];
  const icon=L.divIcon({
    html:`<div style="width:36px;height:36px;border-radius:50%;background:${t.color};border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:.2s" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform=''">${t.em}</div>`,
    className:'',iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20],
  });
  const m=L.marker([e.lat,e.lng],{icon});
  m.on('click',()=>showCard(e));
  CLUSTER.addLayer(m);
  MARKERS.push({m,e,type:e.type,cc:e.country_code});
}

function filterCity(name,la,lo){
  CLUSTER.clearLayers();
  let n=0;
  MARKERS.forEach(({m,e})=>{ if((e.city_name||e.city||'')===name){CLUSTER.addLayer(m);n++;} });
  closeCityPanel();
  MAP.setView([la,lo],13,{animate:true});
  showCount(n+' كيان في '+name);
}

function filterType(type,chip){
  activeType=type;
  /* تحديث أزرار Sidebar */
  document.querySelectorAll('[id^="cat-"]').forEach(b=>{
    b.style.background='';b.style.color='var(--ink)';b.style.borderColor='var(--line)';
  });
  if(chip){chip.style.background='#1c5b38';chip.style.color='#fff';chip.style.borderColor='#1c5b38';}
  CLUSTER.clearLayers();
  let n=0;
  MARKERS.forEach(({m,e})=>{ if(!type||e.type===type){CLUSTER.addLayer(m);n++;} });
  if(type) showCount(n+' '+( ET.find(x=>x.id===type)?.label||''));
  else hideCount();
}

/* ══ Heatmap ══ */
function toggleHeat(){
  heatOn=!heatOn;
  const b=D('btn-heat'), badge=D('heat-badge');
  if(heatOn){
    const pts=ALL.filter(e=>e.lat&&e.lng).map(e=>[e.lat,e.lng,(e.trust_score||30)/100]);
    HEAT=L.heatLayer(pts,{radius:32,blur:18,maxZoom:13,gradient:{0.2:'#1c5b38',0.5:'#c69749',0.8:'#ef4444',1:'#7c3aed'}}).addTo(MAP);
    CLUSTER.eachLayer(m=>m.setOpacity(.15));
    b.classList.add('on'); badge.classList.add('show');
    toast('Heatmap — كثافة النشاط التجاري');
  }else{
    if(HEAT){MAP.removeLayer(HEAT);HEAT=null;}
    CLUSTER.eachLayer(m=>m.setOpacity(1));
    b.classList.remove('on'); badge.classList.remove('show');
  }
}

/* ══ Search ══ */
function onSrch(q){
  const clr=D('srch-clear');
  clr.classList.toggle('show',q.length>0);
  if(!q.trim()){D('ac-drop').classList.remove('open');return;}
  const low=q.toLowerCase();
  const cRes=CITIES.filter(c=>c.n.includes(q)).slice(0,3).map(c=>({name:c.n,sub:'مدينة فلسطينية',em:'🏙️',_city:c}));
  const eRes=ALL.filter(e=>(e.name||'').toLowerCase().includes(low)||(e.bio||'').toLowerCase().includes(low)||(e.city||'').toLowerCase().includes(low)).slice(0,6).map(e=>({name:e.name,sub:(ET.find(t=>t.id===e.type)||ET[0]).label+' · '+(e.city||''),em:(ET.find(t=>t.id===e.type)||ET[0]).em,_e:e}));
  const items=[...cRes,...eRes];
  if(!items.length){D('ac-drop').innerHTML='<div class="ac-item" style="color:var(--muted)">لا نتائج</div>';D('ac-drop').classList.add('open');return;}
  D('ac-drop')._items=items;
  D('ac-drop').innerHTML=items.map((it,i)=>`
    <div class="ac-item" onclick="_selAC(${i})">
      <div class="ac-em" style="background:var(--bg2)">${it.em}</div>
      <div class="ac-info"><div class="ac-name">${esc(it.name)}</div><div class="ac-type">${esc(it.sub)}</div></div>
    </div>`).join('');
  D('ac-drop').classList.add('open');
}
function _selAC(i){
  const it=D('ac-drop')._items?.[i]; if(!it) return;
  D('srch').value=it.name; D('ac-drop').classList.remove('open');
  if(it._city) showCity(it._city);
  else if(it._e) showCard(it._e);
}
function clearSrch(){D('srch').value='';D('srch-clear').classList.remove('show');D('ac-drop').classList.remove('open');filterType(activeType);}
document.addEventListener('click',e=>{if(!e.target.closest('.search-pill'))D('ac-drop').classList.remove('open');});

    {em:'🏅',label:'منح',sub:ALL.filter(e=>e.type==='grant').length+' فرصة',type:'grant'},
    {em:'🏆',label:'مسابقات',sub:ALL.filter(e=>e.type==='competition').length+' مسابقة',type:'competition'},
    {em:'🌱',label:'حاضنات',sub:ALL.filter(e=>e.type==='incubator').length+' حاضنة',type:'incubator'},
    {em:'📅',label:'فعاليات',sub:ALL.filter(e=>e.type==='event').length+' فعالية',type:'event'},
  ];
  D('sb-body').innerHTML=`
    <div class="sb-section-title">تصفح حسب النوع</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;padding:0 0 12px" id="sb-cat-chips">
      <button style="padding:6px 12px;border-radius:99px;border:1.5px solid var(--o);background:var(--o);color:#fff;font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;cursor:pointer" id="cat-all" onclick="filterType('',this)">🌐 الكل</button>
      ${ET.map(t=>`<button style="padding:6px 12px;border-radius:99px;border:1.5px solid var(--line);background:none;color:var(--ink);font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.15s" id="cat-${t.id}" onclick="filterType('${t.id}',this)">${t.em} ${t.label}</button>`).join('')}
    </div>
    <div class="sb-sep"></div>
    <div class="sb-section-title">تفاصيل</div>
    ${items.map(it=>`
      <div class="sb-item" onclick="filterType('${it.type}',document.getElementById('cat-${it.type}'));closeSB()">
        <div class="sb-item-em" style="background:${(ET.find(t=>t.id===it.type)||ET[0]).bg}">${it.em}</div>
        <div class="sb-item-info">
          <div class="sb-item-label">${it.label}</div>
          <div class="sb-item-sub">${it.sub}</div>
        </div>
      </div>`).join('')}
    <div class="sb-sep"></div>
    <div class="sb-section-title">أدوات</div>
    <div class="sb-item" onclick="toggleHeat();closeSB()"><div class="sb-item-em" style="background:rgba(239,68,68,.1)">🔥</div><div class="sb-item-info"><div class="sb-item-label">Heatmap</div><div class="sb-item-sub">عرض كثافة النشاط</div></div></div>
    <div class="sb-item" onclick="locateMe();closeSB()"><div class="sb-item-em" style="background:rgba(28,91,56,.1)">📍</div><div class="sb-item-info"><div class="sb-item-label">موقعي</div><div class="sb-item-sub">اكتشف ما حولك</div></div></div>
    <div class="sb-item" onclick="filterType('',document.getElementById('cat-all'));closeSB()"><div class="sb-item-em" style="background:rgba(99,102,241,.1)">🔄</div><div class="sb-item-info"><div class="sb-item-label">عرض الكل</div><div class="sb-item-sub">إعادة تعيين الفلاتر</div></div></div>
    <div class="sb-item" onclick="location.href='app.html'"><div class="sb-item-em" style="background:rgba(198,151,73,.1)">✦</div><div class="sb-item-info"><div class="sb-item-label">الفيد الرئيسي</div><div class="sb-item-sub">العودة للمنصة</div></div></div>
    <div class="sb-sep"></div>
    <div style="padding:16px 20px;font-size:12px;color:var(--muted);line-height:1.7">
      💡 اضغط أي نقطة للتفاصيل<br>
      🏙️ اضغط اسم مدينة للوحة بياناتها<br>
      🔥 Heatmap يُظهر كثافة النشاط
    </div>`;
}

function toggleSB(){sbOpen?closeSB():openSB();}
function openSB(){D('sidebar').classList.add('open');D('sb-overlay').classList.add('show');sbOpen=true;}
function closeSB(){D('sidebar').classList.remove('open');D('sb-overlay').classList.remove('show');sbOpen=false;}

/* ══ Mobile Bottom Sheet ══ */
function buildMobSheet(){
  D('ms-cats').innerHTML=ET.slice(0,10).map(t=>`
    <div class="ms-cat" onclick="filterType('${t.id}',document.getElementById('cat-${t.id}'))">
      <div class="ms-cat-em">${t.em}</div>
      <div class="ms-cat-lbl">${t.label}</div>
    </div>`).join('');
}
function toggleMobSheet(){
  const s=D('mob-sheet');
  const isOpen=s.style.bottom==='0px';
  s.style.bottom=isOpen?'-120px':'0px';
}

/* ══ GPS ══ */
function locateMe(){
  navigator.geolocation?.getCurrentPosition(p=>{
    const{latitude:la,longitude:lo}=p.coords;
    MAP.setView([la,lo],13,{animate:true});
    L.circleMarker([la,lo],{radius:10,color:'#1c5b38',fillColor:'#1c5b38',fillOpacity:.3,weight:2}).addTo(MAP).bindPopup('📍 موقعك').openPopup();
    /* أقرب الكيانات */
    const near=ALL.map(e=>({...e,_d:haversine(la,lo,e.lat,e.lng)})).filter(e=>e._d<15).sort((a,b)=>a._d-b._d).slice(0,3);
    if(near.length) toast('قريب منك: '+near.map(e=>e.name).join('، '));
    else toast('تم تحديد موقعك ✅');
  },()=>toast('تعذّر تحديد الموقع','err'));
}

/* ══ Geo Dropdown ══ */
function toggleGeoDd(){
  const dd=D('geo-dd');
  const isOpen=dd.classList.contains('open');
  if(isOpen){ closeGeoDd(); return; }
  /* بناء قائمة المدن */
  D('geo-cities-list').innerHTML=CITIES.map(c=>`
    <div class="geo-dd-item" onclick="selectCity_geo(${JSON.stringify(c).replace(/"/g,'&quot;')})">
      🏙️ ${c.n}
      <span class="geo-dd-count">${c.u} مستخدم</span>
    </div>`).join('');
  dd.classList.add('open');
  /* إغلاق عند النقر خارجه */
  setTimeout(()=>document.addEventListener('click',closeGeoDdOut),10);
}
function closeGeoDd(){ D('geo-dd').classList.remove('open'); document.removeEventListener('click',closeGeoDdOut); }
function closeGeoDdOut(e){ if(!e.target.closest('.geo-nav')&&!e.target.closest('.geo-dropdown')) closeGeoDd(); }
function selectCity_geo(c){
  if(typeof c==='string') c=JSON.parse(c);
  showCity(c);
  D('geo-country-btn').textContent='🏙️ '+c.n+' ▾';
  closeGeoDd();
}

/* ══ Navigation ══ */
function goArab(){ MAP.setView([25,38],4,{animate:true,duration:.8});const b=D('geo-country-btn');if(b)b.textContent='🌍 الوطن العربي ▾'; }
function goPalestine(){ MAP.setView([31.9,35.2],8,{animate:true,duration:.5});const b=D('geo-country-btn');if(b)b.textContent='🇵🇸 فلسطين ▾';closeGeoDd();toast('فلسطين 🇵🇸'); }

/* ══ Theme ══ */
function toggleTheme(){
  const dk=document.documentElement.classList.toggle('dk');
  localStorage.setItem('azza_theme',dk?'dark':'light');
  D('btn-theme').textContent=dk?'☀️':'🌙';
  if(dk){MAP.lt.remove();MAP.dt.addTo(MAP);}
  else{MAP.dt.remove();MAP.lt.addTo(MAP);}
}

/* ══ Follow ══ */
async function follow(id){
  await db.from('follows').upsert({follower_id:me.id,following_id:id},{onConflict:'follower_id,following_id'});
  toast('تم المتابعة ✅');
}

/* ══ Supabase ══ */
async function loadSupa(){
  try{
    const{data}=await db.from('users').select('id,name,type,bio,photo,city_name,country_code,lat,lng,is_verified,trust_score').not('lat','is',null).limit(400);
    (data||[]).forEach(u=>{if(!ALL.find(x=>x.id===u.id)){ALL.push(u);addM(u);}});
    buildSidebar();
  }catch(e){}
}

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeCard();closeCityPanel();closeSB();}
  if(e.key==='f'&&!e.target.closest('input')) toggleHeat();
  if(e.key==='/'&&!e.target.closest('input')){e.preventDefault();D('srch').focus();}
});
</script>
