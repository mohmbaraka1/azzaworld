<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>استكشاف الخريطة — AZZA</title>
<script src="supabase.js"></script>
<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Clustering -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{--gold:#c69749;--olive:#1c5b38;--od:#0e3622;--ol:rgba(28,91,56,.1);
  --bg:#f5f0e8;--bg2:#ece5d4;--card:#fff;--ink:#1a1814;--sub:#7a7060;--muted:#9a9080;
  --line:rgba(0,0,0,.08);--r:12px;--sidebar-w:300px}
.dk{--bg:#111009;--bg2:#1a180f;--card:#1e1c12;--ink:#f0ead8;--sub:#9a9080;--line:rgba(255,255,255,.07)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:Tajawal,sans-serif;background:var(--bg);color:var(--ink);direction:rtl}

/* ── Topbar ── */
.topbar{position:fixed;top:0;right:0;left:0;height:54px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:1000;display:flex;align-items:center;padding:0 14px;gap:10px}
.dk .topbar{background:rgba(30,28,18,.95)}
.tb-back{width:34px;height:34px;border-radius:10px;border:none;background:var(--bg2);cursor:pointer;color:var(--sub);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.tb-logo{font-size:15px;font-weight:900;color:var(--olive)}
.tb-search-wrap{flex:1;max-width:360px;margin:0 auto;position:relative}
.tb-search{width:100%;height:36px;border-radius:99px;border:1.5px solid var(--line);background:var(--bg2);padding:0 36px 0 12px;font-family:Tajawal,sans-serif;font-size:13px;color:var(--ink);outline:none;transition:.2s}
.tb-search:focus{border-color:var(--olive);background:var(--card)}
.tb-search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
.tb-acts{display:flex;gap:6px;margin-right:auto}
.tb-act{width:34px;height:34px;border-radius:10px;border:none;background:var(--bg2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:.15s}
.tb-act:hover,.tb-act.active{background:var(--olive);color:#fff}

/* ── Map ── */
#map{position:fixed;top:54px;right:0;bottom:0;left:0;z-index:1}
.dk #map .leaflet-tile{filter:brightness(.7) invert(1) contrast(3) hue-rotate(200deg) saturate(.3) brightness(.7)}

/* ── Sidebar ── */
.sidebar{position:fixed;top:54px;right:0;bottom:0;width:var(--sidebar-w);background:var(--card);border-left:1px solid var(--line);z-index:500;display:flex;flex-direction:column;transition:.3s;transform:translateX(0)}
.sidebar.closed{transform:translateX(var(--sidebar-w))}
.sidebar::-webkit-scrollbar{width:0}
.sb-toggle{position:fixed;top:50%;right:0;transform:translateY(-50%);z-index:501;width:24px;height:56px;background:var(--olive);color:#fff;border:none;border-radius:8px 0 0 8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.3s}
.sb-toggle.closed{right:var(--sidebar-w) !important;right:0}
.sidebar.closed~.sb-toggle{right:0}

/* Sidebar Sections */
.sb-hdr{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.sb-hdr-title{font-size:15px;font-weight:900;color:var(--olive)}
.sb-body{flex:1;overflow-y:auto;padding:14px}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:99px}
.sb-section{margin-bottom:20px}
.sb-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}

/* Filters */
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.filter-btn{padding:8px 6px;border-radius:9px;border:1.5px solid var(--line);background:none;font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px;justify-content:center}
.filter-btn:hover,.filter-btn.active{color:#fff;border-color:transparent}
.filter-btn span{font-size:14px}

/* Country Buttons */
.country-list{display:flex;flex-direction:column;gap:4px}
.country-btn{padding:9px 12px;border-radius:9px;border:none;background:var(--bg2);font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;transition:.15s;text-align:right;display:flex;align-items:center;gap:8px}
.country-btn:hover{background:var(--ol);color:var(--olive)}
.country-btn.active{background:var(--olive);color:#fff}
.country-flag{font-size:18px}
.country-count{margin-right:auto;font-size:11px;opacity:.7}

/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-mini{background:var(--bg2);border-radius:10px;padding:12px;text-align:center}
.stat-mini-num{font-size:20px;font-weight:900;color:var(--olive)}
.stat-mini-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* Recent */
.recent-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--line);cursor:pointer}
.recent-item:last-child{border:none}
.recent-av{width:32px;height:32px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.recent-info{flex:1;min-width:0}
.recent-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-type{font-size:11px;color:var(--muted)}

/* Popup */
.azza-popup{font-family:Tajawal,sans-serif;direction:rtl;min-width:230px;max-width:260px}
.pp-header{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.pp-av{width:46px;height:46px;border-radius:14px;object-fit:cover;background:var(--bg2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.pp-av img{width:100%;height:100%;border-radius:14px;object-fit:cover}
.pp-info{flex:1}
.pp-name{font-size:14px;font-weight:900;color:#1a1814;display:flex;align-items:center;gap:4px}
.pp-verified{color:#1c5b38;font-size:12px}
.pp-type{font-size:11px;color:#7a7060}
.pp-trust{font-size:11px;font-weight:700;color:#c69749}
.pp-body{font-size:12px;color:#6b6555;line-height:1.6;margin-bottom:10px}
.pp-location{display:flex;align-items:center;gap:4px;font-size:12px;color:#7a7060;margin-bottom:10px}
.pp-actions{display:flex;gap:6px}
.pp-btn{flex:1;padding:7px 0;border-radius:8px;border:none;font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.pp-msg{background:#1c5b38;color:#fff}.pp-msg:hover{background:#0e3622}
.pp-follow{border:1.5px solid #e0d8c8;background:none;color:#1a1814}.pp-follow:hover{border-color:#1c5b38;color:#1c5b38}
.pp-profile{background:#f5f0e8;color:#1a1814;border:none}.pp-profile:hover{background:#ece5d4}
.pp-sep{height:.5px;background:#e0d8c8;margin:8px 0}

/* Entity type colors */
.t-investor{background:#1c5b38!important}.t-entrepreneur{background:#c69749!important}
.t-student{background:#2563eb!important}.t-expert{background:#7c3aed!important}
.t-company{background:#0891b2!important}.t-startup{background:#ef4444!important}
.t-job{background:#16a34a!important}.t-ngo{background:#db2777!important}
.t-university{background:#854F0B!important}.t-project{background:#6b7280!important}

/* Legend */
.legend{position:fixed;bottom:20px;right:calc(var(--sidebar-w) + 10px);z-index:400;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:10px 14px;transition:.3s;max-width:180px}
.sidebar.closed~.legend{right:10px}
.legend-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Controls */
.map-controls{position:fixed;bottom:20px;left:14px;z-index:400;display:flex;flex-direction:column;gap:6px}
.mc-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--ink)}
.mc-btn:hover{background:var(--olive);color:#fff}

/* Toast */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;z-index:999;opacity:0;transition:.3s;pointer-events:none;font-family:Tajawal}

/* Responsive */
@media(max-width:600px){
  :root{--sidebar-w:85vw}
  .sidebar{transform:translateX(var(--sidebar-w));width:var(--sidebar-w)}
  .sidebar.open{transform:translateX(0)}
  .legend,.map-controls{display:none}
}
</style>
</head>

    <div class="sb-section">

      <button onclick="locateMe()" style="width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--line);background:none;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)">📍 استخدم موقعي الحالي</button>
    </div>

    <!-- Recent -->
    <div class="sb-section">
      <div class="sb-section-title">تم عرضهم مؤخراً</div>

<!-- Legend -->

/* ══ Map Init ══ */
function initMap(){
  MAP=L.map('map',{zoomControl:false,attributionControl:false}).setView([31.5,35.0],7);

  /* Light Tiles */
  const lightTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'});
  /* Dark Tiles */
  const darkTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'});
  const isDk=localStorage.getItem('azza_theme')==='dark';
  (isDk?darkTiles:lightTiles).addTo(MAP);
  MAP._lightTiles=lightTiles; MAP._darkTiles=darkTiles;

  /* Cluster */
  CLUSTER=L.markerClusterGroup({
    maxClusterRadius:50,
    spiderfyOnMaxZoom:true,
    showCoverageOnHover:false,
    zoomToBoundsOnClick:true,
    iconCreateFunction(c){
      const n=c.getChildCount();
      const size=n<10?36:n<50?44:52;
      return L.divIcon({html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:#1c5b38;color:#fff;display:flex;align-items:center;justify-content:center;font-family:Tajawal,sans-serif;font-size:${size>40?15:13}px;font-weight:900;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.25)">${n}</div>`,className:'',iconSize:[size,size]});
    }
  });
  MAP.addLayer(CLUSTER);

  /* Events */
  MAP.on('moveend',updateStats);
  MAP.on('zoomend',updateStats);
}

    {id:'d11',name:'مستثمر أردني',type:'investor',bio:'أبحث عن مشاريع ناشئة في الأردن وفلسطين',city:'عمان',country_code:'JO',lat:31.9539,lng:35.9106,is_verified:true,trust_score:72},
    {id:'d12',name:'رائدة أعمال لبنانية',type:'entrepreneur',bio:'مؤسسة منصة التجارة الإلكترونية',city:'بيروت',country_code:'LB',lat:33.8938,lng:35.5018,is_verified:true,trust_score:65},
  ];

  const all=[...(users||[]),...DEMO];
  all.forEach(u=>addMarker(u));
  document.getElementById('stat-total').textContent=all.length;
  updateStats();
}

/* ══ إضافة Marker ══ */
function addMarker(entity){
  if(!entity.lat||!entity.lng) return;
  const type=ENTITY_TYPES.find(t=>t.id===entity.type)||ENTITY_TYPES[0];
  const icon=L.divIcon({
    html:`<div style="width:36px;height:36px;border-radius:50%;background:${type.color};border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:.2s">${type.em}</div>`,
    className:'',
    iconSize:[36,36],
    iconAnchor:[18,18],
    popupAnchor:[0,-18],
  });

  const m=L.marker([entity.lat,entity.lng],{icon});
  m.entity=entity;
  m.on('click',()=>showPopup(m,entity));
  CLUSTER.addLayer(m);
  ALL_MARKERS.push({marker:m,entity,type:entity.type,country:entity.country_code});
}

/* ══ Popup ══ */
function showPopup(m,e){
  const type=ENTITY_TYPES.find(t=>t.id===e.type)||ENTITY_TYPES[0];
  const photoHTML=e.photo
    ?`<img src="${esc(e.photo)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';
  const html=`
    <div class="azza-popup">
      <div class="pp-header">
        <div class="pp-av">${photoHTML}<span>${type.em}</span></div>
        <div class="pp-info">
          <div class="pp-name">${esc(e.name||'—')}${e.is_verified?'<span class="pp-verified">✓</span>':''}</div>
          <div class="pp-type">${type.em} ${type.label}</div>
          ${e.trust_score?`<div class="pp-trust">⭐ Trust ${e.trust_score}</div>`:''}
        </div>
      </div>
      ${e.bio?`<div class="pp-body">${esc((e.bio||'').substring(0,90))}${(e.bio||'').length>90?'...':''}</div>`:''}
      <div class="pp-location">📍 ${esc(e.city_name||e.city||'')}${e.country_code?', '+e.country_code:''}</div>
      <div class="pp-sep"></div>
      <div class="pp-actions">
        <button class="pp-btn pp-msg" onclick="location.href='messages.html?to=${esc(e.id)}'">💬 رسالة</button>
        <button class="pp-btn pp-follow" onclick="followEntity('${esc(e.id)}')">+ تابع</button>
        <button class="pp-btn pp-profile" onclick="location.href='user.html?id=${esc(e.id)}'">الملف</button>
      </div>
    </div>`;

  m.bindPopup(L.popup({maxWidth:270,closeButton:true,className:'azza-leaflet-popup'}).setContent(html)).openPopup();
  addRecent(e);
}

/* ══ Filters ══ */
function buildFilters(){
  document.getElementById('filter-grid').innerHTML=ENTITY_TYPES.map(t=>`
    <button class="filter-btn" id="f-${t.id}" onclick="toggleFilter('${t.id}')" style="border-color:${t.color}20">
      <span>${t.em}</span>${t.label}
    </button>`).join('');
}

function toggleFilter(type){
  const btn=document.getElementById('f-'+type);
  const t=ENTITY_TYPES.find(x=>x.id===type);
  if(activeFilters.has(type)){
    activeFilters.delete(type);
    btn.classList.remove('active');
    btn.style.background='';
    btn.style.color='';
  }else{
    activeFilters.add(type);
    btn.classList.add('active');
    btn.style.background=t.color;
    btn.style.color='#fff';
  }
  applyFilters();
}

function applyFilters(){
  CLUSTER.clearLayers();
  const hasF=activeFilters.size>0;
  const hasC=activeCountry!=='';
  ALL_MARKERS.forEach(({marker,entity,type,country})=>{
    const typeOK=!hasF||activeFilters.has(type);
    const countryOK=!hasC||country===activeCountry;
    if(typeOK&&countryOK) CLUSTER.addLayer(marker);
  });
  updateStats();
}

function resetFilters(){
  activeFilters.clear();
  activeCountry='';
  document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';});
  document.querySelectorAll('.country-btn').forEach(b=>b.classList.remove('active'));
  applyFilters();
}

/* ══ Countries ══ */
function buildCountryList(){
  document.getElementById('country-list').innerHTML=ARAB_COUNTRIES.map(c=>`
    <button class="country-btn" id="cb-${c.code}" onclick="focusCountry('${c.code}',${c.lat},${c.lng},${c.zoom})">
      ${c.name}<span class="country-count"></span>
    </button>`).join('');
}

function focusCountry(code,lat,lng,zoom){
  activeCountry=activeCountry===code?'':code;
  document.querySelectorAll('.country-btn').forEach(b=>b.classList.toggle('active',b.id==='cb-'+code&&activeCountry===code));
  if(activeCountry) MAP.setView([lat,lng],zoom,{animate:true,duration:.5});
  applyFilters();
}

/* ══ Legend ══ */
function buildLegend(){
  document.getElementById('legend-items').innerHTML=ENTITY_TYPES.slice(0,6).map(t=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${t.color}"></div>
      <span>${t.em} ${t.label}</span>
    </div>`).join('');
}

/* ══ Navigate ══ */
function fitArabWorld(){ MAP.setView([25,38],4,{animate:true,duration:.8}); }
function focusPalestine(){ MAP.setView([31.9,35.2],8,{animate:true,duration:.6}); }

function locateMe(){
  navigator.geolocation?.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    MAP.setView([lat,lng],12,{animate:true});
    L.circleMarker([lat,lng],{radius:10,color:'#1c5b38',fillColor:'#1c5b38',fillOpacity:.4}).addTo(MAP).bindPopup('📍 موقعك الحالي').openPopup();
    toast('تم تحديد موقعك');
  },()=>toast('تعذّر تحديد الموقع','err'));
}

/* ══ Search ══ */
function doMapSearch(q){
  if(!q.trim()){ applyFilters(); return; }
  const low=q.toLowerCase();
  CLUSTER.clearLayers();
  let count=0;
  ALL_MARKERS.forEach(({marker,entity})=>{
    const match=(entity.name||'').toLowerCase().includes(low)||(entity.bio||'').toLowerCase().includes(low)||(entity.city_name||entity.city||'').toLowerCase().includes(low);
    if(match){ CLUSTER.addLayer(marker); count++; }
  });
  document.getElementById('stat-visible').textContent=count;
  if(count>0) toast(`${count} نتيجة`);
  else toast('لا نتائج','err');
}

/* ══ Stats ══ */
function updateStats(){
  const bounds=MAP.getBounds();
  let visible=0;
  CLUSTER.eachLayer(m=>{ if(bounds.contains(m.getLatLng())) visible++; });
  document.getElementById('stat-visible').textContent=visible;
}

/* ══ Recent ══ */
function addRecent(e){
  if(RECENT.find(r=>r.id===e.id)) return;
  RECENT.unshift(e);
  if(RECENT.length>5) RECENT.pop();
  renderRecent();
}
function renderRecent(){
  const type=t=>ENTITY_TYPES.find(x=>x.id===t)||ENTITY_TYPES[0];
  document.getElementById('recent-list').innerHTML=RECENT.map(e=>`
    <div class="recent-item" onclick="MAP.setView([${e.lat},${e.lng}],14,{animate:true})">
      <div class="recent-av">${type(e.type).em}</div>
      <div class="recent-info">
        <div class="recent-name">${esc(e.name||'—')}</div>
        <div class="recent-type">${type(e.type).label} · ${esc(e.city_name||e.city||'')}</div>
      </div>
    </div>`).join('');
}

/* ══ Follow ══ */
async function followEntity(id){
  if(!me){ toast('سجّل دخولاً','err'); return; }
  await db.from('follows').upsert({follower_id:me.id,following_id:id},{onConflict:'follower_id,following_id'});
  toast('تم المتابعة ✅');
}

/* ══ Sidebar ══ */
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('sb-toggle');
  const legend=document.getElementById('legend');
  if(sidebarOpen){ sb.classList.remove('closed'); btn.textContent='▶'; }
  else{ sb.classList.add('closed'); btn.textContent='◀'; }
}

/* ══ Theme ══ */
function toggleTheme(){
  const dk=document.documentElement.classList.toggle('dk');
  localStorage.setItem('azza_theme',dk?'dark':'light');
  document.getElementById('theme-btn').textContent=dk?'☀️':'🌙';
  if(dk){ MAP._lightTiles.remove(); MAP._darkTiles.addTo(MAP); }
  else  { MAP._darkTiles.remove(); MAP._lightTiles.addTo(MAP); }
}

  }
})();
