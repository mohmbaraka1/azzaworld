<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AZZA — تحدي النظام 🏆</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:#0e3622;color:#f7f1e3;min-height:100vh;direction:rtl;padding:16px}
h1{font-size:22px;font-weight:900;color:#c69749;text-align:center;padding:24px 0 8px}
.sub{text-align:center;font-size:13px;opacity:.6;margin-bottom:20px}
.scores{display:flex;justify-content:center;gap:32px;margin-bottom:20px;padding:14px;background:rgba(0,0,0,.3);border-radius:12px}
.sc{text-align:center}
.sc-n{font-size:30px;font-weight:900;color:#c69749}
.sc-l{font-size:11px;opacity:.6}
.btn-all{display:block;width:100%;max-width:480px;margin:0 auto 20px;padding:14px;background:linear-gradient(135deg,#c69749,#e8b96a);color:#0e3622;border:none;border-radius:999px;font-family:Tajawal,sans-serif;font-size:15px;font-weight:900;cursor:pointer}
.btn-all:disabled{background:#555;color:#888;cursor:not-allowed}
.list{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.item{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:14px;transition:.3s}
.item.ok{border-color:#1baf7a;background:rgba(27,175,122,.08)}
.item.err{border-color:#e34948;background:rgba(227,73,72,.08)}
.item.run{border-color:#c69749;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.item-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.item-icon{font-size:20px}
.item-title{font-size:14px;font-weight:700;flex:1}
.item-pts{font-size:12px;color:#c69749;font-weight:700}
.item-desc{font-size:12px;opacity:.6;margin-bottom:10px}
.item-res{font-size:12px;padding:8px 10px;border-radius:8px;font-family:monospace;white-space:pre-wrap;display:none}
.res-ok{background:rgba(27,175,122,.15);color:#7dffcc}
.res-err{background:rgba(227,73,72,.15);color:#ffaaaa}
.final{max-width:480px;margin:20px auto 0;padding:24px;background:rgba(0,0,0,.4);border-radius:16px;text-align:center;display:none}
.final-stars{font-size:36px;margin-bottom:8px}
.final-score{font-size:44px;font-weight:900;color:#c69749}
.final-msg{font-size:14px;opacity:.7;margin-top:8px}
</style>
</head>
<body>

<h1>🏆 تحدي نظام AZZA</h1>
<p class="sub">اختبار شامل — 175 نقطة</p>

<div class="scores">
  <div class="sc"><div class="sc-n" id="s-ok">0</div><div class="sc-l">نجح</div></div>
  <div class="sc"><div class="sc-n" id="s-pts">0</div><div class="sc-l">نقطة</div></div>
  <div class="sc"><div class="sc-n" id="s-err">0</div><div class="sc-l">فشل</div></div>
</div>

<button class="btn-all" id="run-all" onclick="runAll()">⚡ ابدأ التحدي</button>
<div class="list" id="list"></div>
<div class="final" id="final">
  <div class="final-stars" id="f-stars"></div>
  <div class="final-score" id="f-score"></div>
  <div class="final-msg" id="f-msg"></div>
</div>

<script>
const SB='https://iecniydswotsilaueogq.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25peWRzd290c2lsYXVlb2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTg1OTcsImV4cCI6MjA5Nzc3NDU5N30.69LfEBHUwToTHue3EPS_KYq9BvDSZJ9jcW_P1yRKReA';
const db=supabase.createClient(SB,AK);
const me=JSON.parse(localStorage.getItem('azza_user')||'null');

const T=[
{id:'auth',icon:'🔐',title:'جلسة Auth',pts:10,
 run:async()=>{
  const {data}=await db.auth.getSession();
  if(!data?.session) throw'لا توجد جلسة Auth';
  if(data.session.user.id!==me?.id) throw'auth.uid ≠ localStorage.id';
  return 'auth.uid='+me.id.slice(0,8)+'...';
}},
{id:'posts',icon:'📝',title:'المنشورات من Supabase',pts:15,
 run:async()=>{
  const {data,error}=await db.from('posts').select('id').limit(5);
  if(error) throw error.message;
  if(!data?.length) throw'لا توجد منشورات';
  return data.length+' منشور موجود';
}},
{id:'notif_rw',icon:'📬',title:'كتابة وقراءة الإشعارات',pts:15,
 run:async()=>{
  const {data,error}=await db.from('notifications').insert({
    user_id:me.id,recipient_id:me.id,actor_id:me.id,
    type:'ch_test',message:'test '+Date.now(),is_read:false,read:false
  }).select('id,recipient_id,is_read').single();
  if(error) throw error.message;
  window._tid=data.id;
  return 'id='+data.id+' | recipient_id ✓';
}},
{id:'realtime',icon:'⚡',title:'Realtime — وصول فوري',pts:20,
 run:async()=>new Promise((ok,fail)=>{
  let got=false;
  const t0=Date.now();
  const ch=db.channel('ch_rt_'+t0)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',
      filter:'recipient_id=eq.'+me.id},p=>{
      got=true;db.removeChannel(ch);
      ok('وصل خلال '+(Date.now()-t0)+'ms | id='+p.new.id);
    }).subscribe(async s=>{
      if(s!=='SUBSCRIBED') return;
      await db.from('notifications').insert({
        user_id:me.id,recipient_id:me.id,actor_id:me.id,
        type:'ch_rt',message:'rt '+Date.now(),is_read:false,read:false
      });
    });
  setTimeout(()=>{if(!got){db.removeChannel(ch);fail('لم يصل خلال 20 ثانية — تحقق من اتصالك بالإنترنت');}},20000);
})},
{id:'trigger_c',icon:'💬',title:'Trigger التعليق (تحقق بـRPC)',pts:25,
 run:async()=>{
  /* استخدم RPC لتجاوز RLS */
  const {data:posts}=await db.from('posts').select('id,author_id').neq('author_id',me.id).limit(3);
  if(!posts?.length) throw'لا يوجد منشور لشخص آخر';
  let post=null;
  for(const p of posts){
    const {error}=await db.from('post_comments').insert({
      post_id:p.id,author_id:me.id,author_name:me.name||'test',
      content:'ch_'+Date.now()
    });
    if(!error){post=p;break;}
  }
  if(!post) throw'فشل إدراج التعليق بكل المنشورات';
  await new Promise(r=>setTimeout(r,2500));
  const {data:n,error:ne}=await db.rpc('check_notif_created',{
    p_type:'comment',p_entity:post.id,
    p_after:new Date(Date.now()-30000).toISOString()
  });
  if(ne) throw'RPC error: '+ne.message;
  if(!n) throw'Trigger لم يُنشئ إشعاراً';
  return '✓ Trigger أنشأ إشعار id='+n;
}},
{id:'trigger_v',icon:'▲',title:'Trigger التصويت (تحقق بـRPC)',pts:25,
 run:async()=>{
  const {data:posts}=await db.from('posts').select('id,author_id').neq('author_id',me.id).limit(3);
  if(!posts?.length) throw'لا يوجد منشور لشخص آخر';
  let post=null;
  for(const p of posts){
    await db.from('post_reactions').delete().eq('post_id',p.id).eq('user_id',me.id).eq('reaction_type','vote');
    const {error}=await db.from('post_reactions').insert({post_id:p.id,user_id:me.id,reaction_type:'vote'});
    if(!error){post=p;break;}
  }
  if(!post) throw'فشل إدراج التصويت';
  await new Promise(r=>setTimeout(r,2500));
  const {data:n,error:ne}=await db.rpc('check_notif_created',{
    p_type:'vote',p_entity:post.id,
    p_after:new Date(Date.now()-30000).toISOString()
  });
  if(ne) throw'RPC error: '+ne.message;
  if(!n) throw'Trigger التصويت لم يعمل';
  return '✓ Trigger أنشأ إشعار id='+n;
}},
{id:'trigger_f',icon:'👤',title:'Trigger المتابعة (تحقق بـRPC)',pts:25,
 run:async()=>{
  const {data:users}=await db.from('users').select('id,name').neq('id',me.id).limit(1);
  if(!users?.length) throw'لا يوجد مستخدم آخر';
  const u=users[0];
  await db.from('follows').delete().eq('follower_id',me.id).eq('following_id',u.id);
  await new Promise(r=>setTimeout(r,1000));
  const t0=new Date().toISOString();
  const {error}=await db.from('follows').insert({follower_id:me.id,following_id:u.id});
  if(error) throw'فشل إدراج المتابعة: '+error.message;
  await new Promise(r=>setTimeout(r,3000));
  const {data:n,error:ne}=await db.rpc('check_notif_created',{
    p_type:'follow',p_entity:me.id,p_after:t0
  });
  await db.from('follows').delete().eq('follower_id',me.id).eq('following_id',u.id);
  if(ne) throw'RPC error: '+ne.message;
  if(!n) throw'Trigger المتابعة لم يعمل';
  return '✓ Trigger أنشأ إشعار id='+n+' لـ'+u.name;
}},
{id:'unread',icon:'🔢',title:'عدد غير المقروءة',pts:10,
 run:async()=>{
  const {count}=await db.from('notifications').select('*',{count:'exact',head:true})
    .eq('recipient_id',me.id).eq('is_read',false);
  return 'غير مقروء: '+count;
}},
{id:'mark',icon:'✅',title:'تعليم كمقروء',pts:10,
 run:async()=>{
  if(!window._tid) throw'شغّل اختبار الكتابة أولاً';
  const {error}=await db.from('notifications').update({is_read:true,read:true})
    .eq('id',window._tid).eq('recipient_id',me.id);
  if(error) throw error.message;
  return 'id='+window._tid+' → is_read=true ✓';
}},
{id:'rls',icon:'🔒',title:'عزل البيانات (RLS)',pts:15,
 run:async()=>{
  const {data}=await db.from('notifications').select('id').neq('recipient_id',me.id).limit(1);
  if(data?.length) throw'❌ RLS تسمح برؤية إشعارات الآخرين!';
  return'RLS تعزل البيانات بشكل صحيح ✓';
}},
{id:'clean',icon:'🧹',title:'تنظيف',pts:5,
 run:async()=>{
  await db.from('notifications').delete().eq('recipient_id',me.id)
    .in('type',['ch_test','ch_rt']);
  return'تم تنظيف بيانات التحدي ✓';
}},
];

const TOTAL=T.reduce((s,t)=>s+t.pts,0);
let pts=0,ok=0,err=0;

// بناء الواجهة
const list=document.getElementById('list');
T.forEach(t=>{
  const d=document.createElement('div');
  d.className='item';d.id='i-'+t.id;
  d.innerHTML=`<div class="item-head">
    <span class="item-icon" id="ic-${t.id}">${t.icon}</span>
    <span class="item-title">${t.title}</span>
    <span class="item-pts">+${t.pts}pts</span>
  </div>
  <div class="item-res" id="r-${t.id}"></div>`;
  list.appendChild(d);
});

async function run(t){
  const el=document.getElementById('i-'+t.id);
  const res=document.getElementById('r-'+t.id);
  const ic=document.getElementById('ic-'+t.id);
  el.className='item run'; ic.textContent='⏳';
  res.style.display='none';
  try{
    const out=await t.run();
    el.className='item ok'; ic.textContent='✅';
    res.className='item-res res-ok'; res.textContent=out; res.style.display='block';
    pts+=t.pts; ok++;
    document.getElementById('s-ok').textContent=ok;
    document.getElementById('s-pts').textContent=pts;
  }catch(e){
    el.className='item err'; ic.textContent='❌';
    res.className='item-res res-err'; res.textContent=String(e); res.style.display='block';
    err++;
    document.getElementById('s-err').textContent=err;
  }
}

async function runAll(){
  pts=0;ok=0;err=0;
  ['s-ok','s-pts','s-err'].forEach(id=>document.getElementById(id).textContent=0);
  document.getElementById('run-all').disabled=true;
  document.getElementById('final').style.display='none';
  for(const t of T){ await run(t); await new Promise(r=>setTimeout(r,300)); }
  const pct=Math.round(pts/TOTAL*100);
  const stars=pct>=90?'🌟🌟🌟':pct>=70?'⭐⭐🌟':pct>=50?'⭐⭐':'⭐';
  const msg=pct>=90?'مثالي — جاهز للإطلاق!':pct>=70?'قوي مع بعض المشاكل':pct>=50?'يحتاج إصلاحات':'يحتاج مراجعة شاملة';
  const f=document.getElementById('final');
  f.style.display='block';
  document.getElementById('f-stars').textContent=stars;
  document.getElementById('f-score').textContent=pts+'/'+TOTAL+' ('+pct+'%)';
  document.getElementById('f-msg').textContent=msg;
  document.getElementById('run-all').disabled=false;
}

if(!me) document.body.innerHTML='<div style="padding:60px;text-align:center;color:#ffaaaa;font-size:18px">❌ سجّل دخول من app.html أولاً</div>';
</script>
</body>
</html>
