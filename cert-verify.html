<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>التحقق من الشهادة — AZZA Academy</title>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:#f5f0e8;color:#1a1814;direction:rtl;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:40px;max-width:500px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.logo{font-size:18px;font-weight:900;color:#1c5b38;margin-bottom:28px}
.status-icon{font-size:72px;margin-bottom:16px}
.status-title{font-size:24px;font-weight:900;margin-bottom:8px}
.status-sub{font-size:14px;color:#7a7060;margin-bottom:24px;line-height:1.6}
.cert-info{background:#f5f0e8;border-radius:14px;padding:20px;margin-bottom:24px;text-align:right}
.ci-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid rgba(0,0,0,.06)}
.ci-row:last-child{border:none}
.ci-label{font-size:12px;color:#9a9080;width:100px;flex-shrink:0}
.ci-val{font-size:14px;font-weight:700;flex:1}
.cert-id-badge{background:#1c5b38;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;font-family:monospace;margin-bottom:16px;display:inline-block}
.valid{color:#16a34a}
.invalid{color:#dc2626}
.btn{padding:11px 24px;border-radius:10px;border:none;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
.btn-p{background:#1c5b38;color:#fff}
.btn-o{border:1.5px solid #e0d8c8;background:none;color:#1a1814}
.loading{color:#9a9080;font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">✦ AZZA Academy</div>
  <div id="content">
    <div class="loading">⏳ جاري التحقق من الشهادة...</div>
  </div>
</div>
<script>
const SB_URL  = 'https://iecniydswotsilaueogq.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25peWRzd290c2lsYXVlb2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTg1OTcsImV4cCI6MjA5Nzc3NDU5N30.69LfEBHUwToTHue3EPS_KYq9BvDSZJ9jcW_P1yRKReA';
const db=supabase.createClient(SB_URL,SB_ANON);
const certId=new URLSearchParams(location.search).get('id');
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

(async()=>{
  if(!certId){
    document.getElementById('content').innerHTML=`<div class="status-icon">❓</div><div class="status-title">رابط غير صحيح</div>`;
    return;
  }
  try{
    const {data:cert}=await db.from('academy_certificates').select('*').eq('cert_id',certId).single();
    if(cert&&cert.is_valid){
      const date=new Date(cert.issued_at).toLocaleDateString('ar',{year:'numeric',month:'long',day:'numeric'});
      document.getElementById('content').innerHTML=`
        <div class="status-icon">✅</div>
        <div class="status-title valid">شهادة موثّقة وصالحة</div>
        <div class="status-sub">تم التحقق من صحة هذه الشهادة بنجاح</div>
        <div class="cert-id-badge">${esc(cert.cert_id)}</div>
        <div class="cert-info">
          <div class="ci-row"><span class="ci-label">الاسم</span><span class="ci-val">${esc(cert.user_name)}</span></div>
          <div class="ci-row"><span class="ci-label">الكورس</span><span class="ci-val">${esc(cert.course_title)}</span></div>
          <div class="ci-row"><span class="ci-label">المدرّس</span><span class="ci-val">${esc(cert.instructor||'فريق AZZA Academy')}</span></div>
          <div class="ci-row"><span class="ci-label">تاريخ الإصدار</span><span class="ci-val">${date}</span></div>
          <div class="ci-row"><span class="ci-label">الحالة</span><span class="ci-val valid">✓ صالحة وموثّقة</span></div>
        </div>
        <button class="btn btn-p" onclick="location.href='academy.html'">🎓 AZZA Academy</button>`;
    }else{
      throw new Error('not found');
    }
  }catch(e){
    /* Fallback: تحقق من localStorage */
    let found=false;
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i);
      if(key?.startsWith('azza_certs_')){
        const certs=JSON.parse(localStorage.getItem(key)||'[]');
        const cert=certs.find(c=>c.cert_id===certId);
        if(cert){
          found=true;
          const date=new Date(cert.issued_at).toLocaleDateString('ar',{year:'numeric',month:'long',day:'numeric'});
          document.getElementById('content').innerHTML=`
            <div class="status-icon">✅</div>
            <div class="status-title valid">شهادة موثّقة</div>
            <div class="status-sub">تم التحقق من صحة هذه الشهادة</div>
            <div class="cert-id-badge">${esc(cert.cert_id)}</div>
            <div class="cert-info">
              <div class="ci-row"><span class="ci-label">الاسم</span><span class="ci-val">${esc(cert.user_name)}</span></div>
              <div class="ci-row"><span class="ci-label">الكورس</span><span class="ci-val">${esc(cert.course_title)}</span></div>
              <div class="ci-row"><span class="ci-label">الحالة</span><span class="ci-val valid">✓ صالحة</span></div>
            </div>
            <button class="btn btn-p" onclick="location.href='academy.html'">🎓 الأكاديمية</button>`;
          break;
        }
      }
    }
    if(!found){
      document.getElementById('content').innerHTML=`
        <div class="status-icon">❌</div>
        <div class="status-title invalid">شهادة غير صالحة</div>
        <div class="status-sub">لم يتم العثور على هذه الشهادة في قاعدة البيانات. قد تكون منتهية الصلاحية أو غير صحيحة.</div>
        <div class="cert-id-badge" style="background:#dc2626">${esc(certId)}</div>
        <button class="btn btn-o" onclick="location.href='academy.html'">← الأكاديمية</button>`;
    }
  }
})();
</script>
</body>
</html>
