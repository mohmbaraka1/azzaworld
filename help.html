<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مركز المساعدة — AZZA</title>
<script src="supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
:root{--gold:#c69749;--olive:#1c5b38;--olive-d:#0e3622;--cream:#f7f1e3;--cream2:#ece0c8;--ink:#1c1a14;--muted:#6b6555;--line:rgba(28,26,20,.1);--card:#fff}
.dark{--cream:#1a1a12;--cream2:#222218;--ink:#f0e8d0;--muted:#9a9080;--line:rgba(255,255,255,.08);--card:#242418}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:var(--cream);color:var(--ink);direction:rtl;min-height:100vh}
.top-bar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:12px}
.top-back{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;text-decoration:none}
.top-back:hover{color:var(--olive)}
.top-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.hero{background:linear-gradient(135deg,var(--olive-d),var(--olive));padding:48px 20px 60px;text-align:center}
.hero h1{font-size:clamp(22px,4vw,34px);font-weight:900;color:#fff;margin-bottom:10px}
.hero p{font-size:15px;color:rgba(255,255,255,.75);margin-bottom:28px}
.hero-search{max-width:540px;margin:0 auto;position:relative}
.hero-inp{width:100%;height:52px;border-radius:99px;border:none;padding:0 54px 0 18px;font-family:Tajawal,sans-serif;font-size:15px;color:var(--ink);outline:none;box-shadow:0 6px 24px rgba(0,0,0,.15)}
.hero-ic{position:absolute;left:18px;top:50%;transform:translateY(-50%);pointer-events:none}
.hero-ic svg{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
.sdrop{position:absolute;top:56px;right:0;left:0;background:var(--card);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);max-height:300px;overflow-y:auto;display:none;z-index:10;text-align:right}
.sdrop.open{display:block}
.sd-item{padding:12px 16px;cursor:pointer;border-bottom:.5px solid var(--line)}
.sd-item:hover{background:var(--cream)}
.sd-title{font-size:14px;color:var(--ink)}
.sd-cat{font-size:11px;color:var(--muted)}
.sd-empty{padding:20px;text-align:center;color:var(--muted);font-size:14px}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);padding:0 20px;overflow-x:auto}
.tab{padding:14px 16px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.2s}
.tab.active{color:var(--olive);border-color:var(--olive)}
.main{max-width:900px;margin:32px auto;padding:0 20px}
.sec-title{font-size:18px;font-weight:900;margin-bottom:16px}
.cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:40px}
.cat-card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.2s;text-align:center}
.cat-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.cat-icon{font-size:28px;margin-bottom:8px}
.cat-name{font-size:13px;font-weight:700}
.cat-count{font-size:11px;color:var(--muted);margin-top:3px}
.art-list{display:flex;flex-direction:column;gap:8px;margin-bottom:40px}
.art-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.15s}
.art-item:hover{border-color:var(--gold)}
.art-item-info{flex:1}
.art-item-title{font-size:14px;font-weight:700}
.art-item-meta{font-size:12px;color:var(--muted);margin-top:3px}
.faq-item{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:8px}
.faq-q{padding:16px 18px;display:flex;align-items:center;cursor:pointer;font-size:14px;font-weight:700;transition:.15s;user-select:none}
.faq-q:hover{background:var(--cream2)}
.faq-arr{font-size:14px;margin-right:auto;transition:.25s;flex-shrink:0}
.faq-item.open .faq-arr{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:.3s;font-size:14px;color:var(--muted);line-height:1.8}
.faq-item.open .faq-a{max-height:400px}
.faq-a-in{padding:0 18px 16px}
.pop-list{display:flex;flex-direction:column;gap:6px;margin-bottom:40px}
.pop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:.15s}
.pop-item:hover{border-color:var(--gold)}
.pop-n{font-size:13px;font-weight:700;color:var(--muted);width:20px;flex-shrink:0}
.pop-t{flex:1;font-size:13px}
.pop-c{font-size:11px;color:var(--muted);background:var(--cream2);padding:2px 8px;border-radius:99px}
.art-body{font-size:15px;line-height:1.9;margin-bottom:24px}
.art-body h2{font-size:17px;font-weight:700;color:var(--olive);margin:24px 0 10px}
.art-body p{margin-bottom:12px}
.art-body ul,.art-body ol{margin:10px 0 14px 20px}
.art-body li{margin-bottom:8px}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb span{cursor:pointer}
.breadcrumb span:hover{color:var(--olive)}
.art-title{font-size:clamp(20px,3vw,28px);font-weight:900;margin-bottom:16px}
.art-tag{display:inline-block;padding:3px 10px;border-radius:99px;background:rgba(28,91,56,.1);color:var(--olive);font-size:12px;font-weight:700;margin-bottom:20px}
.art-nav{display:flex;gap:10px;margin-top:32px;padding-top:20px;border-top:1px solid var(--line)}
.art-nav-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;color:var(--ink);transition:.2s}
.art-nav-btn:hover{border-color:var(--olive);color:var(--olive)}
.feedback{margin-top:24px;padding:16px;background:var(--cream2);border-radius:12px;text-align:center}
.feedback p{font-size:14px;color:var(--muted);margin-bottom:10px}
.fb-btns{display:flex;justify-content:center;gap:10px}
.fb-btn{padding:8px 22px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;transition:.2s}
.fb-btn:hover{background:var(--olive);color:#fff;border-color:var(--olive)}
.skel{background:linear-gradient(90deg,var(--cream2) 25%,var(--cream3,#d9cbb0) 50%,var(--cream2) 75%);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:10px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:40px}
.contact-card{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:20px;text-align:center;text-decoration:none;color:var(--ink);display:block;transition:.2s}
.contact-card:hover{border-color:var(--gold)}
.contact-icon{font-size:32px;margin-bottom:10px}
.contact-name{font-size:14px;font-weight:700}
.contact-desc{font-size:12px;color:var(--muted);margin-top:4px}
@media(max-width:600px){.cats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="top-bar">
  <a href="app.html" class="top-back">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>رجوع
  </a>
  <span style="flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--olive)">✦ مركز المساعدة</span>
  <a href="agent.html" style="font-size:13px;color:var(--olive);text-decoration:none;font-weight:700">🤖 المساعد</a>
</div>

<div class="hero">
  <h1>كيف يمكننا مساعدتك؟</h1>
  <p>ابحث في قاعدة المعرفة أو تصفح الفئات</p>
  <div class="hero-search">
    <input class="hero-inp" id="srch" placeholder="ابحث عن أي موضوع..." oninput="doSearch(this.value)" autocomplete="off">
    <div class="hero-ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <div class="sdrop" id="sdrop"></div>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="home" onclick="switchTab('home')">🏠 الرئيسية</div>
  <div class="tab" data-tab="faq" onclick="switchTab('faq')">❓ FAQ</div>
</div>

<div class="main" id="mc">
  <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px">
    ${[1,2,3].map(()=>`<div class="skel" style="height:60px"></div>`).join('')}
  </div>
</div>

<script>
const SB_URL  = 'https://iecniydswotsilaueogq.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25peWRzd290c2lsYXVlb2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTg1OTcsImV4cCI6MjA5Nzc3NDU5N30.69LfEBHUwToTHue3EPS_KYq9BvDSZJ9jcW_P1yRKReA';
const db = supabase.createClient(SB_URL, SB_ANON);

let CATS=[], ARTS=[], FAQS=[];
let curTab='home', curArt=null, curCat=null;

/* ── تحميل البيانات ── */
async function loadData(){
  const [c,a,f] = await Promise.all([
    db.from('help_categories').select('*').order('sort_order'),
    db.from('help_articles').select('*').eq('is_published',true).order('id'),
    db.from('help_faqs').select('*').eq('is_published',true).order('sort_order'),
  ]);
  CATS = c.data||[];
  ARTS = a.data||[];
  FAQS = f.data||[];

  /* إضافة تابس للفئات */
  const tabs = document.getElementById('tabs');
  CATS.forEach(cat=>{
    const t=document.createElement('div');
    t.className='tab'; t.dataset.tab=cat.slug;
    t.textContent=`${cat.icon} ${cat.name_ar}`;
    t.onclick=()=>switchTab(cat.slug);
    tabs.appendChild(t);
  });

  render();
}

/* ── عرض ── */
function render(){
  const mc=document.getElementById('mc');
  if(curArt){ renderArt(mc); return; }
  if(curTab==='home'){ renderHome(mc); return; }
  if(curTab==='faq') { renderFAQ(mc);  return; }
  renderCat(mc, curTab);
}

function renderHome(el){
  const pop = ARTS.filter(a=>a.is_popular);
  el.innerHTML=`
    <div class="sec-title">📚 تصفح حسب الفئة</div>
    <div class="cats">
      ${CATS.map(c=>`<div class="cat-card" onclick="switchTab('${c.slug}')">
        <div class="cat-icon">${c.icon}</div>
        <div class="cat-name">${c.name_ar}</div>
        <div class="cat-count">${ARTS.filter(a=>a.category_slug===c.slug).length} مقال</div>
      </div>`).join('')}
    </div>
    <div class="sec-title">🔥 الأكثر طلباً</div>
    <div class="pop-list">
      ${pop.map((a,i)=>{
        const cat=CATS.find(c=>c.slug===a.category_slug);
        return`<div class="pop-item" onclick="showArt(${a.id})">
          <span class="pop-n">${i+1}</span>
          <span class="pop-t">${a.title}</span>
          <span class="pop-c">${cat?.icon||''} ${cat?.name_ar||''}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="sec-title">❓ أسئلة شائعة</div>
    <div style="margin-bottom:40px">
      ${FAQS.slice(0,4).map(f=>`
        <div class="faq-item">
          <div class="faq-q" onclick="this.closest('.faq-item').classList.toggle('open')">
            ${f.question}<span class="faq-arr">▾</span>
          </div>
          <div class="faq-a"><div class="faq-a-in">${f.answer}</div></div>
        </div>`).join('')}
      <div style="text-align:center;margin-top:12px">
        <button onclick="switchTab('faq')" style="padding:10px 24px;border-radius:99px;border:1.5px solid var(--olive);background:none;color:var(--olive);font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer">كل الأسئلة ←</button>
      </div>
    </div>
    <div class="sec-title">📞 تواصل معنا</div>
    <div class="contact-grid">
      <a class="contact-card" href="mailto:support@azzaworld.com">
        <div class="contact-icon">📧</div>
        <div class="contact-name">البريد الإلكتروني</div>
        <div class="contact-desc">support@azzaworld.com</div>
      </a>
      <a class="contact-card" href="agent.html">
        <div class="contact-icon">🤖</div>
        <div class="contact-name">المساعد الذكي</div>
        <div class="contact-desc">إجابات فورية</div>
      </a>
    </div>`;
}

function renderCat(el, slug){
  const cat  = CATS.find(c=>c.slug===slug);
  const arts = ARTS.filter(a=>a.category_slug===slug);
  el.innerHTML=`
    <div class="sec-title">${cat?.icon} ${cat?.name_ar}</div>
    <div class="art-list">
      ${arts.map(a=>`<div class="art-item" onclick="showArt(${a.id})">
        <div class="art-item-info">
          <div class="art-item-title">${a.title}</div>
          <div class="art-item-meta">⏱ ${a.reading_time||'دقيقة'}</div>
        </div>
        <span style="color:var(--muted)">‹</span>
      </div>`).join('')}
    </div>`;
}

function renderFAQ(el){
  el.innerHTML=`
    <div class="sec-title">❓ الأسئلة الشائعة</div>
    ${FAQS.map(f=>`
      <div class="faq-item">
        <div class="faq-q" onclick="this.closest('.faq-item').classList.toggle('open')">
          ${f.question}<span class="faq-arr">▾</span>
        </div>
        <div class="faq-a"><div class="faq-a-in">${f.answer}</div></div>
      </div>`).join('')}`;
}

function renderArt(el){
  const art = ARTS.find(a=>a.id===curArt);
  if(!art) return;
  const cat    = CATS.find(c=>c.slug===art.category_slug);
  const catArts= ARTS.filter(a=>a.category_slug===art.category_slug);
  const idx    = catArts.indexOf(art);
  const prev   = catArts[idx-1];
  const next   = catArts[idx+1];

  /* تحويل markdown بسيط */
  const html = art.body
    .replace(/## (.+)/g,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/^(\d+)\. (.+)/gm,'<li>$2</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/💡 (.+)/g,'<div style="background:rgba(28,91,56,.06);border-right:4px solid var(--olive);padding:12px 16px;border-radius:8px;margin:14px 0;font-size:14px">💡 $1</div>')
    .replace(/⚠️ (.+)/g,'<div style="background:rgba(198,151,73,.08);border-right:4px solid var(--gold);padding:12px 16px;border-radius:8px;margin:14px 0;font-size:14px">⚠️ $1</div>')
    .split('\n').filter(l=>l.trim()&&!l.startsWith('<')?`<p>${l}</p>`:l).join('\n');

  el.innerHTML=`
    <div class="breadcrumb">
      <span onclick="curArt=null;switchTab('home')">الرئيسية</span>
      <span>›</span>
      <span onclick="curArt=null;switchTab('${art.category_slug}')">${cat?.name_ar||''}</span>
      <span>›</span>
      <span style="color:var(--ink)">${art.title}</span>
    </div>
    <span class="art-tag">${cat?.icon} ${cat?.name_ar}</span>
    <h1 class="art-title">${art.title}</h1>
    <div class="art-body">${html}</div>
    <div class="art-nav">
      ${prev?`<button class="art-nav-btn" onclick="showArt(${prev.id})">← ${prev.title}</button>`:'<div></div>'}
      ${next?`<button class="art-nav-btn" onclick="showArt(${next.id})">${next.title} →</button>`:'<div></div>'}
    </div>
    <div class="feedback">
      <p>هل كان هذا المقال مفيداً؟</p>
      <div class="fb-btns">
        <button class="fb-btn" onclick="sendFb(${art.id},'yes',this)">👍 نعم</button>
        <button class="fb-btn" onclick="sendFb(${art.id},'no',this)">👎 لا</button>
      </div>
    </div>`;

  /* زيادة عداد المشاهدات */
  db.from('help_articles').update({views:(art.views||0)+1}).eq('id',art.id).then(()=>{});
  window.scrollTo(0,0);
}

/* ── Actions ── */
function switchTab(tab){
  curTab=tab; curArt=null; curCat=null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  render();
  window.scrollTo(0,0);
}

function showArt(id){
  curArt=id;
  render();
}

async function sendFb(id, type, btn){
  const col = type==='yes'?'helpful_yes':'helpful_no';
  const art = ARTS.find(a=>a.id===id);
  if(art) await db.from('help_articles').update({[col]:(art[col]||0)+1}).eq('id',id);
  btn.closest('.fb-btns').innerHTML =
    type==='yes'
      ? '<p style="color:var(--olive);font-weight:700">✅ شكراً!</p>'
      : '<p style="color:var(--muted)">شكراً — سنحسّن هذا المقال.</p>';
}

/* ── بحث ── */
let searchTimer=null;
function doSearch(q){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>_doSearch(q), 250);
}

async function _doSearch(q){
  const drop=document.getElementById('sdrop');
  q=q.trim();
  if(!q){ drop.classList.remove('open'); return; }

  /* بحث محلي أولاً */
  const local = ARTS.filter(a=>
    a.title.includes(q)||
    (a.keywords||[]).some(k=>k.includes(q))||
    (a.alt_questions||[]).some(k=>k.includes(q))||
    (a.summary||'').includes(q)
  ).slice(0,5);

  const faqRes = FAQS.filter(f=>f.question.includes(q)||f.answer.includes(q)).slice(0,3);

  if(!local.length && !faqRes.length){
    drop.innerHTML='<div class="sd-empty">لا نتائج — جرّب كلمة أخرى</div>';
    /* تسجيل البحث الفاشل */
    db.from('help_failed_searches').insert({query:q}).then(()=>{});
  }else{
    drop.innerHTML=[
      ...local.map(a=>`<div class="sd-item" onclick="showArt(${a.id});drop.classList.remove('open');document.getElementById('srch').value=''">
        <div class="sd-title">📄 ${a.title}</div>
        <div class="sd-cat">${CATS.find(c=>c.slug===a.category_slug)?.name_ar||''}</div>
      </div>`),
      ...faqRes.map(f=>`<div class="sd-item" onclick="switchTab('faq');document.getElementById('sdrop').classList.remove('open')">
        <div class="sd-title">❓ ${f.question}</div>
        <div class="sd-cat">FAQ</div>
      </div>`),
    ].join('');
  }
  drop.classList.add('open');
}

document.addEventListener('click',e=>{
  if(!document.getElementById('sdrop').contains(e.target)&&e.target!==document.getElementById('srch'))
    document.getElementById('sdrop').classList.remove('open');
});

/* ── Themes ── */
(()=>document.body.classList.toggle('dark',localStorage.getItem('azza_theme')==='dark'))();

/* ── Init ── */
loadData();
</script>
</body>
</html>
