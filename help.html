<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عزّة</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
/* ══════════════════════════════════════
   AZZA — Design System
   (الألوان والأبعاد موحّدة الآن بملف tokens.css)
══════════════════════════════════════ */
body{transition:background-color .25s,color .25s}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;color:var(--ink);background:var(--cream)}

/* ══ LAYOUT ══
   Fixed header + fixed sidebars + only feed scrolls
   (مثل Twitter / Discord)
══ */
html,body{ height:100%; overflow:hidden }

/* هيدر ثابت */
.header{
  position:fixed; top:0; right:0; left:0; z-index:200;
  height:var(--hh);
  background:rgba(247,241,227,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 16px; gap:12px;
}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none}
.brand-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--olive),var(--olive-2));display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Aref Ruqaa',serif;font-size:20px}
.brand-name{font-family:'Aref Ruqaa',serif;font-size:22px;color:var(--olive-2)}
.header-search{flex:1;max-width:300px;min-width:0;position:relative}
.header-search input{width:100%;border:1.5px solid var(--border);border-radius:999px;padding:8px 14px 8px 36px;background:var(--cream-2);font-family:inherit;font-size:13px;outline:none;transition:.2s;color:var(--ink)}
.header-search input:focus{border-color:var(--olive);background:var(--card)}
.header-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* نتائج البحث الفورية */
.search-dropdown{position:absolute;top:calc(100% + 8px);right:0;left:0;background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);box-shadow:0 10px 40px rgba(28,26,20,.15);z-index:300;max-height:420px;overflow-y:auto;opacity:0;transform:translateY(-6px);pointer-events:none;transition:.16s}
.search-dropdown.show{opacity:1;transform:none;pointer-events:auto}
.sr-group-lbl{padding:9px 14px 5px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:.13s}
.sr-item:hover{background:var(--cream-2)}
.sr-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;overflow:hidden;flex-shrink:0}
.sr-post-ic{width:32px;height:32px;border-radius:10px;background:rgba(28,91,56,.08);color:var(--olive);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.sr-main{flex:1;min-width:0}
.sr-title{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px}
.sr-seeall{display:block;text-align:center;padding:10px;font-size:12.5px;font-weight:700;color:var(--olive);border-top:1px solid var(--border);cursor:pointer;transition:.15s}
.sr-seeall:hover{background:var(--cream-2)}
.header-right{margin-right:auto;display:flex;align-items:center;gap:8px}
.hbtn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;position:relative}
.hbtn:hover{border-color:var(--olive);color:var(--olive)}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0}
.theme-btn:hover{border-color:var(--olive);color:var(--olive)}
.theme-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.notif-dot{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid var(--cream)}
.avatar-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.2s}
.avatar-btn:hover{border-color:var(--olive)}

/* قائمة dropdown */
.drop-menu{position:fixed;top:calc(var(--hh) + 8px);left:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--rxl);padding:6px;min-width:220px;box-shadow:0 10px 40px rgba(28,26,20,.15);z-index:300;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:.18s}
.drop-menu.show{opacity:1;transform:none;pointer-events:auto}
.drop-user{display:flex;align-items:center;gap:10px;padding:10px 12px 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
.drop-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-weight:900;overflow:hidden;flex-shrink:0}
.drop-name{font-size:14px;font-weight:700}
.drop-handle{font-size:12px;color:var(--olive);font-weight:600}
.drop-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s;border:none;background:transparent;width:100%;text-align:right;font-family:inherit}
.drop-item:hover{background:var(--cream)}
.drop-item svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;color:var(--muted)}
.drop-item.danger{color:var(--red)}.drop-item.danger svg{color:var(--red)}.drop-item.danger:hover{background:rgba(206,17,38,.06)}
.drop-sep{height:1px;background:var(--border);margin:4px 0}

/* ══ Notification Dropdown ══ */
.notif-panel{
  position:fixed;top:calc(var(--hh) + 8px);
  width:380px;max-width:calc(100vw - 24px);
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--rxl);
  box-shadow:0 12px 48px rgba(28,26,20,.18);
  z-index:350;
  opacity:0;transform:translateY(-8px) scale(.97);
  pointer-events:none;transition:.2s;
  display:flex;flex-direction:column;
  max-height:min(560px,80vh);
  overflow:hidden;
}
.notif-panel.open{opacity:1;transform:none;pointer-events:auto}
.np-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.np-title{font-family:'Aref Ruqaa',serif;font-size:1.1rem;color:var(--ink);display:flex;align-items:center;gap:7px}
.np-ubadge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:2px 7px}
.np-actions{display:flex;align-items:center;gap:6px}
.np-btn{padding:5px 10px;border-radius:999px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap}
.np-btn:hover{border-color:var(--olive);color:var(--olive)}
.np-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--cream-2) transparent}
.np-list::-webkit-scrollbar{width:3px}
.np-list::-webkit-scrollbar-thumb{background:var(--cream-2);border-radius:999px}
.np-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:.5px solid rgba(28,26,20,.06);cursor:pointer;transition:.13s;position:relative}
.np-item:last-child{border-bottom:none}
.np-item:hover{background:var(--cream)}
.np-item.unread{background:rgba(28,91,56,.035)}
.np-item.unread:hover{background:rgba(28,91,56,.065)}
.np-udot{width:7px;height:7px;border-radius:50%;background:var(--olive);flex-shrink:0;margin-top:6px}
.np-av-wrap{position:relative;flex-shrink:0}
.np-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-2));display:flex;align-items:center;justify-content:center;color:var(--gold-2);font-weight:900;font-size:.9rem;overflow:hidden}
.np-av img{width:100%;height:100%;object-fit:cover}
.np-badge{position:absolute;bottom:-2px;left:-2px;width:17px;height:17px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:9.5px;border:2px solid var(--card)}
.np-body{flex:1;min-width:0}
.np-text{font-size:13px;color:var(--ink);line-height:1.45;margin-bottom:5px}
.np-text strong{font-weight:700}
.np-text em{font-style:normal;color:var(--muted)}
.np-post{display:flex;align-items:center;gap:6px;background:var(--cream);border-radius:8px;padding:5px 9px;margin-bottom:4px}
.np-post-bar{width:3px;height:18px;border-radius:999px;flex-shrink:0}
.np-post-txt{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.np-time{font-size:11px;color:var(--muted)}
.np-footer{padding:10px 14px;border-top:1px solid var(--border);text-align:center;flex-shrink:0}
.np-see-all{font-size:13px;font-weight:700;color:var(--olive);cursor:pointer;background:none;border:none;font-family:inherit;padding:4px;width:100%}
.np-see-all:hover{opacity:.75}
.np-empty{padding:40px 20px;text-align:center;color:var(--muted)}
.np-empty-icon{font-size:2.5rem;margin-bottom:12px}
.np-empty b{display:block;font-size:14px;color:var(--ink);margin-bottom:4px}

/* صوت */
.sound-wrap{position:relative}
.sound-toggle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;padding:0}
.sound-toggle:hover,.sound-toggle.on{border-color:var(--olive);color:var(--olive)}
.sound-toggle.on{background:rgba(28,91,56,.07)}
.sound-drop{position:absolute;top:calc(100%+6px);left:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;min-width:170px;box-shadow:0 8px 28px rgba(28,26,20,.14);z-index:500;display:none}
.sound-drop.open{display:block}
.sound-opt{display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;border:none;background:transparent;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;border-radius:8px;transition:.12s;text-align:right}
.sound-opt:hover{background:var(--cream)}
.sound-opt.on{color:var(--olive);background:rgba(28,91,56,.07)}
.sound-play{margin-right:auto;font-size:10px;color:var(--olive);font-weight:700;background:none;border:none;cursor:pointer;padding:0;font-family:inherit}

/* ══ 3 أعمدة ══ */
.app{
  display:grid;
  grid-template-columns:240px minmax(0,1fr) 260px;
  height:calc(100vh - var(--hh));
  margin-top:var(--hh);
  overflow:hidden; /* المهم */
}

/* شريط التنقل السفلي وقائمة الأفاتار المنبثقة — مخفيان افتراضياً، تظهران فقط بالموبايل (داخل @media لاحقاً) */
.bottom-nav{display:none}
.sheet-overlay{display:none}

/* العمود الأيسر — التنقل */
.sidebar{
  border-left:none;
  background:transparent;
  overflow-y:auto;
  scrollbar-width:none;
  padding:14px 10px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.sidebar::-webkit-scrollbar{display:none}
.sb-label{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.5px;padding:8px 12px 4px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r2);font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;border:none;background:transparent;width:100%;text-align:right;font-family:inherit}
.sb-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sb-item:hover{background:rgba(28,26,20,.06);color:var(--ink)}
.sb-item.active{background:rgba(28,91,56,.09);color:var(--olive)}
.sb-compose{display:none}

/* ══ الفيد — الوحيد اللي يـ scroll ══ */
.feed-col{
  overflow-y:auto;
  overflow-x:hidden;
  min-width:0;
  scrollbar-width:thin;
  scrollbar-color:var(--cream-2) transparent;
  padding:16px 20px;
  background:var(--cream);
}
.feed-col::-webkit-scrollbar{width:4px}
.feed-col::-webkit-scrollbar-thumb{background:var(--cream-2);border-radius:999px}
.feed-inner{max-width:620px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

/* العمود الأيمن */
.right-col{
  border-right:none;
  background:transparent;
  overflow-y:auto;
  scrollbar-width:none;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.right-col::-webkit-scrollbar{display:none}

/* ══ بوكس نشر سريع (LinkedIn style) ══ */
.compose-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--rxl);
  padding:13px 14px;
  display:flex;align-items:center;gap:11px;
}
.compose-av{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--olive),var(--olive-2));
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-2);font-weight:900;font-size:.95rem;
  overflow:hidden;flex-shrink:0;cursor:pointer;
}
.compose-prompt{
  flex:1;min-width:0;padding:10px 16px;
  border-radius:999px;border:1.5px solid var(--border);
  background:var(--cream);font-family:inherit;
  font-size:14px;color:var(--muted);
  cursor:pointer;text-align:right;
  transition:.2s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.compose-prompt:hover{border-color:var(--olive);background:rgba(28,91,56,.04);color:var(--ink)}
.compose-actions{display:flex;gap:3px;flex-shrink:0}
.compose-qbtn{
  display:flex;align-items:center;gap:5px;
  padding:7px 10px;border-radius:10px;
  border:none;background:transparent;
  color:var(--muted);font-family:inherit;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:.15s;white-space:nowrap;
}
.compose-qbtn:hover{background:var(--cream);color:var(--ink)}

/* ══ فلاتر ══ */
.filters{
  display:flex;gap:4px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:5px;
  overflow-x:auto;
  scrollbar-width:none;
  min-width:0;
}
.filters::-webkit-scrollbar{display:none}
.f-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:10px;
  border:none;background:transparent;
  color:var(--muted);font-family:inherit;
  font-size:13px;font-weight:600;
  cursor:pointer;transition:.15s;white-space:nowrap;flex-shrink:0;
}
.f-btn:hover{background:var(--cream);color:var(--ink)}
.f-btn.on{background:var(--olive);color:#fff}
.cat-btn{
  padding:6px 14px;border-radius:999px;
  border:1.5px solid var(--border);background:var(--card);
  font-family:inherit;font-size:12.5px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:.15s;
}
.cat-btn:hover{border-color:var(--olive);color:var(--olive)}
.cat-btn.on{border-color:var(--olive);background:rgba(28,91,56,.08);color:var(--olive)}

/* ══ بانر ══ */
.banner{background:linear-gradient(135deg,var(--olive-2),var(--olive));border-radius:var(--rxl);padding:18px 20px;position:relative;overflow:hidden}
.banner::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(198,151,73,.07) 0,rgba(198,151,73,.07) 1px,transparent 0,transparent 50%);background-size:22px 22px}
.banner-inner{position:relative;z-index:1}
.banner-hi{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px}
.banner-tip{font-size:13px;color:rgba(247,241,227,.68)}

/* ══ بطاقات المنشورات — نمط LinkedIn ══ */
.post{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--rxl);
  overflow:hidden;
  transition:box-shadow .2s, transform .15s;
}
.post:hover{box-shadow:0 6px 24px rgba(28,26,20,.1)}

/* شريط لوني رفيع في الأعلى */
.post-stripe{height:3px;flex-shrink:0}

/* ══ رأس البطاقة الموحّد ══ */
.post-head{
  display:flex;
  align-items:flex-start;
  gap:11px;
  padding:14px 16px 10px;
}
.p-av{
  width:44px;height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--olive),var(--olive-2));
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-2);font-weight:900;flex-shrink:0;
  overflow:hidden;font-size:1rem;cursor:pointer;
  border:2px solid rgba(28,91,56,.15);
  transition:.15s;
}
.p-av:hover{border-color:var(--olive)}
.p-author-info{flex:1;min-width:0}
.p-name{font-size:14px;font-weight:700;cursor:pointer;line-height:1.3;margin-bottom:2px}
.p-name:hover{color:var(--olive)}
.p-name-handle{font-size:11.5px;color:var(--olive);font-weight:500}
.p-meta-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:1px}
.p-time{font-size:11px;color:var(--muted)}
.p-head-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.p-badge{display:inline-flex;align-items:center;border-radius:999px;padding:2px 9px;font-size:10.5px;font-weight:700;line-height:1.6}

/* نوع البادج */
.badge-idea{background:rgba(28,91,56,.08);color:#0e3622;border:1px solid rgba(28,91,56,.18)}
.badge-proj{background:rgba(198,151,73,.1);color:#8a6415;border:1px solid rgba(198,151,73,.28)}
.badge-job{background:rgba(24,95,165,.08);color:#0c447c;border:1px solid rgba(24,95,165,.2)}
.badge-nda{background:rgba(14,54,34,.1);color:#0e3622;border:1px solid rgba(14,54,34,.25)}
.badge-new{background:rgba(15,110,86,.1);color:#085041;border:1px solid rgba(15,110,86,.22)}
.badge-hot{background:rgba(206,17,38,.07);color:#9b1220;border:1px solid rgba(206,17,38,.18)}
.badge-cat{background:rgba(28,26,20,.05);color:var(--muted);border:1px solid var(--border)}

/* ══ محتوى البطاقة ══ */
.p-content{padding:0 16px 12px}
.p-title{
  font-family:'Aref Ruqaa',serif;
  font-size:1.15rem;font-weight:700;
  color:var(--ink);margin-bottom:6px;
  line-height:1.45;cursor:pointer;
}
.p-title:hover{color:var(--olive)}
.p-body{font-size:14px;line-height:1.85;color:var(--ink);white-space:pre-wrap;word-break:break-word;margin-bottom:2px}
.p-media{width:100%;display:block;max-height:380px;object-fit:cover;margin-bottom:0}
.p-badges-row{display:flex;gap:5px;flex-wrap:wrap;padding:0 16px 10px}

/* ══ بطاقة الفكرة — مع vote pill ══ */
.idea-vote-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 14px 7px 12px;
  border:1.5px solid var(--border);
  border-radius:999px;
  background:var(--cream);
  cursor:pointer;
  transition:.18s;
  font-family:inherit;
  margin-bottom:10px;
}
.idea-vote-pill:hover{border-color:var(--olive);background:rgba(28,91,56,.05)}
.idea-vote-pill.voted{background:var(--olive);border-color:var(--olive);color:#fff}
.vote-arr{font-size:14px;line-height:1}
.vote-n{font-family:'Aref Ruqaa',serif;font-size:1.1rem;font-weight:700;line-height:1}
.vote-lbl{font-size:12px;font-weight:600}

/* ══ بطاقة مشروع — شريط التمويل ══ */
.fund-box{
  background:linear-gradient(135deg,rgba(28,91,56,.04),rgba(198,151,73,.04));
  border:1px solid rgba(28,91,56,.12);
  border-radius:14px;
  padding:13px 15px;
  margin-bottom:12px;
}
.fund-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.fund-amt{font-family:'Aref Ruqaa',serif;font-size:1.3rem;font-weight:700;color:var(--olive)}
.fund-goal{font-size:12px;color:var(--muted)}
.fund-bar{height:7px;background:rgba(28,26,20,.08);border-radius:999px;overflow:hidden;margin-bottom:9px}
.fund-fill{height:100%;background:linear-gradient(90deg,var(--olive),var(--gold));border-radius:999px;transition:.4s}
.fund-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.fund-meta strong{color:var(--ink)}
.fund-stage-tag{padding:2px 9px;border-radius:999px;background:rgba(198,151,73,.12);color:#8a6415;font-size:11px;font-weight:700;border:1px solid rgba(198,151,73,.25)}

.job-box{
  background:linear-gradient(135deg,rgba(24,95,165,.05),rgba(24,95,165,.02));
  border:1px solid rgba(24,95,165,.15);
  border-radius:14px;
  padding:13px 15px;
  margin-bottom:12px;
}
.job-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);margin-bottom:6px}
.job-row:last-child{margin-bottom:0}
.job-row svg{width:15px;height:15px;stroke:#185fa5;flex-shrink:0}
.job-salary{font-weight:700;color:#0c447c}

/* ══ أكشن بار LinkedIn-style ══ */
.p-actions{
  display:flex;align-items:center;
  padding:4px 8px 4px;
  border-top:1px solid var(--border);
  gap:2px;
}
.p-act{
  display:flex;align-items:center;gap:6px;
  padding:8px 11px;
  border-radius:10px;border:none;
  background:transparent;color:var(--muted);
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;transition:.15s;white-space:nowrap;
}
.p-act:hover{background:var(--cream);color:var(--ink)}
.p-act.voted{color:var(--olive);background:rgba(28,91,56,.08)}
.p-act.saved{color:var(--gold)}
.p-act.react-on{color:#185FA5;background:rgba(24,95,165,.07)}
.p-act svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.interest-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:999px;
  background:var(--olive);color:#fff;
  border:none;font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;margin-right:auto;
}
.interest-btn:hover{background:var(--olive-2)}
.interest-btn.done{
  background:transparent;color:var(--olive);
  border:1.5px solid var(--olive);
}

/* إحصائيات */
.p-stats{display:flex;align-items:center;gap:12px;padding:5px 16px 9px;font-size:11.5px;color:var(--muted)}
.p-detail{color:var(--olive);font-weight:700;cursor:pointer;font-size:12px;margin-right:auto;text-decoration:none;opacity:.85}
.p-detail:hover{opacity:1;text-decoration:underline}

/* تعليقات */
.cmts-wrap{border-top:1px solid var(--border);background:rgba(247,241,227,.5);display:none}
.cmts-wrap.open{display:block}
.cmts-list{padding:10px 14px 4px;display:flex;flex-direction:column;gap:8px}
.cmt{display:flex;gap:9px}
.cmt-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.cmt-bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:8px 12px;flex:1}
.cmt-name{font-size:12px;font-weight:700;color:var(--olive);margin-bottom:2px}
.cmt-text{font-size:13.5px;color:var(--ink);line-height:1.6}
.cmt-time{font-size:11px;color:var(--muted);margin-top:3px}
.cmt-input-row{display:flex;gap:9px;padding:8px 14px 12px;align-items:flex-end}
.my-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden}
.cmt-field{flex:1;position:relative}
.cmt-ta{width:100%;border:1.5px solid var(--border);border-radius:20px;padding:9px 42px 9px 14px;background:var(--card);font-family:inherit;font-size:14px;outline:none;resize:none;line-height:1.5;max-height:90px;display:block;transition:.2s}
.cmt-ta:focus{border-color:var(--olive)}
.cmt-send{position:absolute;left:8px;bottom:7px;width:28px;height:28px;border-radius:50%;background:var(--olive);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.45;transition:.18s}
.cmt-send:hover,.cmt-send.on{opacity:1}
.cmt-send svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ══ اليمين ══ */
.rc-card{background:var(--cream);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.rc-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rc-title svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center}
.st-box strong{display:block;font-family:'Aref Ruqaa',serif;font-size:1.4rem;color:var(--ink)}
.st-box span{font-size:11px;color:var(--muted)}
.trend-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px;cursor:pointer;transition:.15s}
.trend-item:last-child{border-bottom:none}.trend-item:hover{color:var(--olive)}
.trend-rank{font-size:11px;color:var(--muted)}
.sug-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:.5px solid var(--border)}
.sug-item:last-child{border-bottom:none}
.sug-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;overflow:hidden;flex-shrink:0;cursor:pointer}
.sug-name{font-size:13px;font-weight:700;cursor:pointer;flex:1}.sug-name:hover{color:var(--olive)}
.sug-role{font-size:11px;color:var(--muted)}
.follow-b{padding:5px 12px;border-radius:999px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:.18s;color:var(--ink);flex-shrink:0}
.follow-b:hover{border-color:var(--olive);color:var(--olive)}
.follow-b.on{background:rgba(28,91,56,.09);border-color:var(--olive);color:var(--olive)}

/* ══ مودال النشر ══ */
.overlay{position:fixed;inset:0;background:rgba(14,54,34,.4);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:400;padding:20px}
.overlay.open{display:flex}
.modal{width:100%;max-width:540px;background:var(--card);border-radius:var(--rxl);overflow:hidden;animation:pop .2s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700}
.modal-x{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:8px;transition:.15s;display:flex}
.modal-x:hover{background:var(--cream)}
.modal-body{padding:16px}
.type-row{display:flex;gap:6px;margin-bottom:14px}
.type-btn{padding:8px 15px;border-radius:999px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.18s;color:var(--muted)}
.type-btn:hover{border-color:var(--olive);color:var(--olive)}
.type-btn.on{background:var(--olive);color:#fff;border-color:var(--olive)}
.mfield input,.mfield textarea,.mfield select{width:100%;border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 13px;font-family:inherit;font-size:14px;background:var(--cream);outline:none;transition:.2s;color:var(--ink);margin-bottom:10px}
.mfield input:focus,.mfield textarea:focus{border-color:var(--olive);background:var(--card)}
.mfield textarea{min-height:90px;resize:none}
/* وسائط */
.media-preview{display:none;margin-bottom:10px;border-radius:14px;overflow:hidden;position:relative;background:var(--cream-2);border:1px solid var(--border)}
.media-preview img,.media-preview video{width:100%;max-height:260px;object-fit:cover;display:block}
.media-rm{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.media-btns{display:flex;gap:8px;margin-bottom:10px}
.media-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:.18s;font-family:inherit}
.media-btn:hover{border-color:var(--olive);color:var(--olive)}
.media-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.modal-foot{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:12px 16px;border-top:1px solid var(--border)}
.pub-btn{padding:10px 24px;border-radius:999px;background:var(--olive);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
.pub-btn:hover{background:var(--olive-2)}
.cancel-btn{padding:9px 18px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}

/* NDA مودال */
.nda-list{background:var(--cream);border-radius:12px;padding:12px 14px;margin-bottom:12px;list-style:none}
.nda-list li{font-size:13px;line-height:1.8;padding-right:12px;position:relative}.nda-list li::before{content:'•';position:absolute;right:0;color:var(--olive)}
.nda-agree-row{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:700;cursor:pointer;margin-bottom:12px}
.nda-agree-row input{width:17px;height:17px;accent-color:var(--olive)}
.nda-sign-btn{width:100%;padding:12px;background:var(--olive);color:#fff;border:none;border-radius:999px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.nda-sign-btn:disabled{opacity:.4;cursor:not-allowed}

/* FAB — دايماً ظاهر مع قائمة speed-dial */
.fab-wrap{position:fixed;bottom:32px;left:32px;z-index:300;display:flex;flex-direction:column;align-items:center;gap:10px}
.fab{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-2));color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(28,91,56,.45);transition:.2s;flex-shrink:0}
.fab:hover{transform:scale(1.07);box-shadow:0 8px 32px rgba(28,91,56,.55)}
.fab svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;transition:.25s}
.fab.open svg{transform:rotate(45deg)}
.fab-menu{display:flex;flex-direction:column;gap:8px;align-items:center;opacity:0;pointer-events:none;transform:translateY(8px);transition:.2s}
.fab-menu.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.fab-item{display:flex;align-items:center;gap:9px;padding:9px 16px 9px 14px;border-radius:999px;background:var(--card);border:1px solid var(--border);box-shadow:0 3px 14px rgba(28,26,20,.12);cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;transition:.15s}
.fab-item:hover{background:var(--cream);border-color:var(--olive);color:var(--olive)}
.fab-item span{font-size:16px}

/* ── زر الإيجنت العائم ── */
.agent-fab-wrap{position:fixed;bottom:32px;right:32px;z-index:300;cursor:grab;touch-action:none}
.agent-fab-wrap:active{cursor:grabbing}
.agent-fab{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--olive-2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(198,151,73,.5);transition:.2s;position:relative}
.agent-fab:hover{transform:scale(1.07);box-shadow:0 8px 32px rgba(198,151,73,.6)}
.agent-fab svg{width:25px;height:25px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.agent-fab-badge{position:absolute;top:-3px;left:-3px;width:16px;height:16px;background:var(--olive);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;border:2px solid var(--cream)}

/* نافذة الإيجنت المصغّرة */
.agent-popup{position:fixed;bottom:100px;right:32px;width:370px;max-height:560px;background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 16px 50px rgba(28,26,20,.22);z-index:301;display:flex;flex-direction:column;opacity:0;transform:translateY(14px) scale(.97);pointer-events:none;transition:.2s;overflow:hidden}
.agent-popup.open{opacity:1;transform:none;pointer-events:auto}
.agent-pop-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(28,91,56,.06),transparent)}
.agent-pop-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--olive),var(--olive-2));display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.agent-pop-icon svg{width:17px;height:17px}
.agent-pop-title{font-size:14px;font-weight:700;color:var(--ink);flex:1}
.agent-pop-mode{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;flex-shrink:0}
.agent-pop-mode.demo{background:var(--cream-2);color:var(--muted)}
.agent-pop-mode.real{background:rgba(198,151,73,.15);color:#9b7420}
.agent-pop-x{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:8px;flex-shrink:0}
.agent-pop-x:hover{background:var(--cream)}
.agent-pop-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:160px}
.agent-pop-welcome{text-align:center;padding:12px 6px;color:var(--muted);font-size:12.5px;line-height:1.7}
.agent-pop-caps{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.agent-pop-cap{display:flex;align-items:center;gap:8px;background:var(--cream);border:1px solid var(--border);border-radius:11px;padding:9px 12px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink);text-align:right;transition:.15s}
.agent-pop-cap:hover{border-color:var(--olive);background:rgba(28,91,56,.05)}
.agent-pop-msg{display:flex;gap:8px;max-width:100%}
.agent-pop-msg.user{flex-direction:row-reverse}
.agent-pop-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10.5px;overflow:hidden}
.agent-pop-av.agent{background:linear-gradient(135deg,var(--olive),var(--olive-2));color:var(--gold)}
.agent-pop-av.user{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--olive-2)}
.agent-pop-bubble{max-width:80%;padding:9px 12px;border-radius:13px;font-size:12.5px;line-height:1.6;white-space:pre-wrap}
.agent-pop-msg.agent .agent-pop-bubble{background:var(--cream);border:1px solid var(--border);border-top-right-radius:3px}
.agent-pop-msg.user .agent-pop-bubble{background:var(--olive);color:#fff;border-top-left-radius:3px}
.agent-pop-foot{border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:7px;align-items:flex-end}
.agent-pop-input{flex:1;border:1.5px solid var(--border);border-radius:14px;padding:8px 12px;font-family:inherit;font-size:12.5px;background:var(--cream);outline:none;resize:none;max-height:70px;transition:.2s}
.agent-pop-input:focus{border-color:var(--olive);background:var(--card)}
.agent-pop-send{width:32px;height:32px;border-radius:50%;background:var(--olive);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.2s}
.agent-pop-send:hover{background:var(--olive-2)}
.agent-pop-send:disabled{opacity:.4;cursor:not-allowed}
.agent-pop-typing{display:flex;gap:4px;padding:9px 12px}
.agent-pop-typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:apbounce 1.2s infinite}
.agent-pop-typing span:nth-child(2){animation-delay:.15s}
.agent-pop-typing span:nth-child(3){animation-delay:.3s}
@keyframes apbounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}
.agent-pop-expand{font-size:11px;color:var(--olive);text-decoration:none;font-weight:700;cursor:pointer}
@media (max-width:540px){
  .agent-popup{right:14px;left:14px;width:auto;bottom:96px;max-height:65vh}
}

/* لايت بوكس */
.lightbox{position:fixed;inset:0;background:rgba(14,54,34,.92);display:none;align-items:center;justify-content:center;z-index:500;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90%;max-height:90%;border-radius:12px;object-fit:contain}

/* فارغ */
.empty-feed{padding:48px 20px;text-align:center;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:var(--rxl)}
.empty-feed svg{width:36px;height:36px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 12px;display:block}
.empty-feed b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:11px;font-size:14px;font-weight:700;color:#fff;z-index:600;opacity:0;transition:.3s;pointer-events:none;max-width:90vw;text-align:center}

/* ══ Category dropdown ══ */
.cat-drop-wrap{position:relative;flex-shrink:0}
.cat-drop-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 13px;border-radius:12px;
  border:1.5px solid var(--border);
  background:var(--card);
  font-family:inherit;font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:.15s;
  white-space:nowrap;
}
.cat-drop-btn:hover{border-color:var(--olive);color:var(--olive)}
.cat-drop-btn.active{border-color:var(--olive);background:rgba(28,91,56,.07);color:var(--olive)}
.cat-drop-menu{
  position:absolute;top:calc(100% + 6px);left:0;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:5px;
  min-width:150px;
  box-shadow:0 8px 32px rgba(28,26,20,.13);
  z-index:250;
  opacity:0;transform:translateY(-6px) scale(.97);
  pointer-events:none;transition:.18s;
}
.cat-drop-menu.open{opacity:1;transform:none;pointer-events:auto}
.cat-drop-item{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:9px 12px;
  border:none;background:transparent;
  font-family:inherit;font-size:13px;font-weight:600;
  color:var(--ink);cursor:pointer;border-radius:10px;
  transition:.13s;text-align:right;
}
.cat-drop-item:hover{background:var(--cream)}
.cat-drop-item.on{background:rgba(28,91,56,.08);color:var(--olive)}


@media(max-width:1100px){
  .app{grid-template-columns:220px minmax(0,1fr)}
  .right-col{display:none}
}
@media(max-width:820px){
  html,body{overflow:auto}
  .app{grid-template-columns:1fr;height:auto;overflow:visible;padding-bottom:64px}
  .sidebar{display:none}
  .feed-col{height:auto;overflow-y:visible;overflow-x:hidden;padding:12px}
  .fab-wrap{display:none}

  /* ══ الهيدر — إخفاء نص أزرار الإشعارات/الرسائل، الاعتماد على الأيقونة فقط ══ */
  .header-right{gap:4px}
  .hbtn span:not(.notif-dot){display:none}
  .hbtn{padding:7px 9px}

  /* ══ شريط التنقل السفلي الثابت — نمط Instagram/TikTok ══ */
  .bottom-nav{
    display:flex;position:fixed;bottom:0;right:0;left:0;z-index:500;
    background:var(--card);border-top:1px solid var(--line);
    padding:6px 4px;padding-bottom:max(6px,env(safe-area-inset-bottom));
    box-shadow:0 -2px 12px rgba(28,26,20,.06)
  }
  .bn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--muted);padding:6px 2px;
    font-family:'Tajawal',sans-serif;font-size:10.5px;cursor:pointer;border-radius:10px
  }
  .bn-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
  .bn-item.active{color:var(--olive)}

  }

  /* قائمة منبثقة من الأسفل (bottom sheet) — تستخدم للأفاتار وأي قائمة منسدلة أخرى بالموبايل */
  .sheet-overlay{

  }

  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:99px;margin:6px auto 10px}
}

      azzaDB.from('posts').select('*').order('created_at',{ascending:false}),
      azzaDB.from('users').select('*'),
      azzaDB.from('post_comments').select('*').order('created_at',{ascending:true}),
      azzaDB.from('post_reactions').select('*'),
    ]);
    if(!usersRes.error)_usersMem=usersRes.data||[];
    if(postsRes.error)throw postsRes.error;

    /* فهرسة التعليقات */
    const cmtMap={};
    (cmtsRes.data||[]).forEach(c=>{
      if(!cmtMap[c.post_id])cmtMap[c.post_id]=[];

        id:String(c.id),author_id:c.author_id,
        author_name:c.author_name||'',author_username:c.author_username||'',
        text:c.content||'',created_at:c.created_at,

    /* فهرسة التفاعلات */
    const reactMap={votes:{},r_insightful:{},r_collab:{}};
    (reactsRes.data||[]).forEach(r=>{
      const k=r.reaction_type==='vote'?'votes':r.reaction_type==='insightful'?'r_insightful':'r_collab';
      if(!reactMap[k][r.post_id])reactMap[k][r.post_id]=[];
      reactMap[k][r.post_id].push(r.user_id);
    });

    /* دمج كل شيء — Supabase هو المصدر الوحيد */
    _postsMem=(postsRes.data||[]).map(row=>{
      const p=_mapPost(row);
      p.comments=cmtMap[p.id]||[];
      p.votes=reactMap.votes[p.id]||[];
      p.r_insightful=reactMap.r_insightful[p.id]||[];
      p.r_collab=reactMap.r_collab[p.id]||[];
      return p;

      try{_postsMem=JSON.parse(localStorage.getItem('azza_posts')||'[]');}
      catch{_postsMem=[];}

}

function calcTrustScore(u){
  if(!u)return 0;
  const posts=G.getPosts().filter(p=>p.author_id===u.id);
  let s={profile:0,nda:0,activity:0};
  if(u.photo)s.profile+=8;if((u.bio||'').length>10)s.profile+=8;
  if(u.phone||u.email)s.profile+=5;if(u.linkedin||u.twitter||u.website)s.profile+=5;
  if(u.institution)s.profile+=4;s.profile=Math.min(30,s.profile);
  const sigs=G.getSigs();let ndaT=0;
  posts.filter(p=>p.nda).forEach(p=>{ndaT+=(sigs[p.id]||[]).length;});
  s.nda=Math.min(35,Math.round(ndaT*3));
  const views=posts.reduce((a,p)=>a+(p.views||0),0);
  s.activity=Math.min(35,posts.length*4+Math.floor(views/25));
  return Math.min(100,s.profile+s.nda+s.activity);
}

function synth(freq,dur,type='sine'){
  try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.22,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);}catch(e){}
}

async function renderNotifPanel(){
  let notifs=[];
  try{
    const {data}=await azzaDB.from('notifications_with_actor')
      .select('*').eq('recipient_id',user.id)
      .order('created_at',{ascending:false}).limit(30);

  }catch{
    notifs=getMyNotifs().map(n=>({...n,actor_name:n.from_name,actor_photo:n.from_photo,is_read:n.read}));
  }

  const unread=notifs.filter(n=>!n.is_read&&!n.read).length;
  const dot=document.getElementById('notif-dot');
  if(dot){dot.textContent=unread||'';dot.style.display=unread?'flex':'none';}
  const ub=document.getElementById('np-ubadge');
  if(ub){ub.textContent=unread||'';ub.style.display=unread?'inline':'none';}

    el.innerHTML=`<div class="np-empty"><div class="np-empty-icon">🔔</div><b>لا إشعارات بعد</b><span style="font-size:13px">ستظهر هنا عند تفاعل الآخرين</span></div>`;
    return;
  }
  el.innerHTML=notifs.map(n=>{
    const name=n.actor_name||n.from_name||'مستخدم';
    const photo=n.actor_photo||n.from_photo||null;
    const isRead=n.is_read||n.read||false;
    const time=n.created_at||n.at||new Date().toISOString();
    const t=NTYPES[n.type]||{e:'🔔',t:'إشعار',c:'#6b6555'};
    const av=photo?`<img src="${esc(photo)}" style="width:100%;height:100%;object-fit:cover">`:ini(name);
    let postTxt=n.post_text||'';
    if(!postTxt&&n.metadata){try{postTxt=JSON.parse(n.metadata).post_text||'';}catch{}}
    const post=postTxt?`<div class="np-post"><div class="np-post-bar" style="background:${t.c}"></div><span class="np-post-txt">${esc(postTxt)}</span></div>`:'';
    const dispMsg=n.message||t.t;
    const notifData={...n,from_name:name,from_photo:photo,post_text:postTxt};
    return `<div class="np-item${isRead?'':' unread'}" onclick="goNotifItem(${JSON.stringify(notifData).replace(/"/g,'&quot;')})">
      ${!isRead?'<div class="np-udot"></div>':'<div style="width:7px;flex-shrink:0"></div>'}
      <div class="np-av-wrap"><div class="np-av">${av}</div><div class="np-badge">${t.e}</div></div>

        <div class="np-text"><strong>${esc(name)}</strong> ${esc(dispMsg)}</div>
        ${post}

      </div>
    </div>`;
  }).join('');
}

function agSystemPrompt(u){

يجب أن تساعد المستخدمين في إنشاء المشاريع وتحسينها وتجهيزها للاستثمار، وشرح كيفية البحث عن المستثمرين والتواصل معهم، ومساعدة الشركات على نشر الوظائف والتدريبات والفرص، ومساعدة الطلاب في العثور على التدريب ومشاريع التخرج والمنح والمسابقات، ومساعدة الباحثين عن عمل في بناء ملفاتهم الشخصية وتحسين فرصهم المهنية، ومساعدة المؤسسات في نشر برامجها وفرصها ومنحها. كما يجب أن تشرح للمستخدمين كيفية استخدام الرسائل والإشعارات والإعدادات والتوثيق والملفات الشخصية والخريطة التفاعلية وجميع أقسام المنصة.
إذا كان لديك وصول إلى بيانات المنصة، فابحث داخلها واقترح مشاريع أو مستثمرين أو شركات أو وظائف أو فرص مناسبة حسب طلب المستخدم. عند الإجابة استخدم خطوات عملية واضحة واقتراحات قابلة للتنفيذ، وقدم نصائح احترافية تساعد المستخدم على تحقيق نتائج أفضل.

  if(!res.ok){const errBody=await res.text().catch(()=>'');throw new Error(`API_ERROR_${res.status}: ${errBody.slice(0,200)}`);}
  const data=await res.json();
  const text=data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join('\n').trim();
  return text||'لم يصلني رد واضح، حاول مرة أخرى.';
}

async function agAsk({capId,freeText,history}){
  if(!agHasRealKey()){
    return{text:'⚠️ هذا المساعد يحتاج مفتاح Gemini API مجاني. احصل عليه من aistudio.google.com، ثم أدخله من الإعدادات.',mode:'no_key'};
  }
  try{
    const key=agGetApiKey();
    const userMsg=freeText||(agRoleCaps(user.type).concat(AG_SHARED).find(c=>c.id===capId)?.prompt)||freeText;
    const ragContext=freeText?await agBuildRagContext(userMsg,key):'';
    const msgs=[...(history||[]),{role:'user',content:userMsg+ragContext}];
    const text=await agCallRealAPI(msgs,user);
    return{text,mode:'real'};
  }catch(e){
    return{text:'⚠️ تعذّر الاتصال بالمساعد. تأكد من صحة المفتاح بالإعدادات.\n\n('+e.message+')',mode:'error'};
  }
}

/* ── سحب زر الإيجنت لأي مكان بالشاشة، مع حفظ الموقع بـlocalStorage ── */
const AG_POS_KEY='azza_agent_pos';
function initAgentDraggable(){
  const wrap=document.getElementById('agent-fab-wrap');
  if(!wrap)return;

  /* استرجاع الموقع المحفوظ سابقاً، إن وجد */
  try{
    const saved=JSON.parse(localStorage.getItem(AG_POS_KEY));
    if(saved&&typeof saved.top==='number'&&typeof saved.left==='number'){
      _agApplyPosition(saved.top,saved.left);
    }
  }catch(e){}

  let dragging=false,moved=false,startX=0,startY=0,startTop=0,startLeft=0;

  function onStart(clientX,clientY){
    dragging=true;moved=false;
    const r=wrap.getBoundingClientRect();
    startX=clientX;startY=clientY;startTop=r.top;startLeft=r.left;
    wrap.style.transition='none';
  }
  function onMove(clientX,clientY){
    if(!dragging)return;
    const dx=clientX-startX,dy=clientY-startY;
    if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;
    if(!moved)return;
    let newTop=startTop+dy,newLeft=startLeft+dx;
    /* لا تسمح بخروج الزر عن حدود الشاشة المرئية */
    const w=wrap.offsetWidth,h=wrap.offsetHeight;
    newTop=Math.max(8,Math.min(window.innerHeight-h-8,newTop));
    newLeft=Math.max(8,Math.min(window.innerWidth-w-8,newLeft));
    _agApplyPosition(newTop,newLeft);
  }
  function onEnd(){
    if(!dragging)return;
    dragging=false;
    wrap.style.transition='';
    if(moved){
      const r=wrap.getBoundingClientRect();
      try{localStorage.setItem(AG_POS_KEY,JSON.stringify({top:r.top,left:r.left}));}catch(e){}
    }
  }

  wrap.addEventListener('mousedown',e=>{onStart(e.clientX,e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
  document.addEventListener('mouseup',onEnd);

  wrap.addEventListener('touchstart',e=>{const t=e.touches[0];onStart(t.clientX,t.clientY);},{passive:true});
  document.addEventListener('touchmove',e=>{if(dragging){const t=e.touches[0];onMove(t.clientX,t.clientY);}},{passive:true});
  document.addEventListener('touchend',onEnd);

  /* منع فتح نافذة المحادثة لو كانت هذي نهاية سحب فعلي، لا ضغطة عادية */
  const btn=document.getElementById('agent-fab-btn');
  btn.addEventListener('click',e=>{
    if(moved){e.preventDefault();e.stopPropagation();moved=false;}
  });
}
function _agApplyPosition(top,left){
  const wrap=document.getElementById('agent-fab-wrap');
  wrap.style.top=top+'px';
  wrap.style.left=left+'px';
  wrap.style.bottom='auto';
  wrap.style.right='auto';
}
document.addEventListener('DOMContentLoaded',initAgentDraggable);
if(document.readyState!=='loading')initAgentDraggable();

/* FAB speed-dial */
function buildStats(){
  const posts=G.getPosts().filter(p=>p.author_id===user.id);
  const votes=posts.reduce((s,p)=>s+(p.votes?.length||0),0);
  const ndas=Object.values(G.getSigs()).flat().filter(x=>x.id===user.id).length;
  const sp=document.getElementById('st-p');const sv=document.getElementById('st-v');const sn=document.getElementById('st-n');
  if(sp)sp.textContent=posts.length;if(sv)sv.textContent=votes;if(sn)sn.textContent=ndas;
}

/* render */
function render(){
  usersCache=G.getUsers(); /* تحديث الكاش لضمان دقّة علامة التوثيق */
  const fd=document.getElementById('feed');if(!fd)return;
  let posts=G.getPosts();
  if(curF==='mine')     posts=posts.filter(p=>p.author_id===user.id);
  else if(curF==='idea')    posts=posts.filter(p=>p.type==='idea');
  else if(curF==='project') posts=posts.filter(p=>p.type==='project');
  else if(curF==='job')     posts=posts.filter(p=>p.type==='job');
  else if(curF==='trending')posts=posts.filter(p=>(p.votes?.length||0)>=3);
  if(curCat!=='all')posts=posts.filter(p=>p.category===curCat);
  if(searchQ){const q=searchQ.toLowerCase();posts=posts.filter(p=>(p.title||p.text||'').toLowerCase().includes(q)||(p.author_name||'').toLowerCase().includes(q));}
  if(curF==='trending')posts.sort((a,b)=>(b.votes?.length||0)-(a.votes?.length||0));
  else posts.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(!posts.length){fd.innerHTML='<div class="empty-feed"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><b>لا منشورات بعد</b><span>اضغط "نشر جديد" للبدء</span></div>';return;}
  fd.innerHTML=posts.map(p=>{try{return card(p);}catch(e){console.error('card err:',e.message,p.id);return '';}}).join('');
}

        ${p.pitch?`<div class="p-body" style="color:var(--muted);font-size:13.5px">${esc(p.pitch)}</div>`:''}
        ${p.text?`<div class="p-body">${link(p.text)}</div>`:''}
      </div>
      ${media}
      ${acts}${stats}${cmtBox}
    </article>`;
  }

  /* ── بطاقة مشروع ── */
  if(p.type==='project'){
    let fb='';
    if(p.funding_goal>0){
      const ic=(G.getInts()[p.id]||[]).length;
      const r=Math.min(p.funding_goal,Math.round(ic*(p.funding_goal/15)));
      const pc=Math.round(r/p.funding_goal*100);
      fb=`<div class="fund-box">
        <div class="fund-top">
          <span class="fund-amt">$${r.toLocaleString()}</span>
          <span class="fund-goal">من $${p.funding_goal.toLocaleString()}</span>
        </div>
        <div class="fund-bar"><div class="fund-fill" style="width:${pc}%"></div></div>
        <div class="fund-meta">
          <span><strong>${pc}%</strong> مكتمل</span>
          <span><strong>${ic}</strong> مهتم</span>
          ${p.funding_stage?`<span class="fund-stage-tag">${STAGE[p.funding_stage]||p.funding_stage}</span>`:''}
        </div>
      </div>`;
    }
    const media=p.image?`<img src="${p.image}" class="p-media" style="border-radius:0;margin-bottom:12px" onclick="openLB('${p.image}')" alt="">`:p.video?`<video class="p-media" controls src="${p.video}" style="border-radius:0;margin-bottom:12px"></video>`:'' ;
    return `<article class="post" id="post-${p.id}">
      <div class="post-stripe" style="background:${cc}"></div>
      ${header}
      <div class="p-content">
        ${p.title?`<div class="p-title" onclick="openPost('${p.id}')">${esc(p.title)}</div>`:''}
        ${p.text?`<div class="p-body" style="color:var(--muted);font-size:13.5px">${link(p.text)}</div>`:''}
        ${fb}
      </div>
      ${media}
      ${acts}${stats}${cmtBox}
    </article>`;
  }

  /* ── بطاقة وظيفة ── */
  if(p.type==='job'){
    const media=p.image?`<img src="${p.image}" class="p-media" style="border-radius:0;margin-bottom:12px" onclick="openLB('${p.image}')" alt="">`:p.video?`<video class="p-media" controls src="${p.video}" style="border-radius:0;margin-bottom:12px"></video>`:'' ;
    return `<article class="post" id="post-${p.id}">
      <div class="post-stripe" style="background:${cc}"></div>
      ${header}
      <div class="p-content">
        ${p.title?`<div class="p-title" onclick="openPost('${p.id}')">${esc(p.title)}</div>`:''}
        <div class="job-box">
          ${p.job_location?`<div class="job-row"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(p.job_location)}</div>`:''}
          ${p.job_salary?`<div class="job-row"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span class="job-salary">${esc(p.job_salary)}</span></div>`:''}
          ${p.job_type?`<div class="job-row"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>${({fulltime:'دوام كامل',parttime:'دوام جزئي',freelance:'عمل حر / مستقل',internship:'تدريب'})[p.job_type]||p.job_type}</div>`:''}
        </div>
        ${p.text?`<div class="p-body">${link(p.text)}</div>`:''}
      </div>
      ${media}
      ${acts}${stats}${cmtBox}
    </article>`;
  }

  /* ── منشور عادي ── */
  const med=p.image?`<img src="${p.image}" class="p-media" onclick="openLB('${p.image}')" alt="" style="border-radius:0;margin-bottom:0">`:p.video?`<video class="p-media" controls src="${p.video}" style="border-radius:0"></video>`:'';
  return `<article class="post" id="post-${p.id}">
    <div class="post-stripe" style="background:${cc}"></div>
    ${header}
    ${p.text?`<div class="p-content"><div class="p-body">${link(p.text)}</div></div>`:''}
    ${med}
    ${acts}${stats}${cmtBox}
  </article>`;
}

/* إجراءات */
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}
/* ══════════════════════════════════════════════════════════════
   دوال التفاعل — مبنية من الصفر
   المبدأ: Supabase أولاً → ثم loadAllData → ثم render
   لا تعديل مباشر على _postsMem أبداً (يسبب تعارضات)
   ══════════════════════════════════════════════════════════════ */

async function vote(pid){
  const p=(_postsMem||[]).find(x=>x.id===pid);if(!p)return;
  const already=p.votes?.includes(user.id);
  try{
    if(already){
      await azzaDB.from('post_reactions').delete()
        .eq('post_id',pid).eq('user_id',user.id).eq('reaction_type','vote');
    }else{
      await azzaDB.from('post_reactions').insert(
        {post_id:pid,user_id:user.id,reaction_type:'vote'}
      );
    }
    await loadAllData();
  }catch(e){
    /* Optimistic fallback لو فشل الإرسال */
    p.votes=p.votes||[];
    already?p.votes.splice(p.votes.indexOf(user.id),1):p.votes.push(user.id);
    console.error('vote error:',e.message);
  }
  render();buildStats();
}

async function react(pid,t){
  const p=(_postsMem||[]).find(x=>x.id===pid);if(!p)return;
  const k='r_'+t;const already=(p[k]||[]).includes(user.id);
  try{
    if(already){
      await azzaDB.from('post_reactions').delete()
        .eq('post_id',pid).eq('user_id',user.id).eq('reaction_type',t);
    }else{
      await azzaDB.from('post_reactions').insert(
        {post_id:pid,user_id:user.id,reaction_type:t}
      );
    }
    await loadAllData();
  }catch(e){
    p[k]=p[k]||[];
    already?p[k].splice(p[k].indexOf(user.id),1):p[k].push(user.id);
    console.error('react error:',e.message);
  }
  render();
}

/* ── نظام التعليقات الجديد (AzzaComments) ── */
function toggleCmt(pid){
  const wrap=document.getElementById('cm-'+pid);
  if(!wrap)return;
  const isOpen=wrap.classList.toggle('open');
  if(isOpen){
    const listEl=document.getElementById('az-list-'+pid);
    if(listEl&&!listEl.dataset.loaded){
      listEl.dataset.loaded='1';
      const _curPost = (_postsMem||[]).find(p=>p.id===pid);
      AzzaComments.init(azzaDB,user,(postId)=>{
        if(postId){
          AzzaComments.fetch(postId).then(cmts=>{
            AzzaComments.renderList(cmts,'az-list-'+postId);
            const cnt=document.getElementById('az-count-'+postId);
            if(cnt)cnt.textContent=cmts.filter(c=>!c.parent_id).length||0;
          });
        }
      }, _curPost?.author_id||null, _curPost||null);
      AzzaComments.injectCSS();
      AzzaComments.renderInput(pid,'az-input-'+pid);
      AzzaComments.fetch(pid).then(cmts=>{
        AzzaComments.renderList(cmts,'az-list-'+pid);
        const cnt=document.getElementById('az-count-'+pid);
        if(cnt)cnt.textContent=cmts.filter(c=>!c.parent_id).length||0;
        AzzaComments.subscribe(pid);
      });
    }
  }
}
async function addCmt(pid){ AzzaComments.submit(pid); }


async function delPost(pid){
  if(!confirm('حذف هذا المنشور؟'))return;
  try{
    await azzaDB.from('posts').delete().eq('id',pid).eq('author_id',user.id);
    await loadAllData();
  }catch(e){
    _postsMem=(_postsMem||[]).filter(p=>p.id!==pid);
    console.error('delPost error:',e.message);
  }
  render();buildStats();toast('تم الحذف','err');
}

function toggleSave(pid){const k='azza_saved_'+user.id;let s=JSON.parse(localStorage.getItem(k)||'[]');const i=s.indexOf(pid);i===-1?s.push(pid):s.splice(i,1);localStorage.setItem(k,JSON.stringify(s));render();toast(i===-1?'تم الحفظ 🔖':'أُزيل من المحفوظات','info');}
function interest(pid){const ints=G.getInts();ints[pid]=ints[pid]||[];if(ints[pid].some(x=>x.id===user.id)){toast('أبديت اهتمامك مسبقاً');return;}ints[pid].push({id:user.id,name:user.name,at:new Date().toISOString()});localStorage.setItem('azza_interests',JSON.stringify(ints));writeNotif(pid,'interest');render();toast('تم إبداء الاهتمام ✅');}
function openNda(pid){ndaId=pid;document.getElementById('nda-cb').checked=false;document.getElementById('nda-btn').disabled=true;document.getElementById('nda-ol').classList.add('open');}
function closeNda(){document.getElementById('nda-ol').classList.remove('open');ndaId=null;}
function signNda(){if(!ndaId)return;const s=G.getSigs();s[ndaId]=s[ndaId]||[];if(!s[ndaId].some(x=>x.id===user.id))s[ndaId].push({id:user.id,name:user.name,at:new Date().toISOString()});localStorage.setItem('azza_nda_sigs',JSON.stringify(s));closeNda();interest(ndaId);}
/* writeNotif — فقط للأحداث التي لا تغطيها Supabase Triggers
   comment/vote/reply → تُنشأ تلقائياً بالـTriggers
   interest → لا trigger له، يُرسل يدوياً */
function writeNotif(pid,type){
  if(type==='interest'){
    const p=(_postsMem||[]).find(x=>x.id===pid)||G.getPosts().find(x=>x.id===pid);
    if(p && window.AzzaNotif) AzzaNotif.onInterest(p);
  }
  /* comment وvote تُعالجهم Triggers تلقائياً — لا إرسال يدوي */
}
function openLB(src){document.getElementById('lb-img').src=src;document.getElementById('lb').classList.add('open');}

/* مودال النشر */
function openCompose(){document.getElementById('compose-ol').classList.add('open');}
function pickTypeAndOpen(t){openCompose();setTimeout(()=>{curType=t;document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('idea-extra').style.display=t==='idea'?'block':'none';document.getElementById('proj-extra').style.display=t==='project'?'block':'none';document.getElementById('job-extra').style.display=t==='job'?'block':'none';},50);}
function closeCompose(){document.getElementById('compose-ol').classList.remove('open');}
function pickType(btn){curType=btn.dataset.t;document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===curType));document.getElementById('idea-extra').style.display=curType==='idea'?'block':'none';document.getElementById('proj-extra').style.display=curType==='project'?'block':'none';document.getElementById('job-extra').style.display=curType==='job'?'block':'none';}
async function publish(){
  const text=document.getElementById('compose-txt').value.trim();
  const cat=document.getElementById('cat-sel').value;
  if(!text&&curType==='post'){toast('اكتب شيئاً أولاً','err');return;}
  const p={id:id(),author_id:user.id,author_name:user.name,author_username:user.username||'',author_type:user.type,author_photo:user.photo||null,type:curType,text,category:cat||null,image:mediaData?.type==='image'?mediaData.data:null,video:mediaData?.type==='video'?mediaData.data:null,votes:[],r_insightful:[],r_collab:[],comments:[],views:0,created_at:new Date().toISOString()};
  if(curType==='idea'){p.title=document.getElementById('idea-title').value.trim();p.pitch=document.getElementById('idea-pitch').value.trim();p.nda=document.getElementById('nda-pub').checked;}
  if(curType==='project'){p.title=document.getElementById('proj-title').value.trim();p.funding_goal=parseInt(document.getElementById('fund-goal').value)||0;p.funding_stage=document.getElementById('fund-stage').value;}
  if(curType==='job'){p.title=document.getElementById('job-title').value.trim();p.job_location=document.getElementById('job-location').value.trim();p.job_salary=document.getElementById('job-salary').value.trim();p.job_type=document.getElementById('job-type').value;}

  /* عرض فوري محلي أولاً (إحساس استجابة سريعة)، بينما الإرسال الفعلي لـSupabase يجري بالخلفية */
  const posts=G.getPosts();posts.unshift(p);G.savePosts(posts);
  closeCompose();rmMedia();
  ['compose-txt','idea-title','idea-pitch','proj-title','fund-goal'].forEach(x=>{const el=document.getElementById(x);if(el)el.value='';});
  document.getElementById('nda-pub').checked=false;document.getElementById('fund-stage').value='';document.getElementById('cat-sel').value='';
  curType='post';document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('on',b.dataset.t==='post'));
  document.getElementById('idea-extra').style.display='none';document.getElementById('proj-extra').style.display='none';document.getElementById('job-extra').style.display='none';
  curF='all';document.querySelectorAll('.f-btn').forEach(b=>b.classList.toggle('on',b.dataset.f==='all'));
  render();buildStats();toast('تم النشر ✅');

  /* الإرسال الفعلي لقاعدة البيانات الحقيقية — لو فشل، المنشور يبقى محلياً فقط (يُعلن بصمت بـconsole دون كسر تجربة المستخدم) */
  try{
    const {error}=await azzaDB.from('posts').insert({
      id:p.id,author_id:p.author_id,author_name:p.author_name,author_username:p.author_username,
      author_type:p.author_type,author_photo:p.author_photo,type:p.type,text:p.text,
      title:p.title||null,category:p.category,image:p.image,video:p.video,
      pitch:p.pitch||null,nda:p.nda||false,funding_goal:p.funding_goal||null,
      funding_stage:p.funding_stage||null,job_location:p.job_location||null,
      job_salary:p.job_salary||null,job_type:p.job_type||null,views:0,
    });
    if(error)throw error;
  }catch(e){
    console.error('تعذّر حفظ المنشور بقاعدة البيانات المركزية (بقي محفوظاً محلياً فقط):',e.message);
  }
}

/* وسائط */
function handleImg(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const M=1200;let w=img.width,h=img.height;if(w>M){h=Math.round(h*M/w);w=M;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);const d=c.toDataURL('image/jpeg',.85);mediaData={type:'image',data:d};document.getElementById('img-prev').src=d;document.getElementById('img-prev').style.display='block';document.getElementById('vid-prev').style.display='none';document.getElementById('media-prev').style.display='block';document.getElementById('media-hint').textContent=Math.round(d.length*.75/1024)+' KB';};img.src=e.target.result;};r.readAsDataURL(f);inp.value='';}
function handleVid(inp){const f=inp.files[0];if(!f)return;const u=URL.createObjectURL(f);const v=document.createElement('video');v.src=u;v.onloadedmetadata=()=>{if(v.duration>120){toast('الفيديو أطول من دقيقتين','err');URL.revokeObjectURL(u);inp.value='';return;}if(f.size>20*1024*1024){toast('الفيديو أكبر من 20MB','err');URL.revokeObjectURL(u);inp.value='';return;}const r=new FileReader();r.onload=e=>{mediaData={type:'video',data:e.target.result};const vp=document.getElementById('vid-prev');vp.src=e.target.result;vp.style.display='block';document.getElementById('img-prev').style.display='none';document.getElementById('media-prev').style.display='block';document.getElementById('media-hint').textContent=(f.size/1024/1024).toFixed(1)+' MB · '+Math.round(v.duration)+'ث';URL.revokeObjectURL(u);};r.readAsDataURL(f);inp.value='';};}
function rmMedia(){mediaData=null;document.getElementById('media-prev').style.display='none';document.getElementById('img-prev').src='';document.getElementById('vid-prev').src='';document.getElementById('media-hint').textContent='';}

/* اليمين */
function buildRight(){
  const posts=G.getPosts().sort((a,b)=>(b.votes?.length||0)-(a.votes?.length||0)).slice(0,5);
  const tl=document.getElementById('trends');
  if(tl)tl.innerHTML=posts.length?posts.map((p,i)=>`<div class="trend-item" onclick="openPost('${p.id}')"><span>${i+1}. ${esc((p.title||p.text||'').substring(0,28))}${(p.title||p.text||'').length>28?'...':''}</span><span class="trend-rank">▲${p.votes?.length||0}</span></div>`).join(''):'<div style="font-size:13px;color:var(--muted)">لا منشورات بعد</div>';
  const myT=vt(user);const pri=MATCH[myT]||[];
  const users=G.getUsers().filter(u=>u.id!==user.id).sort((a,b)=>{const ap=pri.indexOf(vt(a)),bp=pri.indexOf(vt(b));return(ap===-1?99:ap)-(bp===-1?99:bp);}).slice(0,3);
  const following=JSON.parse(localStorage.getItem('azza_following_'+user.id)||'[]');
  const sl=document.getElementById('suggestions');
  if(sl)sl.innerHTML=users.length?users.map(u=>{const vc=VERIFY[vt(u)]||VERIFY.idea;const isF=following.includes(u.id);const av=u.photo?`<img src="${u.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:ini(u.name);return `<div class="sug-item"><div class="sug-av" onclick="openUser('${u.id}')">${av}</div><div style="flex:1"><div class="sug-name" onclick="openUser('${u.id}')">${esc(u.name)}</div><div class="sug-role" style="color:${vc.c}">${vc.lbl}</div></div><button class="follow-b${isF?' on':''}" id="fw-${u.id}" onclick="toggleFollow('${u.id}',this)">${isF?'✓':'+'}</button></div>`;}).join(''):'<div style="font-size:13px;color:var(--muted)">لا مستخدمين آخرين</div>';
}
async function toggleFollow(uid,btn){
  const k='azza_following_'+user.id;
  let f=JSON.parse(localStorage.getItem(k)||'[]');
  const i=f.indexOf(uid);
  const following=i===-1;
  following?f.push(uid):f.splice(i,1);
  localStorage.setItem(k,JSON.stringify(f));
  btn.textContent=following?'✓':'+';
  btn.classList.toggle('on',following);
  toast(following?'بدأت المتابعة ✅':'ألغيت المتابعة','info');
  /* كتابة لـSupabase follows — يُفعّل الـTrigger تلقائياً لإرسال الإشعار */
  try{
    if(following){
      await azzaDB.from('follows').insert({follower_id:user.id,following_id:uid});
    }else{
      await azzaDB.from('follows').delete().eq('follower_id',user.id).eq('following_id',uid);
    }
  }catch(e){
    /* fallback: أرسل الإشعار يدوياً لو الـTrigger لم يعمل */
    if(following && window.AzzaNotif) AzzaNotif.onFollow(uid);
  }
}
