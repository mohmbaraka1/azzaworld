<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عزّة — تفاصيل المنشور</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
body{transition:background-color .25s,color .25s}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0}
.theme-btn:hover{border-color:var(--olive);color:var(--olive)}
.theme-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.ic{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block;flex-shrink:0}

/* هيدر */
.top{position:sticky;top:0;z-index:50;background:rgba(247,241,227,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-in{display:flex;align-items:center;gap:10px;height:62px;padding:0 18px;max-width:860px;margin:0 auto}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;border:1.5px solid var(--line);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;flex-shrink:0}
.back-btn:hover{border-color:var(--olive);color:var(--olive)}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--olive),var(--olive-deep));display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Aref Ruqaa',serif;font-size:18px}
.brand-text{font-family:'Aref Ruqaa',serif;font-size:20px;color:var(--olive-deep)}
.top-right{display:flex;align-items:center;gap:8px;margin-right:auto}
.share-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;border:1.5px solid var(--line);background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.share-btn:hover{border-color:var(--olive);color:var(--olive)}

/* تخطيط */
.layout{max-width:860px;margin:0 auto;padding:20px 18px 60px;display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start}
@media(max-width:720px){.layout{grid-template-columns:1fr}.aside-col{display:none}}

/* بطاقة المنشور */
.post-card{background:var(--card);border:1px solid var(--line);border-radius:var(--rxl);overflow:hidden}
.post-stripe{height:5px}
.post-head{display:flex;align-items:flex-start;gap:12px;padding:18px 18px 10px}
.post-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-deep));display:flex;align-items:center;justify-content:center;color:var(--gold-soft);font-weight:900;font-size:1.15rem;overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid rgba(28,91,56,.15);transition:.15s}
.post-av:hover{border-color:var(--olive)}
.post-author{flex:1;min-width:0}
.post-name{font-size:15px;font-weight:700;cursor:pointer;line-height:1.3}
.post-name:hover{color:var(--olive)}
.post-handle{font-size:12px;color:var(--olive);font-weight:500}
.post-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.post-time{font-size:12px;color:var(--muted)}
.post-menu-wrap{position:relative}
.post-menu-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:7px;border-radius:9px;transition:.18s;display:flex}
.post-menu-btn:hover{background:var(--cream);color:var(--ink)}
.ctx-menu{position:absolute;top:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:4px;min-width:170px;box-shadow:0 8px 28px rgba(28,26,20,.14);z-index:50;display:none}
.ctx-menu.open{display:block}
.ctx-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;border:none;background:transparent;width:100%;text-align:right;font-family:inherit;transition:.13s}
.ctx-item .ic{width:14px;height:14px}
.ctx-item:hover{background:var(--cream)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(206,17,38,.06)}

/* شارات */
.badges-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 18px 12px}
.pbadge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;border:1px solid}
.pb-idea{background:rgba(28,91,56,.08);color:#0e3622;border-color:rgba(28,91,56,.2)}
.pb-project{background:rgba(198,151,73,.1);color:#9b7420;border-color:rgba(198,151,73,.3)}
.pb-job{background:rgba(24,95,165,.08);color:#0c447c;border-color:rgba(24,95,165,.2)}
.pb-nda{background:rgba(14,54,34,.12);color:#0e3622;border-color:rgba(14,54,34,.3)}
.pb-trend{background:rgba(206,17,38,.08);color:#9b1220;border-color:rgba(206,17,38,.2)}
.pb-new{background:rgba(15,110,86,.1);color:#085041;border-color:rgba(15,110,86,.25)}
.pb-cat{background:var(--cream);color:var(--muted);border-color:var(--line)}

/* فكرة layout */
.idea-layout{display:flex;border-top:1px solid var(--line)}
.idea-vote-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:22px 14px;border-left:1px solid var(--line);min-width:76px;gap:4px}
.vote-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 14px;border-radius:16px;border:1.5px solid var(--line);background:var(--cream);cursor:pointer;transition:.2s;font-family:inherit}
.vote-btn:hover{border-color:var(--olive);background:rgba(28,91,56,.06)}
.vote-btn.voted{background:var(--olive);border-color:var(--olive);color:#fff;animation:vpop .3s ease}
@keyframes vpop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.vote-arrow{font-size:20px;line-height:1}
.vote-count{font-family:'Aref Ruqaa',serif;font-size:1.6rem;font-weight:700;line-height:1}
.idea-content{flex:1;padding:18px;min-width:0}
.idea-title{font-family:'Aref Ruqaa',serif;font-size:1.5rem;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.4}
.idea-pitch{font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:12px}

/* محتوى عادي */
.post-title{font-family:'Aref Ruqaa',serif;font-size:1.5rem;font-weight:700;color:var(--ink);padding:8px 18px 4px;line-height:1.4}
.post-body{padding:8px 18px 16px;font-size:15px;line-height:1.85;white-space:pre-wrap;word-break:break-word}
.post-media{width:100%;display:block;object-fit:cover;max-height:480px;cursor:zoom-in}

/* شريط تمويل */
.fund-section{margin:0 18px 16px;background:linear-gradient(135deg,rgba(28,91,56,.04),rgba(198,151,73,.04));border:1px solid rgba(28,91,56,.14);border-radius:var(--r);padding:16px}
.fund-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.fund-raised{font-family:'Aref Ruqaa',serif;font-size:1.9rem;font-weight:700;color:var(--olive);line-height:1}
.fund-goal{font-size:13px;color:var(--muted)}
.fund-track{height:8px;background:rgba(28,26,20,.08);border-radius:999px;overflow:hidden;margin-bottom:14px}
.fund-fill{height:100%;background:linear-gradient(90deg,var(--olive),var(--gold));border-radius:999px;transition:width .9s ease}
.fund-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.fund-stat{text-align:center;background:rgba(255,255,255,.75);border-radius:10px;padding:10px}
.fund-stat strong{display:block;font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:3px}
.fund-stat span{font-size:11.5px;color:var(--muted)}

/* وظيفة */
.job-section{margin:0 18px 16px;background:linear-gradient(135deg,rgba(24,95,165,.05),rgba(24,95,165,.02));border:1px solid rgba(24,95,165,.15);border-radius:var(--r);padding:16px}
.job-row{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);margin-bottom:8px}
.job-row:last-child{margin-bottom:0}
.job-row svg{width:16px;height:16px;stroke:#185fa5;flex-shrink:0}
.job-salary{font-weight:700;color:#0c447c}

/* NDA */
.nda-box{margin:0 18px 16px;background:rgba(14,54,34,.05);border:1.5px solid rgba(14,54,34,.18);border-radius:var(--r);padding:16px}
.nda-title{font-size:14px;font-weight:700;color:#0e3622;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.nda-desc{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.65}
.nda-sign-btn{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:999px;background:#0e3622;color:#fff;border:none;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.2s}
.nda-sign-btn:hover{background:var(--olive-deep)}
.nda-signed{color:var(--olive);font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:6px}

/* أزرار الإجراءات */
.actions-bar{display:flex;align-items:center;gap:3px;padding:8px 10px;border-top:1px solid var(--line);flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.act-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.act-btn:hover{background:var(--cream);color:var(--ink)}
.act-btn.voted{color:var(--olive);background:rgba(28,91,56,.08)}
.act-btn.saved{color:var(--gold)}
.act-btn.r-insight{color:#854F0B;background:rgba(133,79,11,.08)}
.act-btn.r-collab{color:#185FA5;background:rgba(24,95,165,.08)}
.act-btn.r-invest{color:#0F6E56;background:rgba(15,110,86,.08)}
.interest-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:999px;background:var(--olive);color:#fff;border:none;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.2s;margin-right:auto}
.interest-btn:hover{background:var(--olive-deep)}
.interest-btn.done{background:transparent;color:var(--olive);border:1.5px solid var(--olive)}

/* إحصائيات */
.post-stats{display:flex;gap:14px;padding:10px 18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.post-stats span{display:flex;align-items:center;gap:4px}

/* تعديل المنشور */
.edit-bar{padding:12px 18px;border-top:1px solid var(--line);background:rgba(28,91,56,.02);display:flex;align-items:center;gap:8px}
.edit-bar span{font-size:13px;color:var(--muted);flex:1}
.edit-btn{padding:8px 18px;border-radius:999px;border:1.5px solid var(--olive);background:transparent;color:var(--olive);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.edit-btn:hover{background:var(--olive);color:#fff}

/* قائمة المهتمين / موقعي NDA */
.people-card{background:var(--card);border:1px solid var(--line);border-radius:var(--rxl);overflow:hidden}
.people-head{padding:14px 18px;border-bottom:1px solid var(--line);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.people-head-left{display:flex;align-items:center;gap:8px}
.people-head .ic{width:15px;height:15px;color:var(--gold)}
.people-count{background:var(--olive);color:#fff;font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px;margin-right:4px}
.people-list{max-height:260px;overflow-y:auto}
.person-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:.5px solid rgba(28,26,20,.06);cursor:pointer;transition:.15s}
.person-row:last-child{border-bottom:none}
.person-row:hover{background:var(--cream)}
.person-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-deep));display:flex;align-items:center;justify-content:center;color:var(--gold-soft);font-weight:700;font-size:.85rem;flex-shrink:0;overflow:hidden}
.person-info{flex:1;min-width:0}
.person-name{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person-time{font-size:11px;color:var(--muted);margin-top:2px}
.person-badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700}
.msg-person-btn{background:none;border:1.5px solid var(--line);border-radius:999px;padding:5px 11px;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s;flex-shrink:0}
.msg-person-btn:hover{border-color:var(--olive);color:var(--olive)}
.empty-people{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px}

/* تبويبات المهتمين/NDA */
.people-tabs{display:flex;border-bottom:1px solid var(--line)}
.ptab{flex:1;padding:10px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:.15s;margin-bottom:-1px}
.ptab.on{color:var(--olive);border-bottom-color:var(--olive)}

/* التعليقات */
.comments-section{background:var(--card);border:1px solid var(--line);border-radius:var(--rxl);overflow:hidden}
.comments-header{padding:14px 18px;border-bottom:1px solid var(--line);font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.comments-header .ic{width:15px;height:15px;color:var(--gold)}
.comment-list{padding:6px 18px}
.comment{display:flex;gap:10px;padding:13px 0;border-bottom:.5px solid rgba(28,26,20,.06);position:relative}
.comment:last-child{border-bottom:none}
.cmt-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-soft));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden}
.cmt-bubble{flex:1;min-width:0;background:var(--cream);border-radius:0 14px 14px 14px;padding:10px 13px;word-break:break-word}
.cmt-name{font-size:13px;font-weight:700;color:var(--olive);margin-bottom:3px;cursor:pointer}
.cmt-name:hover{text-decoration:underline}
.cmt-text{font-size:14px;line-height:1.7;color:var(--ink)}
.cmt-footer{display:flex;align-items:center;gap:10px;margin-top:5px}
.cmt-time{font-size:11px;color:var(--muted)}
.cmt-del{background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;padding:0;font-family:inherit;transition:.15s}
.cmt-del:hover{color:var(--red)}
.no-comments{padding:36px 18px;text-align:center;color:var(--muted);font-size:14px}

/* إضافة تعليق */
.add-comment{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:flex-start}
.add-cmt-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-soft));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden}
.add-cmt-wrap{flex:1;border:1.5px solid var(--line);border-radius:16px;overflow:hidden;transition:.2s;background:var(--cream)}
.add-cmt-wrap:focus-within{border-color:var(--olive);background:var(--card)}
.cmt-input{width:100%;border:none;background:transparent;padding:10px 14px;font-family:inherit;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.65}
.cmt-input::placeholder{color:#b3aa92}
.cmt-send-row{display:flex;justify-content:flex-end;padding:6px 10px}
.cmt-send{padding:7px 18px;border-radius:999px;background:var(--olive);color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.cmt-send:hover{background:var(--olive-deep)}
.cmt-send:disabled{opacity:.4;cursor:not-allowed}

/* منشورات ذات صلة */
.related{background:var(--card);border:1px solid var(--line);border-radius:var(--rxl);overflow:hidden}
.related-head{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px}
.related-head .ic{width:14px;height:14px;color:var(--gold)}
.rel-item{display:flex;gap:11px;padding:11px 16px;border-bottom:.5px solid var(--line);cursor:pointer;transition:.15s}
.rel-item:last-child{border-bottom:none}
.rel-item:hover{background:var(--cream)}
.rel-av{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--olive),var(--olive-deep));display:flex;align-items:center;justify-content:center;color:var(--gold-soft);font-weight:700;font-size:.85rem;flex-shrink:0;overflow:hidden}
.rel-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.rel-meta{font-size:11.5px;color:var(--muted)}

/* عمود الجانب */
.aside-col{display:flex;flex-direction:column;gap:14px}
.aside-card{background:var(--card);border:1px solid var(--line);border-radius:var(--rxl);overflow:hidden}
.aside-head{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px}
.aside-head .ic{width:14px;height:14px;color:var(--gold)}
.aside-body{padding:14px 16px}

/* مودال تعديل */
.overlay{position:fixed;inset:0;background:rgba(14,54,34,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:80;padding:18px}
.overlay.open{display:flex}
.modal{width:100%;max-width:480px;background:var(--card);border-radius:var(--rxl);overflow:hidden;animation:mpop .22s ease}
@keyframes mpop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
.modal-x{background:none;border:none;cursor:pointer;color:var(--muted);padding:5px;display:flex;border-radius:8px;transition:.15s}
.modal-x:hover{background:var(--cream)}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--line);border-radius:var(--r2);background:var(--cream);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--ink);outline:none;transition:.2s}
.field input:focus,.field textarea:focus{border-color:var(--olive);background:var(--card)}
.field textarea{resize:vertical;min-height:100px;line-height:1.7}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:14px 16px;border-top:1px solid var(--line)}
.btn-cancel{padding:9px 18px;border-radius:999px;border:1.5px solid var(--line);background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.btn-save{padding:9px 22px;border-radius:999px;background:var(--olive);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.btn-save:hover{background:var(--olive-deep)}

/* NDA مودال */
.nda-list-modal{background:var(--cream);border-radius:12px;padding:14px;list-style:none}
.nda-list-modal li{font-size:13px;line-height:1.8;padding-right:14px;position:relative}
.nda-list-modal li::before{content:'•';position:absolute;right:0;color:var(--olive)}
.nda-agree{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);font-size:13.5px;font-weight:700;cursor:pointer}
.nda-agree input{width:18px;height:18px;accent-color:var(--olive);cursor:pointer}
.nda-confirm-btn{width:100%;background:var(--olive);color:#fff;border:none;border-radius:999px;padding:13px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.nda-confirm-btn:disabled{opacity:.4;cursor:not-allowed}

/* لايت بوكس */
.lightbox{position:fixed;inset:0;background:rgba(14,54,34,.92);display:none;align-items:center;justify-content:center;z-index:100;padding:24px;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:100%;border-radius:12px;object-fit:contain}
.lb-x{position:absolute;top:18px;left:18px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}

<script>
/* ── الوضع الليلي ── */
const THEME_KEY='azza_theme';

/* ══ AZZA — post.html (v2) ══ */
const getMe    = ()=>{try{return JSON.parse(localStorage.getItem('azza_user'));}catch{return null;}};
/* === Supabase - تهيئة العميل === */
const SB_URL='https://iecniydswotsilaueogq.supabase.co';
const SB_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllY25peWRzd290c2lsYXVlb2dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTg1OTcsImV4cCI6MjA5Nzc3NDU5N30.69LfEBHUwToTHue3EPS_KYq9BvDSZJ9jcW_P1yRKReA';
const azzaDB=supabase.createClient(SB_URL,SB_ANON_KEY);
let _postsMem=null, _usersMem=null;

/* ══════════════════════════════════════════════════════════════
   نظام بيانات المنشورات — Supabase فقط (مُعاد بناؤه من الصفر)
   المبدأ: Supabase هو المصدر الوحيد للحقيقة
   لا localStorage للمنشورات/التعليقات/التفاعلات أبداً
   ══════════════════════════════════════════════════════════════ */

/* تحويل صف Supabase لكائن منشور موحّد — votes/comments/reactions تبقى فاضية
   وتُملأ لاحقاً بـloadAllData() من جداولها المنفصلة */
function _mapPost(row){
  return {
    id:row.id,
    author_id:row.author_id,
    author_name:row.author_name||'',
    author_username:row.author_username||'',
    author_type:row.author_type||'idea',
    author_photo:row.author_photo||null,
    type:row.type,
    text:row.text||'',
    title:row.title||'',
    category:row.category||null,
    image:row.image||null,
    video:row.video||null,
    pitch:row.pitch||'',
    nda:row.nda||false,
    funding_goal:row.funding_goal||0,
    funding_stage:row.funding_stage||'',
    job_location:row.job_location||'',
    job_salary:row.job_salary||'',
    job_type:row.job_type||'',
    views:row.views||0,
    created_at:row.created_at,
    /* هذه الحقول تُملأ دائماً من جداولها المنفصلة — لا من جدول posts */
    votes:[],
    r_insightful:[],
    r_collab:[],
    comments:[],
  };
}

/* الجلب الشامل: منشورات + تعليقات + تفاعلات + مستخدمين بطلب واحد متوازٍ */
async function loadAllData(){
  try{
    const [postsRes,usersRes,cmtsRes,reactsRes]=await Promise.all([
      azzaDB.from('posts').select('*').order('created_at',{ascending:false}),
      azzaDB.from('users').select('*'),
      azzaDB.from('post_comments').select('*').order('created_at',{ascending:true}),
      azzaDB.from('post_reactions').select('*'),
    ]);

    /* المستخدمون */
    if(!usersRes.error) _usersMem=usersRes.data||[];

    /* المنشورات الأساسية */
    if(postsRes.error)throw postsRes.error;
    const posts=(postsRes.data||[]).map(_mapPost);

    /* فهرسة التعليقات بالـpost_id */
    const cmtMap={};
    (cmtsRes.data||[]).forEach(c=>{
      if(!cmtMap[c.post_id])cmtMap[c.post_id]=[];
      cmtMap[c.post_id].push({
        id:String(c.id),
        author_id:c.author_id,
        author_name:c.author_name||'',
        author_username:c.author_username||'',
        text:c.content||'',
        created_at:c.created_at,
      });
    });

    /* فهرسة التفاعلات بالـpost_id */
    const reactMap={votes:{},r_insightful:{},r_collab:{}};
    (reactsRes.data||[]).forEach(r=>{
      const key=r.reaction_type==='vote'?'votes':
                r.reaction_type==='insightful'?'r_insightful':'r_collab';
      if(!reactMap[key][r.post_id])reactMap[key][r.post_id]=[];
      reactMap[key][r.post_id].push(r.user_id);
    });

    /* دمج كل شيء — كل منشور يحمل تعليقاته وتفاعلاته الحقيقية */
    _postsMem=posts.map(p=>({
      ...p,
      comments: cmtMap[p.id]||[],
      votes:    reactMap.votes[p.id]||[],
      r_insightful: reactMap.r_insightful[p.id]||[],
      r_collab: reactMap.r_collab[p.id]||[],
    }));

    /* مزامنة localStorage للعمل دون إنترنت وكخطة احتياطية */
    localStorage.setItem('azza_posts',JSON.stringify(_postsMem));

  }catch(e){
    console.error('loadAllData فشل، رجوع للـcache المحلي:',e.message);
    /* fallback: استخدام localStorage المحلي إذا فشل الاتصال */
    if(_postsMem===null){
      try{_postsMem=JSON.parse(localStorage.getItem('azza_posts')||'[]');}
      catch{_postsMem=[];}
    }
  }
}

const getPosts = ()=>{ if(_postsMem!==null)return _postsMem; try{return JSON.parse(localStorage.getItem('azza_posts')||'[]');}catch{return[];} };
const savePosts=p=>{_postsMem=p;try{localStorage.setItem('azza_posts',JSON.stringify(p));}catch{}};
const getSigs  = ()=>{try{return JSON.parse(localStorage.getItem('azza_nda_sigs')||'{}');}catch{return{};}};
const getInts  = ()=>{try{return JSON.parse(localStorage.getItem('azza_interests')||'{}');}catch{return{};}};
const getConvs = ()=>{try{return JSON.parse(localStorage.getItem('azza_conversations')||'[]');}catch{return[];}};
const saveConvs= c=>localStorage.setItem('azza_conversations',JSON.stringify(c));
const genId    = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const ini      = n=>(n||'م').trim()[0].toUpperCase();
const esc      = s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const timeAgo  = iso=>{const m=Math.floor((Date.now()-new Date(iso))/60000);if(m<1)return'الآن';if(m<60)return m+' دقيقة';const h=Math.floor(m/60);if(h<24)return h+' ساعة';return Math.floor(h/24)+' يوم';};
const linkify  = s=>esc(s).replace(/#([\p{L}\p{N}_]+)/gu,(mt,w)=>`<span style="color:var(--olive);font-weight:700;cursor:pointer" onclick="filterFeed('#${w}')">#${w}</span>`);

const me = getMe();
if(!me){ location.href='login.html'; }

const postId = params.get('id');
let post = null;
let curPeopleTab = 'interested'; /* interested | nda */

const VERIFY={
  idea:       {label:'صاحب فكرة',color:'#1c5b38',bg:'rgba(28,91,56,.1)'},
  skill:      {label:'خبير',     color:'#0F6E56',bg:'rgba(15,110,86,.1)'},
  investor:   {label:'مستثمر',   color:'#854F0B',bg:'rgba(133,79,11,.1)'},
  company:    {label:'شركة',     color:'#D85A30',bg:'rgba(216,90,48,.1)'},
  institution:{label:'مؤسسة',   color:'#185FA5',bg:'rgba(24,95,165,.1)'},
};
const CAT_L={tech:'💻 تقنية',health:'🩺 صحة',education:'📚 تعليم',environment:'🌿 بيئة',business:'💼 أعمال',design:'🎨 تصميم'};
const CAT_CLR={tech:'#185FA5',health:'#D85A30',education:'#854F0B',environment:'#0F6E56',business:'#3B6D11',design:'#534AB7'};
const STAGE_L={'pre-seed':'Pre-Seed','seed':'Seed','series-a':'Series A','mvp':'MVP'};

/* ✓ علامة التوثيق الرسمي — أيقونة صفراء ملاصقة بالاسم */
const usersCacheP=new Proxy([],{get(_,prop){
  const real = _usersMem!==null ? _usersMem : (()=>{try{return JSON.parse(localStorage.getItem('azza_users')||'[]');}catch{return[];}})();
  return real[prop];
}});
function calcTrustScoreP(u){
  if(!u)return 0;
  const posts=getPosts().filter(p=>p.author_id===u.id);
  let s={profile:0,nda:0,activity:0};
  if(u.photo)s.profile+=8;if((u.bio||'').length>10)s.profile+=8;
  if(u.phone||u.email)s.profile+=5;if(u.linkedin||u.twitter||u.website)s.profile+=5;
  if(u.institution)s.profile+=4;s.profile=Math.min(30,s.profile);
  const sigs=getSigs();let ndaT=0;
  posts.filter(p=>p.nda).forEach(p=>{ndaT+=(sigs[p.id]||[]).length;});
  s.nda=Math.min(35,Math.round(ndaT*3));
  const views=posts.reduce((a,p)=>a+(p.views||0),0);
  s.activity=Math.min(35,posts.length*4+Math.floor(views/25));
  return Math.min(100,s.profile+s.nda+s.activity);
}
function isIdVerifiedP(authorId){
  if(!authorId)return false;
  if(authorId===me.id)return me.id_verified===true;
  const u=usersCacheP.find(x=>x.id===authorId);
  if(!u)return false;
  return u.id_verified===true;
}
const BADGE_COLORS={idea:'#1c5b38',skill:'#0F6E56',investor:'#854F0B',company:'#D85A30',institution:'#185FA5'};
function shieldBadgeSVG(type,size){
  const c=BADGE_COLORS[type]||BADGE_COLORS.idea;
  return `<svg viewBox="0 0 22 22" width="${size}" height="${size}"><path d="M11 1.5L17.5 4.8V10.5C17.5 14.8 14.7 18.6 11 20C7.3 18.6 4.5 14.8 4.5 10.5V4.8L11 1.5Z" fill="${c}"/><path d="M7.3 11l2.4 2.4 5-5.4" stroke="#fff" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function checkmarkP(authorId,size=15){
  if(!isIdVerifiedP(authorId))return'';
  const u=authorId===me.id?me:usersCacheP.find(x=>x.id===authorId);
  const type=u?(u.subtype==='institution'?'institution':u.type):'idea';
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;vertical-align:middle;flex-shrink:0" title="حساب موثّق من عزّة">${shieldBadgeSVG(type,size)}</span>`;
}

function verifyType(u){return u?.subtype==='institution'?'institution':(u?.type||'idea');}
function showToast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.style.background=t==='ok'?'#1c5b38':t==='err'?'#c0392b':'#c69749';e.style.opacity='1';clearTimeout(e._t);e._t=setTimeout(()=>e.style.opacity='0',2800);}
function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function filterFeed(tag){localStorage.setItem('azza_search',tag);location.href='app.html';}

/* ── تحميل ── */
let _viewsCounted=false;
function init(){
  if(!postId){document.getElementById('layout').innerHTML=notFoundHTML('لم يتم تحديد منشور');return;}
  const posts=getPosts();
  post=posts.find(p=>p.id===postId);
  if(!post){document.getElementById('layout').innerHTML=notFoundHTML('المنشور غير موجود أو تم حذفه');return;}
  if(!_viewsCounted){
    post.views=(post.views||0)+1;
    const idx=posts.findIndex(p=>p.id===postId);
    if(idx!==-1){posts[idx]=post;savePosts(posts);}
    _viewsCounted=true;
  }
  document.title=`${post.title||post.text?.substring(0,40)||'منشور'} — عزّة`;
  renderAll();
  document.addEventListener('click',e=>{
    const cm=document.getElementById('ctx-menu');
    if(cm&&!cm.parentElement?.contains(e.target))cm.classList.remove('open');
  });
}
loadInitialDataFromSupabase().then(()=>{
  /* تزامن بيانات المستخدم الحالي نفسه مع Supabase — يحل خلل عدم انعكاس
     التعديلات اللاحقة (مثل تفعيل التوثيق) بدون تسجيل خروج/دخول يدوي.
     me معرّفة بـconst هنا، فنحدّث خصائصها بدل استبدالها بالكامل */
  const freshMe=(_usersMem||[]).find(u=>u.id===me.id);
  if(freshMe){ Object.assign(me,freshMe); localStorage.setItem('azza_user',JSON.stringify(me)); }
  init();
});

function notFoundHTML(msg){
  return `<div style="grid-column:1/-1;text-align:center;padding:80px 20px">
    <div style="font-size:3rem;margin-bottom:16px">🔍</div>
    <div style="font-family:'Aref Ruqaa',serif;font-size:1.4rem;color:var(--ink);margin-bottom:8px">${msg}</div>
    <button onclick="history.back()" style="padding:10px 24px;border-radius:999px;background:var(--olive);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px">رجوع</button>
  </div>`;
}

/* ── رسم كل شيء ── */
function renderAll(){
  const p=post;
  const mine=p.author_id===me.id;
  const pVc=VERIFY[verifyType({type:p.author_type,subtype:p.author_subtype})]||VERIFY.idea;
  const catColor=CAT_CLR[p.category]||'#1c5b38';
  const voteN=(p.votes||[]).length;
  const voted=(p.votes||[]).includes(me.id);
  const saved=(JSON.parse(localStorage.getItem('azza_saved_'+me.id)||'[]')).includes(p.id);
  const isNew=(Date.now()-new Date(p.created_at))<48*3600000;
  const isTrend=voteN>=5;
  const ri=(p.r_insightful||[]).length,rc=(p.r_collab||[]).length,rv=(p.r_invest||[]).length;
  const si=(p.r_insightful||[]).includes(me.id),sc=(p.r_collab||[]).includes(me.id),sv=(p.r_invest||[]).includes(me.id);
  const isInt=(getInts()[p.id]||[]).some(x=>x.id===me.id);
  const isSigned=(getSigs()[p.id]||[]).some(x=>x.id===me.id);
  const av=p.author_photo?`<img src="${p.author_photo}" style="width:100%;height:100%;object-fit:cover">`:ini(p.author_name);
  const intList=getInts()[p.id]||[];
  const ndaList=getSigs()[p.id]||[];

  /* شارات */
  let badges='';
  if(p.type==='idea')    badges+=`<span class="pbadge pb-idea">💡 فكرة</span>`;
  if(p.type==='project') badges+=`<span class="pbadge pb-project">🚀 مشروع</span>`;
  if(p.type==='job')      badges+=`<span class="pbadge pb-job">📋 وظيفة</span>`;
  if(p.category&&CAT_L[p.category]) badges+=`<span class="pbadge pb-cat">${CAT_L[p.category]}</span>`;
  if(p.nda)    badges+=`<span class="pbadge pb-nda">🔒 NDA محمية</span>`;
  if(isTrend)  badges+=`<span class="pbadge pb-trend">🔥 ترند</span>`;
  if(isNew)    badges+=`<span class="pbadge pb-new">✨ جديد</span>`;

  /* هيدر المنشور */
  const header=`

          <span class="post-time">${timeAgo(p.created_at)}</span>

      <div class="post-menu-wrap">

          </button>
          <button class="ctx-item" onclick="toggleSave()">

  /* صندوق الوظيفة */
  let jobBox='';

        <div class="nda-title"><svg style="width:16px;height:16px;stroke:#0e3622;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>هذه الفكرة محمية بـ NDA</div>
        <div class="nda-desc">لإبداء اهتمامك والاطلاع على التفاصيل الكاملة، يجب التوقيع على اتفاقية عدم الإفصاح أولاً.</div>
        <button class="nda-sign-btn" onclick="openNda()"><svg style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>وقّع NDA وأبدِ اهتمامك</button>

  /* أزرار الإجراءات */
  const actBar=`<div class="actions-bar">
    ${(p.type!=='idea'&&p.type!=='job')?`<button class="act-btn${voted?' voted':''}" onclick="vote()" id="vote-btn">

    </button>`:''}
    <button class="act-btn${si?' r-insight':''}" onclick="react('insightful')">💡${ri?' '+ri:''}</button>
    <button class="act-btn${sc?' r-collab':''}"  onclick="react('collab')">🤝${rc?' '+rc:''}</button>

    </button>

      <button class="interest-btn${isInt?' done':''}" onclick="expressInterest()" style="margin-right:auto">

  /* إحصائيات */
  const statsBar=`<div class="post-stats">
    <span>▲ ${voteN} تصويت</span>
    <span>💬 ${(p.comments||[]).length} تعليق</span>
    <span>👁 ${p.views||0} مشاهدة</span>

  /* شريط تعديل (لصاحب المنشور فقط) */
  const editBar=mine?`<div class="edit-bar">
    <span>أنت صاحب هذا المنشور</span>
    <button class="edit-btn" onclick="openEdit()">✏️ تعديل</button>

  /* التعليقات */
  const cmts=(p.comments||[]).map((cm,i)=>{
    const cmAv=`<div class="cmt-av" style="background:linear-gradient(135deg,var(--gold),var(--gold-soft))">${ini(cm.author_name)}</div>`;
    const canDel=cm.author_id===me.id||mine;

      ${cmAv}

        <div class="cmt-bubble">
          <div class="cmt-name" onclick="openUser('${cm.author_id||''}')">${esc(cm.author_name||'مستخدم')} ${checkmarkP(cm.author_id,12)}</div>

  const commentsSection=`<div class="comments-section">

  /* بطاقة المهتمين (لصاحب المنشور فقط) */
  let peopleCard='';
  if(mine&&(p.type==='idea'||p.type==='project')){
    peopleCard=buildPeopleCard(p,intList,ndaList);
  }

  /* منشورات ذات صلة */

  /* تجميع */
  const mainCol=`
    <div class="post-card">

/* ── بطاقة المهتمين والموقعين ── */
function buildPeopleCard(p,intList,ndaList){
  const showNdaTab=p.nda;
  const tabs=showNdaTab?`<div class="people-tabs">
    <button class="ptab${curPeopleTab==='interested'?' on':''}" onclick="switchPeopleTab('interested')">المهتمون <span class="people-count">${intList.length}</span></button>
    <button class="ptab${curPeopleTab==='nda'?' on':''}" onclick="switchPeopleTab('nda')">موقّعو NDA <span class="people-count">${ndaList.length}</span></button>
  </div>`:'';

  const list=curPeopleTab==='nda'?ndaList:intList;
  const listHTML=list.length?list.map(person=>{
    const pav=person.photo?`<img src="${person.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:ini(person.name);
    return `<div class="person-row" onclick="openUser('${person.id}')">
      <div class="person-av">${pav}</div>
      <div class="person-info">
        <div class="person-name">${esc(person.name||'مستخدم')}</div>
        <div class="person-time">${timeAgo(person.at)}</div>
      </div>
      <button class="msg-person-btn" onclick="event.stopPropagation();startMsg('${person.id}')">رسالة</button>
    </div>`;
  }).join(''):
  `<div class="empty-people">${curPeopleTab==='nda'?'لا أحد وقّع NDA بعد':'لا أحد أبدى اهتماماً بعد'}</div>`;

  return `<div class="people-card">
    <div class="people-head">
      <div class="people-head-left">
        <svg class="ic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ${showNdaTab?'المهتمون والموقعون':'المهتمون'}
      </div>
    </div>
    ${tabs}
    <div class="people-list" id="people-list">${listHTML}</div>
  </div>`;
}

function switchPeopleTab(tab){
  curPeopleTab=tab;
  const p=post;
  const intList=getInts()[p.id]||[];
  const ndaList=getSigs()[p.id]||[];
  document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('on',b.textContent.trim().startsWith(tab==='interested'?'المهتمون':'موقّعو')));
  const list=tab==='nda'?ndaList:intList;
  const listHTML=list.length?list.map(person=>{
    const pav=ini(person.name);
    return `<div class="person-row" onclick="openUser('${person.id}')">
      <div class="person-av">${pav}</div>
      <div class="person-info">
        <div class="person-name">${esc(person.name||'مستخدم')}</div>
        <div class="person-time">${timeAgo(person.at)}</div>
      </div>
      <button class="msg-person-btn" onclick="event.stopPropagation();startMsg('${person.id}')">رسالة</button>
    </div>`;
  }).join(''):`<div class="empty-people">${tab==='nda'?'لا أحد وقّع NDA بعد':'لا أحد أبدى اهتماماً بعد'}</div>`;
  document.getElementById('people-list').innerHTML=listHTML;
}

/* ── بطاقة صاحب المنشور ── */
function buildAuthorCard(p,pVc){
  const av=p.author_photo?`<img src="${p.author_photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:ini(p.author_name);
  return `<div class="aside-card">
    <div class="aside-head">
      <svg class="ic" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      عن الكاتب
    </div>
    <div class="aside-body">
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:12px">
        <div style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--olive),var(--olive-deep));display:flex;align-items:center;justify-content:center;color:var(--gold-soft);font-weight:900;font-size:1.1rem;overflow:hidden;flex-shrink:0;cursor:pointer" onclick="openUser('${p.author_id}')">${av}</div>
        <div>
          <div style="font-size:14px;font-weight:700;cursor:pointer" onclick="openUser('${p.author_id}')">${esc(p.author_name)} ${checkmarkP(p.author_id,14)}</div>
          ${p.author_username?`<div style="font-size:12px;color:var(--olive)">@${esc(p.author_username)}</div>`:''}
        </div>
      </div>
      ${p.author_id!==me.id?`<button onclick="openUser('${p.author_id}')" style="width:100%;padding:9px;border-radius:999px;background:var(--olive);color:#fff;border:none;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.2s" onmouseover="this.style.background='var(--olive-deep)'" onmouseout="this.style.background='var(--olive)'">عرض الملف الشخصي</button>`:''}

/* ── منشورات ذات صلة ── */
function buildRelated(p){
  const all=getPosts().filter(x=>x.id!==p.id&&(x.author_id===p.author_id||x.category===p.category)).slice(0,4);
  if(!all.length)return'';
  const items=all.map(x=>{
    const av=x.author_photo?`<img src="${x.author_photo}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`:ini(x.author_name);
    return `<div class="rel-item" onclick="location.href='post.html?id=${x.id}'">
      <div class="rel-av">${av}</div>
      <div>
        <div class="rel-title">${esc(x.title||x.text?.substring(0,55)||'منشور')}</div>
        <div class="rel-meta">${timeAgo(x.created_at)} · ▲ ${(x.votes||[]).length}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="related-head">
    <svg class="ic" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
    منشورات ذات صلة
  </div>${items}`;
}

/* ── إجراءات ── */
function vote(){
  const posts=getPosts();const p=posts.find(x=>x.id===postId);if(!p)return;
  p.votes=p.votes||[];const i=p.votes.indexOf(me.id);const adding=i===-1;
  adding?p.votes.push(me.id):p.votes.splice(i,1);
  savePosts(posts);post=p;
  const btn=document.getElementById('vote-btn');
  const cnt=document.getElementById('vote-count');
  if(btn)btn.classList.toggle('voted',adding);
  if(cnt)cnt.textContent=p.votes.length||'';
  if(adding){azzaDB.from('post_reactions').insert({post_id:postId,user_id:me.id,reaction_type:'vote'}).then(({error})=>{if(error&&error.code!=='23505')console.error('vote:',error.message);});}
  else{azzaDB.from('post_reactions').delete().eq('post_id',postId).eq('user_id',me.id).eq('reaction_type','vote').then(({error})=>{if(error)console.error('vote del:',error.message);});}
}
function react(type){
  const posts=getPosts();const p=posts.find(x=>x.id===postId);if(!p)return;
  const key='r_'+type;p[key]=p[key]||[];
  const i=p[key].indexOf(me.id);const adding=i===-1;
  adding?p[key].push(me.id):p[key].splice(i,1);
  savePosts(posts);post=p;renderAll();
  if(adding){azzaDB.from('post_reactions').insert({post_id:postId,user_id:me.id,reaction_type:type}).then(({error})=>{if(error&&error.code!=='23505')console.error('react:',error.message);});}
  else{azzaDB.from('post_reactions').delete().eq('post_id',postId).eq('user_id',me.id).eq('reaction_type',type).then(({error})=>{if(error)console.error('react del:',error.message);});}
}
function toggleSave(){
  const k='azza_saved_'+me.id;
  let s=JSON.parse(localStorage.getItem(k)||'[]');
  const i=s.indexOf(postId);i===-1?s.push(postId):s.splice(i,1);
  localStorage.setItem(k,JSON.stringify(s));
  showToast(i===-1?'تم الحفظ 🔖':'أُزيل من المحفوظات','info');
  renderAll();
}
function expressInterest(){
  if(post?.nda&&!((getSigs()[postId]||[]).some(x=>x.id===me.id))){openNda();return;}
  const ints=getInts();ints[postId]=ints[postId]||[];
  if(ints[postId].some(x=>x.id===me.id)){showToast('أبديت اهتمامك مسبقاً ✅');return;}
  ints[postId].push({id:me.id,name:me.name,username:me.username||'',photo:me.photo||null,at:new Date().toISOString()});
  localStorage.setItem('azza_interests',JSON.stringify(ints));
  writeNotif('interest');renderAll();
  showToast('تم إبداء الاهتمام ✅');
}

/* NDA */
function openNda(){document.getElementById('nda-cb').checked=false;document.getElementById('nda-confirm-btn').disabled=true;document.getElementById('nda-overlay').classList.add('open');}
function closeNda(){document.getElementById('nda-overlay').classList.remove('open');}
function signAndInterest(){
  const s=getSigs();s[postId]=s[postId]||[];
  if(!s[postId].some(x=>x.id===me.id))s[postId].push({id:me.id,name:me.name,username:me.username||'',photo:me.photo||null,at:new Date().toISOString()});
  localStorage.setItem('azza_nda_sigs',JSON.stringify(s));
  closeNda();expressInterest();
}

/* تعديل */
function openEdit(){
  const p=post;
  document.getElementById('edit-title').value=p.title||'';
  document.getElementById('edit-text').value=p.text||'';
  document.getElementById('edit-pitch').value=p.pitch||'';
  document.getElementById('edit-pitch-wrap').style.display=p.type==='idea'?'block':'none';
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('ctx-menu').classList.remove('open');
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');}
function saveEdit(){
  const posts=getPosts();const idx=posts.findIndex(x=>x.id===postId);if(idx===-1)return;
  posts[idx].title=document.getElementById('edit-title').value.trim();
  posts[idx].text=document.getElementById('edit-text').value.trim();
  if(posts[idx].type==='idea')posts[idx].pitch=document.getElementById('edit-pitch').value.trim();
  savePosts(posts);post=posts[idx];
  closeEdit();renderAll();showToast('تم حفظ التعديلات ✅');
}

/* حذف */
function deletePost(){
  if(!confirm('حذف هذا المنشور نهائياً؟'))return;
  savePosts(getPosts().filter(p=>p.id!==postId));
  showToast('تم الحذف','err');
  setTimeout(()=>location.href='app.html',1200);
}

/* مشاركة */
function sharePost(){
  const url=window.location.href;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>showToast('تم نسخ الرابط 📋'));}
  else showToast('الرابط: '+url,'info');
  document.getElementById('ctx-menu')?.classList.remove('open');
}

/* context menu */
function toggleCtx(){document.getElementById('ctx-menu')?.classList.toggle('open');}

/* بدء محادثة */
function startMsg(targetId){
  let convs=getConvs();
  let conv=convs.find(c=>c.participants.some(p=>p.id===me.id)&&c.participants.some(p=>p.id===targetId));
  if(!conv){
    const targetUser={id:targetId,name:'مستخدم'};
    conv={id:genId(),participants:[{id:me.id,name:me.name,username:me.username||'',photo:me.photo||null},{...targetUser}],messages:[],createdAt:new Date().toISOString()};
    convs.push(conv);saveConvs(convs);
  }
  location.href='messages.html?conv='+conv.id;
}

/* فتح ملف مستخدم */
function openUser(id){if(!id)return;if(id===me.id)location.href='profile.html';else location.href='user.html?id='+id;}

/* إشعارات */
function writeNotif(type){
  try{
    const p=post;if(!p)return;
    const k='azza_notifs_'+p.author_id;
    let n=[];try{n=JSON.parse(localStorage.getItem(k)||'[]');}catch{}
    n.unshift({id:genId(),type,from_id:me.id,from_name:me.name,from_username:me.username||'',from_photo:me.photo||null,post_id:postId,post_text:p.title||p.text?.substring(0,60),at:new Date().toISOString(),read:false});
    localStorage.setItem(k,JSON.stringify(n));
  }catch(e){}
}

/* تعليقات */
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function updateSendBtn(){const v=(document.getElementById('cmt-input')?.value||'').trim();const btn=document.getElementById('cmt-send');if(btn)btn.disabled=!v;}
function addComment(){
  const inp=document.getElementById('cmt-input');
  const text=(inp?.value||'').trim();if(!text)return;
  const posts=getPosts();const p=posts.find(x=>x.id===postId);if(!p)return;
  p.comments=p.comments||[];
  p.comments.push({id:genId(),author_id:me.id,author_name:me.name,author_username:me.username||'',text,created_at:new Date().toISOString()});
  savePosts(posts);post=p;
  writeNotif('comment');
  inp.value='';renderAll();showToast('تم نشر تعليقك ✅');
  setTimeout(()=>{const cl=document.getElementById('comment-list');if(cl)cl.scrollTop=cl.scrollHeight;},100);
}
function deleteComment(cmtId){
  if(!confirm('حذف هذا التعليق؟'))return;
  const posts=getPosts();const p=posts.find(x=>x.id===postId);if(!p)return;
  p.comments=(p.comments||[]).filter(c=>c.id!==cmtId);
  savePosts(posts);post=p;renderAll();showToast('تم حذف التعليق');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeEdit();closeNda();closeLightbox();}
});

init();
</script>
</body>
</html>
